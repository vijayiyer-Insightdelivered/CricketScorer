<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PitchUp Admin Fix</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body style="font-family:sans-serif;padding:24px;max-width:400px;margin:0 auto;">
<h2>PitchUp Admin Fix</h2>
<div id="status" style="margin:16px 0;padding:12px;border-radius:8px;display:none;"></div>
<div id="form">
  <label style="display:block;margin-bottom:4px;font-weight:600;">Email</label>
  <input id="email" type="email" value="vijay.iyer@thinkviz.com" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-bottom:12px;font-size:16px;">
  <label style="display:block;margin-bottom:4px;font-weight:600;">Password</label>
  <input id="pass" type="password" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-bottom:16px;font-size:16px;">
  <button onclick="doFix()" style="width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;">Make Admin</button>
</div>
<script>
var app=firebase.initializeApp({apiKey:"AIzaSyBJ6akMXtSXvVwPxJ-MiskL7DSCdZPyg2M",authDomain:"pitchup-7dd42.firebaseapp.com",projectId:"pitchup-7dd42"});
var db=firebase.firestore();
var auth=firebase.auth();
function show(msg,ok){
  var s=document.getElementById('status');
  s.style.display='block';
  s.style.background=ok?'#f0fdf4':'#fef2f2';
  s.style.color=ok?'#16a34a':'#dc2626';
  s.style.border='1px solid '+(ok?'#bbf7d0':'#fecaca');
  s.textContent=msg;
}
function doFix(){
  var email=document.getElementById('email').value;
  var pass=document.getElementById('pass').value;
  if(!email||!pass){show('Enter email and password',false);return;}
  show('Signing in...',true);
  auth.signInWithEmailAndPassword(email,pass).then(function(cred){
    show('Updating role to admin...',true);
    return db.collection('users').doc(cred.user.uid).set({role:'admin'},{merge:true});
  }).then(function(){
    show('Done! You are now Admin. Go back to PitchUp, log out and log back in.',true);
    document.getElementById('form').style.display='none';
  }).catch(function(e){
    show('Error: '+e.message,false);
  });
}
</script>
</body></html>
