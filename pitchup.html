// ─── Next Bowler Modal (end of over / pair) ──────────────────────────────────
let nextBowlerSelection={slot0:null,slot1:null};
let _pendingNextBowler=false; // queued bowler change after batter modal closes

function renderNextBowlerModal(){
  const inn=getInn();if(!inn)return '';
  const bpo=getBpo();
  const charlie=isCharlie();
  const rules=getRules();
  const maxOv=rules.maxOversPerBowler||0;
  const bowlingPlayers=state.currentInnings===0?state.match.playersB:state.match.playersA;
  const activeBIds=inn.charlieBowlers.filter(Boolean);

  // Categorise all bowling-side players
  const previousPair=[];
  const available=[];
  const quotaDone=[];
  const injured=[];

  bowlingPlayers.forEach((name,idx)=>{
    const ex=inn.bowlers.find(b=>b.name===name);
    const num=idx+1;
    const entry={name,ex,num};
    if(ex&&ex.retiredInjured){injured.push(entry);return;}
    if(ex&&activeBIds.includes(ex.id)){previousPair.push(entry);return;}
    if(ex&&maxOv>0&&Math.floor(ex.balls/bpo)>=maxOv){quotaDone.push(entry);return;}
    available.push(entry);
  });

  function bowlerStats(b){
    if(!b.ex)return 'Fresh';
    const oStr=overStr(b.ex.balls,bpo);
    let s=`${oStr} · ${b.ex.runs}r · ${b.ex.wickets}w`;
    if(maxOv>0){const used=Math.floor(b.ex.balls/bpo);s+=` · ${used}/${maxOv}ov`;}
    return s;
  }

  function infoItem(b,tag,color){
    return `<div class="mitem" style="opacity:0.45;border-radius:10px;">
      <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
      <span class="mitem-name">${escHtml(b.name)}</span>
      <span class="mitem-meta">${bowlerStats(b)} · <span style="color:${color};font-weight:700;">${tag}</span></span>
    </div>`;
  }

  function sectionHdr(title,color){
    return `<div style="font-size:11px;color:${color};font-family:var(--fu);font-weight:700;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;">${title}</div>`;
  }

  const overNum=inn.overs;
  const sel0=nextBowlerSelection.slot0;
  const sel1=nextBowlerSelection.slot1;
  let content='';

  if(charlie){
    // Single list — tap once = Active (slot 0), tap again or second player = Waiting (slot 1)
    // Show assignment badges on each item
    const listItems=available.map(b=>{
      const safeName=b.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const isSlot0=sel0===b.name;
      const isSlot1=sel1===b.name;
      const borderColor=isSlot0?'var(--grass3)':isSlot1?'var(--gold)':'transparent';
      const badge=isSlot0?'<span style="background:var(--grass3);color:#fff;font-size:9px;font-family:var(--fu);font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:1px;">ACTIVE</span>'
        :isSlot1?'<span style="background:var(--gold);color:#000;font-size:9px;font-family:var(--fu);font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:1px;">WAITING</span>':'';
      return `<div class="mitem" style="border:2px solid ${borderColor};border-radius:10px;cursor:pointer;" onclick="toggleNextBowler('${safeName}')">
        <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
        <span class="mitem-name" style="flex:1;">${escHtml(b.name)}</span>
        ${badge}
        <span class="mitem-meta">${bowlerStats(b)}</span>
      </div>`;
    }).join('');

    // Summary of selections
    const selSummary=(sel0||sel1)?`<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
      ${sel0?`<div style="background:rgba(30,107,60,.15);border:1px solid rgba(30,107,60,.3);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--grass3);font-weight:700;">🟢 Active: ${escHtml(sel0)}</div>`:'<div style="background:#f8fafc;border:1px dashed var(--home-border);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--home-muted);">🟢 Tap a bowler</div>'}
      ${sel1?`<div style="background:rgba(232,168,32,.1);border:1px solid rgba(232,168,32,.25);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--gold);font-weight:700;">🟡 Waiting: ${escHtml(sel1)}</div>`:'<div style="background:#f8fafc;border:1px dashed var(--home-border);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--home-muted);">🟡 Tap another</div>'}
    </div>`:'';

    content=`
      <div class="modal-title">🏏 Next Bowling Pair</div>
      <div class="modal-sub">Overs ${overNum+1}-${overNum+2} · Tap to assign Active, tap another for Waiting</div>
      ${selSummary}
      ${previousPair.length?`${sectionHdr('Previous Pair (just bowled)','var(--muted)')}<div class="modal-list" style="margin-bottom:10px;">${previousPair.map(b=>infoItem(b,'outgoing','var(--muted)')).join('')}</div>`:''}
      ${sectionHdr('Available Bowlers','var(--gold)')}
      <div class="modal-list">${listItems}${available.length===0?'<div style="color:var(--home-muted);font-size:12px;padding:8px;">No bowlers available</div>':''}</div>
      ${quotaDone.length?`${sectionHdr(`Quota Completed (${maxOv} overs)`,'#f87171')}<div class="modal-list">${quotaDone.map(b=>infoItem(b,'done','#f87171')).join('')}</div>`:''}
      ${injured.length?`${sectionHdr('Injured','#f87171')}<div class="modal-list">${injured.map(b=>infoItem(b,'injured','#f87171')).join('')}</div>`:''}
      <button class="btn-primary" style="width:100%;margin-top:10px;" onclick="confirmNextBowler()" ${sel0&&sel1?'':'disabled style="opacity:.4;width:100%;margin-top:10px;"'}>${sel0&&sel1?'Confirm Pair':'Select 2 bowlers'}</button>
      <button class="modal-cancel" onclick="skipNextBowler()">Keep Current</button>`;
  }else{
    // Standard: single bowler selection
    const listItems=available.map(b=>{
      const safeName=b.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const isSelected=sel0===b.name;
      return `<div class="mitem" style="border:2px solid ${isSelected?'var(--gold)':'transparent'};border-radius:10px;cursor:pointer;" onclick="selectNextBowler(0,'${safeName}')">
        <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
        <span class="mitem-name" style="flex:1;">${escHtml(b.name)}</span>
        ${isSelected?'<span style="color:var(--gold);font-size:14px;">✓</span>':''}
        <span class="mitem-meta">${bowlerStats(b)}</span>
      </div>`;
    }).join('');

    content=`
      <div class="modal-title">🏏 Next Bowler</div>
      <div class="modal-sub">Over ${overNum+1} · Who bowls next?</div>
      ${previousPair.length?`${sectionHdr('Previous Bowler','var(--muted)')}<div class="modal-list" style="margin-bottom:10px;">${previousPair.map(b=>infoItem(b,'outgoing','var(--muted)')).join('')}</div>`:''}
      ${sectionHdr('Available Bowlers','var(--gold)')}
      <div class="modal-list">${listItems}${available.length===0?'<div style="color:var(--home-muted);font-size:12px;padding:8px;">No bowlers available</div>':''}</div>
      ${quotaDone.length?`${sectionHdr(`Quota Completed (${maxOv} overs)`,'#f87171')}<div class="modal-list">${quotaDone.map(b=>infoItem(b,'done','#f87171')).join('')}</div>`:''}
      ${injured.length?`${sectionHdr('Injured','#f87171')}<div class="modal-list">${injured.map(b=>infoItem(b,'injured','#f87171')).join('')}</div>`:''}
      <button class="btn-primary" style="width:100%;margin-top:10px;" onclick="confirmNextBowler()" ${sel0?'':'disabled style="opacity:.4;width:100%;margin-top:10px;"'}>${sel0?'Confirm':'Select a bowler'}</button>
      <button class="modal-cancel" onclick="skipNextBowler()">Keep Current</button>`;
  }

  return `<div class="modal-sheet"><div class="modal-handle"></div>${content}</div>`;
}

function selectNextBowler(slot,name){
  if(slot===0)nextBowlerSelection.slot0=name;
  else nextBowlerSelection.slot1=name;
  _refreshBowlerModal();
}
window.selectNextBowler=selectNextBowler;

// Charlie mode: single list, tap to cycle assignment
// 1st tap on a name → Active (slot0). 2nd tap on different name → Waiting (slot1).
// Tap on already-assigned name → unassign it. Tap on unassigned when both full → swap to replace slot1.
function toggleNextBowler(name){
  const s=nextBowlerSelection;
  if(s.slot0===name){
    // Unassign from Active
    s.slot0=s.slot1;s.slot1=null;
  }else if(s.slot1===name){
    // Unassign from Waiting
    s.slot1=null;
  }else if(!s.slot0){
    // Assign to Active (empty)
    s.slot0=name;
  }else if(!s.slot1){
    // Assign to Waiting (empty)
    s.slot1=name;
  }else{
    // Both full — replace Waiting
    s.slot1=name;
  }
  _refreshBowlerModal();
}
window.toggleNextBowler=toggleNextBowler;

function _refreshBowlerModal(){
  const overlay=document.querySelector('.modal-overlay');
  if(overlay){overlay.innerHTML=renderNextBowlerModal();}
}

function confirmNextBowler(){
  const inn=getInn();if(!inn)return;
  const charlie=isCharlie();
  const bowlingPlayers=state.currentInnings===0?state.match.playersB:state.match.playersA;

  if(charlie){
    if(!nextBowlerSelection.slot0||!nextBowlerSelection.slot1){alert('Select both bowlers');return;}
    if(nextBowlerSelection.slot0===nextBowlerSelection.slot1){alert('Select two different bowlers');return;}
    updateInn(inn=>{
      // Ensure bowlers exist in innings bowler list
      [nextBowlerSelection.slot0,nextBowlerSelection.slot1].forEach(name=>{
        if(!inn.bowlers.find(b=>b.name===name)){
          const idx=bowlingPlayers.indexOf(name);
          inn.bowlers.push(initBowler(name,`bowl_${idx>=0?idx:inn.bowlers.length}`));
        }
      });
      const b0=inn.bowlers.find(b=>b.name===nextBowlerSelection.slot0);
      const b1=inn.bowlers.find(b=>b.name===nextBowlerSelection.slot1);
      inn.charlieBowlers=[b0?.id,b1?.id];
      return inn;
    });
  }else{
    if(!nextBowlerSelection.slot0){alert('Select a bowler');return;}
    updateInn(inn=>{
      let bw=inn.bowlers.find(b=>b.name===nextBowlerSelection.slot0);
      if(!bw){
        const idx=bowlingPlayers.indexOf(nextBowlerSelection.slot0);
        bw=initBowler(nextBowlerSelection.slot0,`bowl_${idx>=0?idx:inn.bowlers.length}`);
        inn.bowlers.push(bw);
      }
      inn.charlieBowlers=[bw.id,inn.charlieBowlers[1]];
      return inn;
    });
  }
  nextBowlerSelection={slot0:null,slot1:null};
  closeModal();
}
window.confirmNextBowler=confirmNextBowler;

function skipNextBowler(){
  nextBowlerSelection={slot0:null,slot1:null};
  closeModal();
}
window.skipNextBowler=skipNextBowler;

// ─── PLAYER PERFORMANCE ──────────────────────────────────────────────────────
let perfViewPlayer=null; // player name for detail view

function initPlayerEntry(){
  return {
    name:'',matches:new Set(),
    bat:{inn:0,runs:0,balls:0,fours:0,sixes:0,hs:0,notOuts:0,outs:0,
      dismissals:{Bowled:0,Caught:0,LBW:0,'Run Out':0,Stumped:0,'Hit Wicket':0,Retired:0,other:0}},
    bowl:{balls:0,runs:0,wickets:0,wides:0,noBalls:0,best:''},
    field:{catches:0,runOuts:0,stumpings:0}
  };
}

function aggregatePlayerStats(){
  const players={};
  state.savedMatches.forEach(m=>{
    if(!m.innings)return;
    const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
    m.innings.forEach((inn,innIdx)=>{
      if(!inn)return;
      // Batting stats
      inn.batters.forEach(b=>{
        if(!b.name)return;
        if(!players[b.name]){const e=initPlayerEntry();e.name=b.name;players[b.name]=e;}
        const p=players[b.name];
        p.matches.add(m.matchId||m.date);
        if(b.balls>0||b.runs>0){
          p.bat.inn+=1;p.bat.runs+=b.runs;p.bat.balls+=b.balls;
          p.bat.fours+=b.fours||0;p.bat.sixes+=b.sixes||0;
          if(b.runs>p.bat.hs)p.bat.hs=b.runs;
          if(b.out){
            p.bat.outs+=1;
            // Track dismissal type
            const dtype=b.dismissalType||parseDismissalType(b.dismissal||'');
            if(dtype&&p.bat.dismissals[dtype]!==undefined)p.bat.dismissals[dtype]+=1;
            else p.bat.dismissals.other+=1;
          }else{p.bat.notOuts+=1;}
        }
      });
      // Bowling stats
      inn.bowlers.forEach(b=>{
        if(!b.name)return;
        if(!players[b.name]){const e=initPlayerEntry();e.name=b.name;players[b.name]=e;}
        const p=players[b.name];
        p.matches.add(m.matchId||m.date);
        if(b.balls>0){
          p.bowl.balls+=b.balls;p.bowl.runs+=b.runs;p.bowl.wickets+=b.wickets;
          p.bowl.wides+=b.wides||0;p.bowl.noBalls+=b.noBalls||0;
          const fig=`${b.wickets}/${b.runs}`;
          if(!p.bowl.best||b.wickets>(parseInt(p.bowl.best)||0)||(b.wickets===parseInt(p.bowl.best)&&b.runs<parseInt(p.bowl.best.split('/')[1]||999)))p.bowl.best=fig;
        }
      });
      // Fielding stats — from batter dismissals (fielder credited)
      inn.batters.forEach(b=>{
        if(!b.out)return;
        const fielder=b.dismissalFielder||parseFielderFromDismissal(b.dismissal||'');
        const dtype=b.dismissalType||parseDismissalType(b.dismissal||'');
        if(fielder){
          if(!players[fielder]){const e=initPlayerEntry();e.name=fielder;players[fielder]=e;}
          const fp=players[fielder];
          fp.matches.add(m.matchId||m.date);
          if(dtype==='Caught')fp.field.catches+=1;
          else if(dtype==='Run Out')fp.field.runOuts+=1;
          else if(dtype==='Stumped')fp.field.stumpings+=1;
        }
      });
    });
  });
  // Convert Sets to counts and compute derived stats
  return Object.values(players).map(p=>{
    p.matchCount=p.matches.size;
    delete p.matches;
    p.bat.avg=p.bat.outs>0?(p.bat.runs/p.bat.outs).toFixed(1):p.bat.runs>0?'N/A':'-';
    p.bat.sr=p.bat.balls>0?((p.bat.runs/p.bat.balls)*100).toFixed(0):'-';
    const bpo=6;
    p.bowl.oversStr=overStr(p.bowl.balls,bpo);
    p.bowl.econ=p.bowl.balls>0?(p.bowl.runs/(p.bowl.balls/bpo)).toFixed(1):'-';
    return p;
  }).sort((a,b)=>b.matchCount-a.matchCount||b.bat.runs-a.bat.runs);
}

// Parse dismissal type from old-format text (e.g. "bowled b Player1", "c Player2 b Player1")
function parseDismissalType(dis){
  if(!dis)return '';
  const d=dis.toLowerCase().trim();
  if(d.startsWith('b '))return 'Bowled';
  if(d.startsWith('c '))return 'Caught';
  if(d.startsWith('lbw'))return 'LBW';
  if(d.startsWith('run out'))return 'Run Out';
  if(d.startsWith('st '))return 'Stumped';
  if(d.startsWith('hit wicket'))return 'Hit Wicket';
  if(d.startsWith('bowled'))return 'Bowled';
  if(d.startsWith('caught'))return 'Caught';
  if(d.startsWith('stumped'))return 'Stumped';
  return '';
}

// Parse fielder name from old-format dismissal text
function parseFielderFromDismissal(dis){
  if(!dis)return '';
  const d=dis.trim();
  // "c FielderName b BowlerName"
  let m=d.match(/^c\s+(.+?)\s+b\s+/i);if(m)return m[1].trim();
  // "run out (FielderName)"
  m=d.match(/run out\s*\((.+?)\)/i);if(m)return m[1].trim();
  // "st FielderName b BowlerName"
  m=d.match(/^st\s+(.+?)\s+b\s+/i);if(m)return m[1].trim();
  return '';
}

function getPlayerMatchHistory(playerName){
  const history=[];
  state.savedMatches.forEach(m=>{
    if(!m.innings)return;
    const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
    const entry={date:m.date,teamA:m.teamA,teamB:m.teamB,matchId:m.matchId,bat:null,bowl:null,notes:[]};
    m.innings.forEach(inn=>{
      if(!inn)return;
      const b=inn.batters.find(x=>x.name===playerName);
      if(b&&(b.balls>0||b.runs>0))entry.bat={runs:b.runs,balls:b.balls,fours:b.fours||0,sixes:b.sixes||0,out:b.out,dismissal:b.dismissal||'',sr:b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-'};
      const bw=inn.bowlers.find(x=>x.name===playerName);
      if(bw&&bw.balls>0)entry.bowl={overs:overStr(bw.balls,bpo),runs:bw.runs,wickets:bw.wickets,wides:bw.wides||0,noBalls:bw.noBalls||0,econ:bw.balls>0?(bw.runs/(bw.balls/bpo)).toFixed(1):'-'};
    });
    entry.notes=(m.playerNotes||[]).filter(n=>n.playerName===playerName);
    if(entry.bat||entry.bowl||entry.notes.length>0)history.push(entry);
  });
  return history.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

      </div>

// ─── EDIT COMPLETED MATCH (Admin only) ───────────────────────────────────────
let editMatchIdx=null;

function editSavedMatch(idx){
  if(!isAdmin())return;
  editMatchIdx=idx;
  state.screen='edit_match';render();
}
window.editSavedMatch=editSavedMatch;

function updateMatchBatter(innIdx,batIdx,field,value){
  const m=state.savedMatches[editMatchIdx];if(!m)return;
  const b=m.innings[innIdx]?.batters[batIdx];if(!b)return;
  if(field==='runs'||field==='balls'||field==='fours'||field==='sixes')b[field]=Number(value)||0;
  else if(field==='out')b.out=value==='true';
  else if(field==='dismissal'||field==='dismissalType'||field==='dismissalFielder')b[field]=value;
  // Recalculate innings total
  const inn=m.innings[innIdx];
  inn.total=inn.batters.reduce((s,bt)=>s+bt.runs,0)+inn.extras.total;
  inn.wickets=inn.batters.filter(bt=>bt.out).length;
  persist();render();
}
window.updateMatchBatter=updateMatchBatter;

function updateMatchBowler(innIdx,bowIdx,field,value){
  const m=state.savedMatches[editMatchIdx];if(!m)return;
  const b=m.innings[innIdx]?.bowlers[bowIdx];if(!b)return;
  if(['balls','runs','wickets','wides','noBalls'].includes(field))b[field]=Number(value)||0;
  persist();render();
}
window.updateMatchBowler=updateMatchBowler;

function saveEditedMatch(){
  const m=state.savedMatches[editMatchIdx];
  if(m)syncSavedMatchToFirestore(m);
  state.screen='home';editMatchIdx=null;render();
}
window.saveEditedMatch=saveEditedMatch;

function renderEditMatch(){
  if(!isAdmin()||editMatchIdx===null){state.screen='home';return renderHome();}
  const m=state.savedMatches[editMatchIdx];
  if(!m){state.screen='home';return renderHome();}
  const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;

  function editableInput(innIdx,type,idx,field,val,width){
    return `<input type="number" min="0" value="${val}" style="width:${width||'45px'};padding:4px 6px;border:1px solid var(--home-border);border-radius:6px;font-size:11px;font-family:var(--fu);text-align:center;color:var(--home-text);background:#fff;" oninput="updateMatch${type==='bat'?'Batter':'Bowler'}(${innIdx},${idx},'${field}',this.value)"/>`;
  }

  let inningsHtml='';
  [0,1].forEach(innIdx=>{
    const inn=m.innings[innIdx];if(!inn)return;
    const teamName=innIdx===0?m.teamA:m.teamB;

    // Batter rows
    const batRows=inn.batters.map((b,bi)=>{
      const tsel=WICKET_TYPES.map(t=>`<option ${b.dismissalType===t?'selected':''}>${t}</option>`).join('');
      return `<tr>
        <td style="text-align:left;font-weight:600;">${escHtml(b.name)}</td>
        <td>${editableInput(innIdx,'bat',bi,'runs',b.runs)}</td>
        <td>${editableInput(innIdx,'bat',bi,'balls',b.balls)}</td>
        <td>${editableInput(innIdx,'bat',bi,'fours',b.fours||0,'35px')}</td>
        <td>${editableInput(innIdx,'bat',bi,'sixes',b.sixes||0,'35px')}</td>
        <td>
          <select style="font-size:10px;padding:2px;border:1px solid var(--home-border);border-radius:4px;" onchange="updateMatchBatter(${innIdx},${bi},'out',this.value)">
            <option value="false" ${!b.out?'selected':''}>NO</option>
            <option value="true" ${b.out?'selected':''}>OUT</option>
          </select>
        </td>
        <td>${b.out?`<select style="font-size:10px;padding:2px;border:1px solid var(--home-border);border-radius:4px;max-width:70px;" onchange="updateMatchBatter(${innIdx},${bi},'dismissalType',this.value)">
          <option value="">--</option>${tsel}</select>
          <input style="width:60px;font-size:10px;padding:2px 4px;border:1px solid var(--home-border);border-radius:4px;margin-top:2px;" placeholder="Fielder" value="${escHtml(b.dismissalFielder||'')}" oninput="updateMatchBatter(${innIdx},${bi},'dismissalFielder',this.value)"/>`:''}</td>
      </tr>`;
    }).join('');

    // Bowler rows
    const bowlRows=inn.bowlers.map((b,bi)=>{
      return `<tr>
        <td style="text-align:left;font-weight:600;">${escHtml(b.name)}</td>
        <td>${editableInput(innIdx,'bowl',bi,'balls',b.balls)}</td>
        <td>${editableInput(innIdx,'bowl',bi,'runs',b.runs)}</td>
        <td>${editableInput(innIdx,'bowl',bi,'wickets',b.wickets,'35px')}</td>
        <td>${editableInput(innIdx,'bowl',bi,'wides',b.wides||0,'35px')}</td>
        <td>${editableInput(innIdx,'bowl',bi,'noBalls',b.noBalls||0,'35px')}</td>
      </tr>`;
    }).join('');

    inningsHtml+=`
      <div class="team-form-card" style="margin-bottom:12px;">
        <div class="team-form-title">${escHtml(teamName)} — Innings ${innIdx+1}</div>
        <div style="font-family:var(--fu);font-size:12px;color:var(--grass);font-weight:700;margin-bottom:8px;">${inn.total}/${inn.wickets} (${overStr(inn.legalBalls,bpo)})</div>
        <div style="overflow-x:auto;">
          <table class="ct" style="font-size:11px;">
            <thead><tr><th style="text-align:left;">Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>Out?</th><th>Dismissal</th></tr></thead>
            <tbody>${batRows}</tbody>
          </table>
        </div>
        <div style="margin-top:12px;overflow-x:auto;">
          <table class="ct" style="font-size:11px;">
            <thead><tr><th style="text-align:left;">Bowler</th><th>Balls</th><th>R</th><th>W</th><th>Wd</th><th>NB</th></tr></thead>
            <tbody>${bowlRows}</tbody>
          </table>
        </div>
      </div>`;
  });

  return `<div class="screen light active">
    <div class="topbar" style="background:var(--home-bg);border-bottom:1px solid var(--home-border);">
      <button class="topbar-back" style="color:var(--home-text);" onclick="state.screen='home';editMatchIdx=null;render()">←</button>
      <span class="topbar-title" style="color:var(--home-text);">Edit Match</span>
      <button style="background:var(--grass);border:none;border-radius:8px;color:#fff;padding:6px 14px;cursor:pointer;font-size:12px;font-family:var(--fu);font-weight:700;" onclick="saveEditedMatch()">Save</button>
    </div>
    <div class="screen-inner light">
      <div style="font-family:var(--fu);font-size:12px;color:var(--home-muted);margin-bottom:12px;">
        🛡️ Admin — Editing: <strong style="color:var(--home-text);">${escHtml(m.teamA)} vs ${escHtml(m.teamB)}</strong>
        · ${new Date(m.date||0).toLocaleDateString('en-GB')}
      </div>
      ${inningsHtml}
      <div style="display:flex;gap:8px;">
        <button class="light-btn-secondary" style="flex:1;" onclick="state.screen='home';editMatchIdx=null;render()">Cancel</button>
        <button class="light-btn-primary" style="flex:1;" onclick="saveEditedMatch()">Save Changes</button>
      </div>
    </div>
  </div>`;
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function renderResult(){
  const m=state.match,bpo=getBpo();
  const i1=m.innings[0],i2=m.innings[1];
  const s1=i1?.total||0,s2=i2?.total||0;
  const winner=s1>s2?m.teamA:s2>s1?m.teamB:'Tie';
  const margin=winner===m.teamA?`by ${s1-s2} runs`:winner===m.teamB?`by ${(m.playersB?.length||11)-1-(i2?.wickets||0)} wickets`:'';
  return `<div class="screen dark active">
    <div class="topbar dark">
      <div style="width:40px;"></div>
      <span class="topbar-title">Match Result</span>
      <button class="tbtn gold" onclick="exportCSV(state.match)">📥 CSV</button>
    </div>
    <div class="screen-inner">
      <div class="result-hero">
        <span class="trophy">🏆</span>
        <div class="result-title">${winner==='Tie'?'TIE!':escHtml(winner)+' WIN!'}</div>
        ${margin?`<div class="result-margin">${margin}</div>`:''}
      </div>
      <div class="scores-row">
        ${[{t:m.teamA,i:i1},{t:m.teamB,i:i2}].map(({t,i})=>`
          <div class="score-box">
            <div class="score-box-team">${escHtml(t)}</div>
            <div class="score-box-runs">${i?.total||0}/${i?.wickets||0}</div>
            <div class="score-box-overs">${overStr(i?.legalBalls||0,bpo)} overs</div>
          </div>`).join('')}
      </div>
      ${renderScorecard(i1,m.teamA,bpo)}
      ${renderScorecard(i2,m.teamB,bpo)}

      <!-- Player Notes Section -->
      <div class="team-form-card" style="margin-bottom:12px;">
        <div class="team-form-title" style="color:#2563eb;">📝 Player Notes</div>
        <div style="font-size:11px;color:var(--home-muted);margin-bottom:10px;font-family:var(--fu);">Add coaching notes for appreciation, improvement areas, or technique observations</div>
        ${[{team:m.teamA,players:m.playersA},{team:m.teamB,players:m.playersB}].map(({team,players})=>`
          <div style="margin-bottom:8px;">
            <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">${escHtml(team)}</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;">
              ${(players||[]).map(name=>{
                const notes=(m.playerNotes||[]).filter(n=>n.playerName===name);
                const safeName=name.replace(/'/g,"\\'");
                return `<button onclick="addPlayerNote('${safeName}')" style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:11px;font-family:var(--fu);font-weight:600;cursor:pointer;border:1px solid ${notes.length?'#bbf7d0':'var(--home-border)'};background:${notes.length?'#f0fdf4':'#fff'};color:var(--home-text);">
                  ${escHtml(name)}${notes.length?` <span style="color:var(--grass);font-size:9px;">(${notes.length})</span>`:''}
                </button>`;
              }).join('')}
            </div>
          </div>`).join('')}
        ${(m.playerNotes||[]).length>0?`
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--home-border);">
            <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1px;margin-bottom:6px;">ALL NOTES (${m.playerNotes.length})</div>
            ${m.playerNotes.map((n,idx)=>{
              const d=new Date(n.timestamp).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
              const catColors={appreciation:'#16a34a',improvement:'#2563eb',technique:'#7c3aed',attitude:'#d97706',general:'var(--home-muted)'};
              const catIcons={appreciation:'👏',improvement:'📈',technique:'🎯',attitude:'💪',general:'📝'};
              return `<div style="background:#fff;border:1px solid var(--home-border);border-radius:8px;padding:8px 10px;margin-bottom:6px;border-left:3px solid ${catColors[n.category]||'var(--home-muted)'};">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span style="font-family:var(--fu);font-weight:700;font-size:12px;color:var(--home-text);">${escHtml(n.playerName)}</span>
                  <span style="font-size:9px;color:var(--home-muted);font-family:var(--fu);">${catIcons[n.category]||'📝'} ${d}</span>
                </div>
                <div style="font-size:11px;color:var(--home-text);font-family:var(--fb);margin-top:3px;">${escHtml(n.note)}</div>
              </div>`;
            }).join('')}
          </div>`:''}
      </div>

      <div class="nav-row">
        <button class="btn-secondary" onclick="state.screen='home';state.match=null;state.currentInnings=0;render()">🏠 Home</button>
        <button class="btn-primary" onclick="exportCSV(state.match)">📥 Export CSV</button>
      </div>
    </div>
  </div>`;
}

// ─── Offline & Sync Status ───────────────────────────────────────────────────
function updateOffline(){
  const b=document.getElementById('offline-bar');
  if(b)b.classList.toggle('show',!navigator.onLine);
  if(!navigator.onLine)syncStatus='offline';
  updateSyncBar();
}
function updateSyncBar(){
  const el=document.getElementById('sync-bar');if(!el)return;
  clearTimeout(el._hideTimer);
  if(syncStatus==='synced'&&navigator.onLine){
    el.className='sync-bar synced';el.textContent='☁️ Synced to cloud';
    el.style.display='block';
    el._hideTimer=setTimeout(()=>{el.style.display='none';},2000);
  }else if(syncStatus==='pending'){
    el.className='sync-bar pending';el.textContent='⏳ Syncing...';el.style.display='block';
    // Auto-hide pending bar after 5s to prevent it getting stuck
    el._hideTimer=setTimeout(()=>{el.style.display='none';},5000);
  }else if(!navigator.onLine){
    el.className='sync-bar offline';el.textContent='📶 Offline — data saves locally';
    el.style.display='block';
  }else{el.style.display='none';}
}
window.addEventListener('online',()=>{updateOffline();syncMatchToFirestore(true);});
window.addEventListener('offline',updateOffline);
// Sync when app goes to background (user switches tab/locks phone)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&state.match&&!state.match.complete&&syncConfig.syncOnBackground){
    syncMatchToFirestore(true);
  }
});

if('serviceWorker' in navigator){
  try{
    const sw=`const C='pitchup-v1';const U=['/'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(U)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});`;
    const blob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'/'}).catch(()=>{});
  }catch(e){}
}

// ─── VIEWER MODE — read-only live scoreboard ────────────────────────────────
function renderViewer(){
  if(viewerError){
    return `<div class="screen light active">
      <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;">
        <div style="font-size:48px;margin-bottom:12px;">📡</div>
        <div style="font-family:var(--fd);font-size:18px;color:var(--home-text);text-align:center;">${escHtml(viewerError)}</div>
        <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);margin-top:8px;text-align:center;">PitchUp Live Viewer</div>
      </div>
    </div>`;
  }
  if(!viewerMatch){
    return `<div class="screen light active">
      <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <div style="font-size:32px;margin-bottom:12px;">🏏</div>
        <div style="font-family:var(--fd);font-size:20px;color:var(--home-text);">PITCH<em style="color:var(--grass2);font-style:normal;">UP</em></div>
        <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);margin-top:6px;">Loading live match...</div>
      </div>
    </div>`;
  }
  const m=viewerMatch;
  const innIdx=m.innings&&m.innings[1]?(m.innings[1].complete?1:1):0;
  const inn=m.innings?.[innIdx];
  const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
  const charlie=(m.bowlingMode||'charlie')==='charlie';
  const batTeam=innIdx===0?m.teamA:m.teamB;
  const bowlTeam=innIdx===0?m.teamB:m.teamA;
  const target=innIdx===1&&m.innings[0]?m.innings[0].total+1:null;
  const runsNeeded=target&&inn?target-(inn.total||0):null;
  const ballsLeft=inn?(m.totalOvers*bpo)-inn.legalBalls:0;
  const matchComplete=m.complete;

  const i1=m.innings?.[0];
  const i2=m.innings?.[1];

  function batCard(b,role,roleColor){
    const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
    return `<div style="background:#fff;border:1.5px solid var(--home-border);border-radius:12px;padding:10px 12px;flex:1;min-width:140px;">
      <div style="font-size:9px;color:${roleColor};font-family:var(--fu);font-weight:700;letter-spacing:1.5px;">${role}</div>
      <div style="font-family:var(--fu);font-size:14px;font-weight:700;color:var(--home-text);margin:2px 0;">${escHtml(b.name)}</div>
      <div style="display:flex;gap:8px;align-items:baseline;">
        <span style="font-family:var(--fd);font-size:22px;font-weight:700;color:var(--home-text);">${b.runs}</span>
        <span style="font-size:11px;color:var(--home-muted);">(${b.balls})</span>
      </div>
      <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${b.fours}×4 · ${b.sixes}×6 · SR ${sr}</div>
    </div>`;
  }

  function bowlCard(bw,label,color){
    if(!bw)return '';
    const econ=bw.balls>0?(bw.runs/(bw.balls/bpo)).toFixed(1):'-';
    return `<div style="background:#fff;border:1.5px solid var(--home-border);border-radius:12px;padding:10px 12px;flex:1;min-width:140px;">
      <div style="font-size:9px;color:${color};font-family:var(--fu);font-weight:700;letter-spacing:1.5px;">${label}</div>
      <div style="font-family:var(--fu);font-size:14px;font-weight:700;color:var(--home-text);margin:2px 0;">${escHtml(bw.name)}</div>
      <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);">${overStr(bw.balls,bpo)}ov · ${bw.runs}r · ${bw.wickets}w</div>
      <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">Econ ${econ}</div>
    </div>`;
  }

  const activeBatters=inn?inn.currentBatters.map(id=>inn.batters.find(b=>b.id===id)).filter(Boolean):[];
  const activeBowler=inn&&inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const waitingBowler=inn&&inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;

  const overBalls=inn?inn.deliveries.slice(-12).map(d=>{
    let cls='ob-run',lbl=d.runs;
    if(d.isWicket){cls='ob-wkt';lbl='W';}
    else if(d.runs===6)cls='ob-six';
    else if(d.runs===4)cls='ob-four';
    else if(d.isExtra){cls='ob-ext';lbl=d.extraType?.[0]||'E';}
    return `<div class="ob ${cls}">${lbl}</div>`;
  }).join(''):'';

  // Result line if match complete
  let resultLine='';
  if(matchComplete&&i1&&i2){
    const s1=i1.total||0,s2=i2.total||0;
    const winner=s1>s2?m.teamA:s2>s1?m.teamB:'Tie';
    const margin=winner===m.teamA?`by ${s1-s2} runs`:winner===m.teamB?`by ${(m.playersB?.length||11)-1-(i2?.wickets||0)} wickets`:'';
    resultLine=`<div style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #fde68a;border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;">
      <div style="font-size:10px;color:#b45309;font-family:var(--fu);font-weight:700;letter-spacing:2px;">🏆 MATCH RESULT</div>
      <div style="font-family:var(--fd);font-size:24px;font-weight:700;color:var(--home-text);margin:4px 0;">${winner==='Tie'?'TIE!':escHtml(winner)+' WIN!'}</div>
      ${margin?`<div style="font-size:13px;color:#b45309;font-family:var(--fu);">${margin}</div>`:''}
    </div>`;
  }

  // Both innings score boxes
  const scoresRow=`<div style="display:flex;gap:8px;margin-bottom:14px;">
    ${[{t:m.teamA,i:i1},{t:m.teamB,i:i2}].map(({t,i})=>`
      <div style="flex:1;background:${i&&!i.complete&&!matchComplete?'#f0fdf4':'#fff'};border:1.5px solid ${i&&!i.complete&&!matchComplete?'#bbf7d0':'var(--home-border)'};border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1px;">${escHtml(t)}</div>
        <div style="font-family:var(--fd);font-size:28px;font-weight:700;color:var(--home-text);">${i?(i.total+'/'+i.wickets):'—'}</div>
        <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);">${i?overStr(i.legalBalls,bpo)+' ov':''}</div>
        ${i&&!i.complete&&!matchComplete?'<div style="font-size:9px;color:var(--grass);font-family:var(--fu);font-weight:700;margin-top:2px;">● LIVE</div>':''}
      </div>`).join('')}
  </div>`;

  return `<div class="screen light active">
    <div class="topbar light" style="justify-content:center;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#dc2626;animation:pulse 2s infinite;"></div>
        <span style="font-family:var(--fd);font-size:14px;font-weight:700;color:var(--home-text);letter-spacing:1px;">LIVE · ${escHtml(m.teamA)} vs ${escHtml(m.teamB)}</span>
      </div>
    </div>
    <style>@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}</style>
    <div class="screen-inner light">
      ${resultLine}
      ${scoresRow}

      ${target&&!matchComplete?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px;margin-bottom:12px;text-align:center;">
        <div style="font-size:10px;color:#b45309;font-family:var(--fu);font-weight:700;">CHASING ${target}</div>
        <div style="font-size:13px;color:var(--home-text);font-family:var(--fu);font-weight:700;margin-top:2px;">Need ${runsNeeded} off ${ballsLeft} balls</div>
      </div>`:''}

      ${inn&&!matchComplete?`
        <!-- Current batters -->
        <div style="margin-bottom:14px;">
          <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Batting</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${activeBatters.map((b,i)=>batCard(b,i===0?'⚡ STRIKER':'NON-STRIKER','#b45309')).join('')}
          </div>
        </div>

        <!-- Current bowler(s) -->
        <div style="margin-bottom:14px;">
          <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Bowling</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${bowlCard(activeBowler,charlie?'🟢 BOWLING NOW':'🟢 CURRENT BOWLER','var(--grass)')}
            ${charlie?bowlCard(waitingBowler,'🟡 BOWLING NEXT','#d97706'):''}
          </div>
        </div>

        <!-- This over -->
        ${overBalls?`<div style="margin-bottom:14px;">
          <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Recent Balls</div>
          <div class="over-row" style="background:#fff;border:1px solid var(--home-border);border-radius:10px;padding:8px;">${overBalls}</div>
        </div>`:''}
      `:''}

      <!-- Full scorecard -->
      ${i1?renderScorecard(i1,m.teamA,bpo):''}
      ${i2?renderScorecard(i2,m.teamB,bpo):''}

      <div style="text-align:center;margin-top:20px;font-size:9px;color:var(--home-muted);font-family:var(--fu);letter-spacing:1px;">
        PITCHUP LIVE · A PRODUCT OF THINKVIZ LIMITED<br>
        Auto-updates as scoring happens
      </div>
    </div>
  </div>`;
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
detectViewerMode();
loadSyncConfig();
loadAuthCache();
loadState();
updateOffline();
render();
initFirebase();
</script>
