function getSeasonLeaderboard(season){
  const matchIds=season.matchIds||[];
  const matches=state.savedMatches.filter(m=>matchIds.includes(m.matchId));
  const players={};
  const bpo=6;
  matches.forEach(m=>{
    const mbpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
    (m.innings||[]).forEach(inn=>{
      if(!inn)return;
      inn.batters.forEach(b=>{
        if(!b.name||b.balls===0)return;
        if(!players[b.name])players[b.name]={name:b.name,inn:0,runs:0,balls:0,hs:0,outs:0,fours:0,sixes:0,wkts:0,bowlBalls:0,bowlRuns:0,catches:0,matches:new Set()};
        const p=players[b.name];p.matches.add(m.matchId);
        p.inn++;p.runs+=b.runs;p.balls+=b.balls;p.fours+=(b.fours||0);p.sixes+=(b.sixes||0);
        if(b.runs>p.hs)p.hs=b.runs;
        if(b.out)p.outs++;
      });
      inn.bowlers.forEach(b=>{
        if(!b.name||b.balls===0)return;
        if(!players[b.name])players[b.name]={name:b.name,inn:0,runs:0,balls:0,hs:0,outs:0,fours:0,sixes:0,wkts:0,bowlBalls:0,bowlRuns:0,catches:0,matches:new Set()};
        const p=players[b.name];p.matches.add(m.matchId);
        p.wkts+=b.wickets;p.bowlBalls+=b.balls;p.bowlRuns+=b.runs;
      });
      inn.batters.forEach(b=>{
        if(!b.out)return;
        const fielder=b.dismissalFielder||'';
        if(fielder&&(b.dismissalType==='Caught')){
          if(!players[fielder])players[fielder]={name:fielder,inn:0,runs:0,balls:0,hs:0,outs:0,fours:0,sixes:0,wkts:0,bowlBalls:0,bowlRuns:0,catches:0,matches:new Set()};
          players[fielder].catches++;players[fielder].matches.add(m.matchId);
        }
      });
    });
  });
  const list=Object.values(players).map(p=>{p.matchCount=p.matches.size;delete p.matches;p.avg=p.outs>0?(p.runs/p.outs).toFixed(1):'N/A';p.sr=p.balls>0?((p.runs/p.balls)*100).toFixed(0):'-';p.econ=p.bowlBalls>0?(p.bowlRuns/(p.bowlBalls/6)).toFixed(1):'-';return p;});
  return {
    matches,playerCount:list.length,
    topRuns:list.filter(p=>p.runs>0).sort((a,b)=>b.runs-a.runs).slice(0,10),
    topWickets:list.filter(p=>p.wkts>0).sort((a,b)=>b.wkts-a.wkts).slice(0,10),
    topAvg:list.filter(p=>p.outs>=2).sort((a,b)=>parseFloat(b.avg)-parseFloat(a.avg)).slice(0,10),
    topCatches:list.filter(p=>p.catches>0).sort((a,b)=>b.catches-a.catches).slice(0,10),
    topSR:list.filter(p=>p.balls>=10).sort((a,b)=>parseInt(b.sr)-parseInt(a.sr)).slice(0,5),
  };
}

// ─── BEST XI GENERATOR ──────────────────────────────────────────────────────
function generateBestXI(){
  const stats=aggregatePlayerStats();
  if(stats.length<2){toast('Need more match data to generate Best XI','warn');return;}
  // Score each player based on recent form
  const scored=stats.map(p=>{
    let score=0;
    score+=(p.bat.runs||0)*0.5;
    score+=(parseFloat(p.bat.avg)||0)*2;
    score+=(p.bowl.wickets||0)*8;
    score+=(p.field.catches||0)*5;
    score+=(p.field.runOuts||0)*4;
    score+=(p.matchCount||0)*2;
    // Find skills from squads
    let skills=[];
    state.squads.forEach(sq=>sq.players.forEach(sp=>{
      if(sp.name.toLowerCase()===p.name.toLowerCase())skills=[...new Set([...skills,...(sp.skills||[])])];
    }));
    return {...p,score,skills};
  }).sort((a,b)=>b.score-a.score);

  // Build balanced XI: need at least 1 WK, mix of bat/bowl
  const xi=[];
  const wks=scored.filter(p=>p.skills.includes('WK'));
  const bowlers=scored.filter(p=>p.skills.includes('SPIN')||p.skills.includes('SEAM')||p.skills.includes('PACE'));
  // Pick best WK first
  if(wks.length>0)xi.push(wks[0]);
  // Pick top 4 bowlers not already in
  bowlers.filter(p=>!xi.includes(p)).slice(0,4).forEach(p=>xi.push(p));
  // Fill rest with best remaining
  scored.filter(p=>!xi.includes(p)).forEach(p=>{if(xi.length<11)xi.push(p);});

  let html=xi.map((p,i)=>{

// ─── OVER-BY-OVER RUN RATE CHART ────────────────────────────────────────────
function renderRunRateChart(inn,bpo,canvasId){
  if(!inn||!inn.deliveries||inn.deliveries.length===0)return '';
  // Group runs by over
  const overs={};
  inn.deliveries.forEach(d=>{
    const ov=d.over||0;
    if(!overs[ov])overs[ov]=0;
    overs[ov]+=(d.runs||0);
  });
  const maxOver=Math.max(...Object.keys(overs).map(Number),0);
  const overData=[];
  for(let i=0;i<=maxOver;i++)overData.push(overs[i]||0);
  const maxRuns=Math.max(...overData,1);

  return `<div style="margin-bottom:12px;">
    <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1px;margin-bottom:6px;">RUNS PER OVER</div>
    <div style="display:flex;align-items:flex-end;gap:2px;height:60px;background:#f8fafc;border:1px solid var(--home-border);border-radius:8px;padding:6px 4px;">
      ${overData.map((r,i)=>{
        const h=Math.max(4,(r/maxRuns)*48);
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:1px;">
          <span style="font-size:8px;color:var(--home-text);font-family:var(--fd);font-weight:700;">${r}</span>
          <div style="width:100%;max-width:20px;height:${h}px;background:${r>=10?'#dc2626':r>=6?'#d97706':'var(--grass)'};border-radius:3px 3px 0 0;"></div>
          <span style="font-size:7px;color:var(--home-muted);">${i+1}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ─── AUTO MATCH REPORT ──────────────────────────────────────────────────────
function generateMatchReport(m){
  if(!m)return '';
  const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
  const i1=m.innings?.[0],i2=m.innings?.[1];
  const s1=i1?.total||0,s2=i2?.total||0;
  const winner=s1>s2?m.teamA:s2>s1?m.teamB:null;
  const margin=winner===m.teamA?`by ${s1-s2} runs`:winner===m.teamB?`by ${(m.playersB?.length||11)-1-(i2?.wickets||0)} wickets`:'';
  const dateStr=m.date?new Date(m.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
  const mode=m.bowlingMode==='charlie'?'Charlie Cricket':'standard';

  // Find top performers
  function topBatter(inn){
    if(!inn)return null;
    return inn.batters.filter(b=>b.balls>0).sort((a,b)=>b.runs-a.runs)[0];
  }
  function topBowler(inn){
    if(!inn)return null;
    return inn.bowlers.filter(b=>b.balls>0).sort((a,b)=>b.wickets-a.wickets||a.runs-b.runs)[0];
  }
  const tb1=topBatter(i1),tb2=topBatter(i2);
  const tw1=topBowler(i1),tw2=topBowler(i2);

  let report='🏏 MATCH REPORT\n';
  report+=m.teamA+' vs '+m.teamB+'\n';
  if(dateStr)report+=dateStr+(m.venue?' · '+m.venue:'')+'\n';
  report+=m.totalOvers+' overs · '+mode+'\n\n';

  if(i1)report+=m.teamA+': '+s1+'/'+i1.wickets+' ('+overStr(i1.legalBalls,bpo)+' ov)\n';
  if(i2)report+=m.teamB+': '+s2+'/'+i2.wickets+' ('+overStr(i2.legalBalls,bpo)+' ov)\n\n';

  if(winner)report+='🏆 '+winner+' won '+margin+'!\n\n';
  else if(i1&&i2)report+='🤝 Match tied!\n\n';

  report+='⭐ Key performers:\n';
  if(tb1)report+='🏏 '+tb1.name+' '+tb1.runs+'('+tb1.balls+')';
  if(tb1&&tb1.fours)report+=' incl. '+tb1.fours+'×4';
  if(tb1&&tb1.sixes)report+=' '+tb1.sixes+'×6';
  if(tb1)report+='\n';
  if(tb2&&tb2.name!==tb1?.name)report+='🏏 '+tb2.name+' '+tb2.runs+'('+tb2.balls+')\n';
  if(tw1)report+='🎳 '+tw1.name+' '+tw1.wickets+'/'+tw1.runs+' ('+overStr(tw1.balls,bpo)+')\n';
  if(tw2&&tw2.name!==tw1?.name)report+='🎳 '+tw2.name+' '+tw2.wickets+'/'+tw2.runs+' ('+overStr(tw2.balls,bpo)+')\n';

  // POTM
  if(m.potm)report+='\n🏅 Player of the Match: '+m.potm+'\n';

  report+='\n📲 Scored on PitchUp · pitchup.up.railway.app';
  return report;
}

function pushMatchesToCloud(){
  if(!db||!fbReady){toast('Not connected to cloud','error');return;}
  const matches=state.savedMatches.filter(m=>m.matchId);
  if(matches.length===0){toast('No matches to push','warn');return;}
  toast('Pushing '+matches.length+' match'+(matches.length!==1?'es':'')+'...','info');
  let ok=0,fail=0;
  const errors=[];
  const promises=matches.map(m=>{
    if(!m.matchId)m.matchId='m_'+uid();
    const doc={
      matchId:m.matchId,teamA:m.teamA,teamB:m.teamB,
      format:m.format,totalOvers:m.totalOvers,bowlingMode:m.bowlingMode,
      tossWinner:m.tossWinner,tossChoice:m.tossChoice,batting1st:m.batting1st,
      rules:m.rules,playersA:m.playersA,playersB:m.playersB,
      captainA:m.captainA||null,captainB:m.captainB||null,
      keeperA:m.keeperA||null,keeperB:m.keeperB||null,
      innings:m.innings,playerNotes:m.playerNotes||[],
      potm:m.potm||null,targetAdjustment:m.targetAdjustment||0,
      matchDate:m.matchDate||'',venue:m.venue||'',
      complete:!!m.complete,date:m.date||null,
      schemaVersion:SCHEMA_VERSION,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy:fbUid
    };
    return db.collection('matches').doc(m.matchId).set(doc,{merge:true})
      .then(()=>{ok++;})
      .catch(e=>{fail++;errors.push(m.teamA+' vs '+m.teamB+': '+e.message);});
  });
  Promise.all(promises).then(()=>{
    if(fail===0)toast('Pushed '+ok+' match'+(ok!==1?'es':'')+' to cloud','success');
    else toast('Pushed '+ok+', failed '+fail+': '+errors[0],'error');
  });
}
window.pushMatchesToCloud=pushMatchesToCloud;

function refreshMatchesFromCloud(){
  if(!db){toast('Not connected to cloud','error');return;}
  toast('Refreshing from cloud...','info');
  // No orderBy — avoids needing a composite index; we sort client-side
  db.collection('matches').where('complete','==',true).limit(50).get({source:'server'}).then(snap=>{
    const fbMatches=[];
    snap.forEach(doc=>fbMatches.push(doc.data()));
    // Merge: cloud wins, keep local-only matches too
    const merged=[...state.savedMatches];
    fbMatches.forEach(fm=>{
      if(!fm.matchId)return;
      const idx=merged.findIndex(m=>m.matchId===fm.matchId);
      if(idx>=0)merged[idx]={...merged[idx],...fm};
      else merged.push(fm);
    });
    state.savedMatches=merged.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).slice(0,50);
    persist();render();
    toast('Loaded '+fbMatches.length+' match'+(fbMatches.length!==1?'es':'')+' from cloud','success');
  }).catch(e=>{
    toast('Refresh failed: '+e.message,'error');
  });
}
window.refreshMatchesFromCloud=refreshMatchesFromCloud;

// ─── VIEWER MODE — read-only live scoreboard ────────────────────────────────
function renderViewer(){
  if(viewerError){
    return `<div class="screen light active">
      <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;">
        <div style="font-size:48px;margin-bottom:12px;">📡</div>
        <div style="font-family:var(--fd);font-size:18px;color:var(--home-text);text-align:center;">${escHtml(viewerError)}</div>
        <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);margin-top:8px;text-align:center;">PitchUp Live Viewer</div>
      </div>
    </div>`;
  }
  if(!viewerMatch){
    return `<div class="screen light active">
      <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <div style="font-size:32px;margin-bottom:12px;">🏏</div>
        <div style="font-family:var(--fd);font-size:20px;color:var(--home-text);">PITCH<em style="color:var(--grass2);font-style:normal;">UP</em></div>
        <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);margin-top:6px;">Loading live match...</div>
      </div>
    </div>`;
  }
  // Strip any sensitive fields from the viewer copy (notes are admin/coach only)
  const m={...viewerMatch};delete m.playerNotes;
  const innIdx=m.innings&&m.innings[1]?(m.innings[1].complete?1:1):0;
  const inn=m.innings?.[innIdx];
  const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
  const charlie=(m.bowlingMode||'charlie')==='charlie';
  const batTeam=innIdx===0?m.teamA:m.teamB;
  const bowlTeam=innIdx===0?m.teamB:m.teamA;
  const target=innIdx===1&&m.innings[0]?(m.innings[0].total+1+(m.targetAdjustment||0)):null;
  const runsNeeded=target&&inn?target-(inn.total||0):null;
  const ballsLeft=inn?(m.totalOvers*bpo)-inn.legalBalls:0;
  const matchComplete=m.complete;

  const i1=m.innings?.[0];
  const i2=m.innings?.[1];

  function batCard(b,role,roleColor){
    const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
    return `<div style="background:#fff;border:1.5px solid var(--home-border);border-radius:12px;padding:10px 12px;flex:1;min-width:140px;">
      <div style="font-size:9px;color:${roleColor};font-family:var(--fu);font-weight:700;letter-spacing:1.5px;">${role}</div>
      <div style="font-family:var(--fu);font-size:14px;font-weight:700;color:var(--home-text);margin:2px 0;">${escHtml(b.name)}</div>
      <div style="display:flex;gap:8px;align-items:baseline;">
        <span style="font-family:var(--fd);font-size:22px;font-weight:700;color:var(--home-text);">${b.runs}</span>
        <span style="font-size:11px;color:var(--home-muted);">(${b.balls})</span>
      </div>
      <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${b.fours}×4 · ${b.sixes}×6 · SR ${sr}</div>
    </div>`;
  }

  function bowlCard(bw,label,color){
    if(!bw)return '';
    const econ=bw.balls>0?(bw.runs/(bw.balls/bpo)).toFixed(1):'-';
    return `<div style="background:#fff;border:1.5px solid var(--home-border);border-radius:12px;padding:10px 12px;flex:1;min-width:140px;">
      <div style="font-size:9px;color:${color};font-family:var(--fu);font-weight:700;letter-spacing:1.5px;">${label}</div>
      <div style="font-family:var(--fu);font-size:14px;font-weight:700;color:var(--home-text);margin:2px 0;">${escHtml(bw.name)}</div>
      <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);">${overStr(bw.balls,bpo)}ov · ${bw.runs}r · ${bw.wickets}w</div>
      <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">Econ ${econ}</div>
    </div>`;
  }

  const activeBatters=inn?inn.currentBatters.map(id=>inn.batters.find(b=>b.id===id)).filter(Boolean):[];
  const activeBowler=inn&&inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const waitingBowler=inn&&inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;

  const overBalls=inn?inn.deliveries.slice(-12).map(d=>{
    let cls='ob-run',lbl=d.runs;
    if(d.isWicket){cls='ob-wkt';lbl='W';}
    else if(d.runs===6)cls='ob-six';
    else if(d.runs===4)cls='ob-four';
    else if(d.isExtra){cls='ob-ext';lbl=d.extraType?.[0]||'E';}
    return `<div class="ob ${cls}">${lbl}</div>`;
  }).join(''):'';

  // Result line if match complete
  let resultLine='';
  if(matchComplete&&i1&&i2){
    const s1=i1.total||0,s2=i2.total||0;
    const winner=s1>s2?m.teamA:s2>s1?m.teamB:'Tie';
    const margin=winner===m.teamA?`by ${s1-s2} runs`:winner===m.teamB?`by ${(m.playersB?.length||11)-1-(i2?.wickets||0)} wickets`:'';
    resultLine=`<div style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #fde68a;border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;">
      <div style="font-size:10px;color:#b45309;font-family:var(--fu);font-weight:700;letter-spacing:2px;">🏆 MATCH RESULT</div>
      <div style="font-family:var(--fd);font-size:24px;font-weight:700;color:var(--home-text);margin:4px 0;">${winner==='Tie'?'TIE!':escHtml(winner)+' WIN!'}</div>
      ${margin?`<div style="font-size:13px;color:#b45309;font-family:var(--fu);">${margin}</div>`:''}
    </div>`;
  }

  // Both innings score boxes
  const scoresRow=`<div style="display:flex;gap:8px;margin-bottom:14px;">
    ${[{t:m.teamA,i:i1},{t:m.teamB,i:i2}].map(({t,i})=>`
      <div style="flex:1;background:${i&&!i.complete&&!matchComplete?'#f0fdf4':'#fff'};border:1.5px solid ${i&&!i.complete&&!matchComplete?'#bbf7d0':'var(--home-border)'};border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1px;">${escHtml(t)}</div>
        <div style="font-family:var(--fd);font-size:28px;font-weight:700;color:var(--home-text);">${i?(i.total+'/'+i.wickets):'—'}</div>
        <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);">${i?overStr(i.legalBalls,bpo)+' ov':''}</div>
        ${i&&!i.complete&&!matchComplete?'<div style="font-size:9px;color:var(--grass);font-family:var(--fu);font-weight:700;margin-top:2px;">● LIVE</div>':''}
      </div>`).join('')}
  </div>`;

  return `<div class="screen light active">
    <div class="topbar light" style="justify-content:center;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#dc2626;animation:pulse 2s infinite;"></div>
        <span style="font-family:var(--fd);font-size:14px;font-weight:700;color:var(--home-text);letter-spacing:1px;">LIVE · ${escHtml(m.teamA)} vs ${escHtml(m.teamB)}</span>
      </div>
    </div>
    <style>@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}</style>
    <div class="screen-inner light">
      ${resultLine}
      ${scoresRow}

      ${target&&!matchComplete?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px;margin-bottom:12px;text-align:center;">
        <div style="font-size:10px;color:#b45309;font-family:var(--fu);font-weight:700;">CHASING ${target}</div>
        <div style="font-size:13px;color:var(--home-text);font-family:var(--fu);font-weight:700;margin-top:2px;">Need ${runsNeeded} off ${ballsLeft} balls</div>
      </div>`:''}

      ${inn&&!matchComplete?`
        <!-- Current batters -->
        <div style="margin-bottom:14px;">
          <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Batting</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${activeBatters.map((b,i)=>batCard(b,i===0?'⚡ STRIKER':'NON-STRIKER','#b45309')).join('')}
          </div>
        </div>

        <!-- Current bowler(s) -->
        <div style="margin-bottom:14px;">
          <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Bowling</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${bowlCard(activeBowler,charlie?'🟢 BOWLING NOW':'🟢 CURRENT BOWLER','var(--grass)')}
            ${charlie?bowlCard(waitingBowler,'🟡 BOWLING NEXT','#d97706'):''}
          </div>
        </div>

        <!-- This over -->
        ${overBalls?`<div style="margin-bottom:14px;">
          <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Recent Balls</div>
          <div class="over-row" style="background:#fff;border:1px solid var(--home-border);border-radius:10px;padding:8px;">${overBalls}</div>
        </div>`:''}
      `:''}

      <!-- Full scorecard -->
      ${i1?renderScorecard(i1,m.teamA,bpo):''}
      ${i2?renderScorecard(i2,m.teamB,bpo):''}

      <div style="text-align:center;margin-top:20px;font-size:9px;color:var(--home-muted);font-family:var(--fu);letter-spacing:1px;">
        PITCHUP LIVE · A PRODUCT OF THINKVIZ LIMITED<br>
        Auto-updates as scoring happens
      </div>
    </div>
  </div>`;
}

// ─── Match Summary Image Export ──────────────────────────────────────────────
function shareMatchSummary(){
  const m=state.match;if(!m)return;
  const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
  const i1=m.innings?.[0],i2=m.innings?.[1];
  const s1=i1?.total||0,s2=i2?.total||0;
  const winner=s1>s2?m.teamA:s2>s1?m.teamB:'Tie';
  const margin=winner===m.teamA?`by ${s1-s2} runs`:winner===m.teamB?`by ${(m.playersB?.length||11)-1-(i2?.wickets||0)} wickets`:'';

  // Canvas-based image generation (no external dependency)
  const W=420,pad=20;
  const c=document.createElement('canvas');
  const ctx=c.getContext('2d');

  // Measure content first, then set height
  const lineH=18,secGap=14,headerH=60,scoreH=50,batLineH=16,bowlLineH=16;
  const batters1=(i1?.batters||[]).filter(b=>b.balls>0||b.out);
  const batters2=(i2?.batters||[]).filter(b=>b.balls>0||b.out);
  const bowlers1=(i1?.bowlers||[]).filter(b=>b.balls>0);
  const bowlers2=(i2?.bowlers||[]).filter(b=>b.balls>0);
  const totalH=pad+headerH+scoreH+secGap+
    20+(batters1.length+1)*batLineH+10+(bowlers1.length+1)*bowlLineH+secGap+
    (i2?20+(batters2.length+1)*batLineH+10+(bowlers2.length+1)*bowlLineH+secGap:0)+
    30+pad;
  c.width=W;c.height=totalH;

  // Background
  ctx.fillStyle='#f0f7f2';ctx.fillRect(0,0,W,totalH);

  let y=pad;
  // Header
  ctx.fillStyle='#166534';ctx.font='bold 10px Rajdhani,sans-serif';ctx.textAlign='center';
  ctx.fillText('PITCHUP · MATCH SUMMARY',W/2,y+10);
  ctx.fillStyle='#0f172a';ctx.font='bold 20px Oswald,sans-serif';
  ctx.fillText(m.teamA+' vs '+m.teamB,W/2,y+36);
  ctx.fillStyle='#64748b';ctx.font='11px Rajdhani,sans-serif';
  const dateStr=m.date?new Date(m.date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'';
  ctx.fillText(m.totalOvers+' overs · '+(m.bowlingMode==='charlie'?'Charlie Cricket':'Standard')+
    (m.venue?' · '+m.venue:'')+(dateStr?' · '+dateStr:''),W/2,y+52);
  y+=headerH;

  // Result banner
  ctx.fillStyle='#166534';ctx.fillRect(pad,y,W-pad*2,scoreH);
  ctx.fillStyle='#fff';ctx.font='bold 22px Oswald,sans-serif';ctx.textAlign='center';
  ctx.fillText(winner==='Tie'?'TIE!':'🏆 '+winner.toUpperCase()+' WIN!',W/2,y+28);
  if(margin){ctx.font='13px Rajdhani,sans-serif';ctx.fillText(margin,W/2,y+44);}
  y+=scoreH+secGap;

  // Scorecard rendering helper
  function drawInnings(inn,teamName){
    if(!inn)return;
    const bats=inn.batters.filter(b=>b.balls>0||b.out);
    const bwls=inn.bowlers.filter(b=>b.balls>0);
    // Team header
    ctx.fillStyle='#0f172a';ctx.font='bold 14px Oswald,sans-serif';ctx.textAlign='left';
    ctx.fillText(teamName+' — '+inn.total+'/'+inn.wickets+' ('+overStr(inn.legalBalls,bpo)+')',pad,y+14);
    y+=20;
    // Batting header
    ctx.fillStyle='#64748b';ctx.font='bold 10px Rajdhani,sans-serif';
    ctx.fillText('Batter',pad,y+12);
    ctx.textAlign='right';
    ctx.fillText('R',W-pad-120,y+12);ctx.fillText('B',W-pad-90,y+12);
    ctx.fillText('4s',W-pad-60,y+12);ctx.fillText('6s',W-pad-30,y+12);
    ctx.fillText('SR',W-pad,y+12);
    y+=batLineH;
    // Batting rows
    bats.forEach(b=>{
      const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
      ctx.fillStyle=b.out?'#dc2626':'#0f172a';
      ctx.font='11px Source Sans 3,sans-serif';ctx.textAlign='left';
      ctx.fillText(b.name,pad,y+12);
      ctx.fillStyle='#0f172a';ctx.textAlign='right';
      ctx.font='bold 11px Oswald,sans-serif';
      ctx.fillText(String(b.runs),W-pad-120,y+12);
      ctx.font='11px Source Sans 3,sans-serif';ctx.fillStyle='#64748b';
      ctx.fillText(String(b.balls),W-pad-90,y+12);
      ctx.fillText(String(b.fours||0),W-pad-60,y+12);
      ctx.fillText(String(b.sixes||0),W-pad-30,y+12);
      ctx.fillText(sr,W-pad,y+12);
      y+=batLineH;
    });
    // Extras
    ctx.fillStyle='#64748b';ctx.font='10px Rajdhani,sans-serif';ctx.textAlign='left';
    ctx.fillText('Extras: '+inn.extras.total+' (W:'+inn.extras.wides+' NB:'+inn.extras.noBalls+' B:'+inn.extras.byes+' LB:'+inn.extras.legByes+')',pad,y+10);
    y+=14;
    // Bowling header
    ctx.fillStyle='#64748b';ctx.font='bold 10px Rajdhani,sans-serif';ctx.textAlign='left';
    ctx.fillText('Bowler',pad,y+12);
    ctx.textAlign='right';
    ctx.fillText('O',W-pad-120,y+12);ctx.fillText('R',W-pad-90,y+12);
    ctx.fillText('W',W-pad-60,y+12);ctx.fillText('Econ',W-pad,y+12);
    y+=bowlLineH;
    bwls.forEach(b=>{
      const econ=b.balls>0?(b.runs/(b.balls/bpo)).toFixed(1):'-';
      ctx.fillStyle='#0f172a';ctx.font='11px Source Sans 3,sans-serif';ctx.textAlign='left';
      ctx.fillText(b.name,pad,y+12);
      ctx.textAlign='right';ctx.fillStyle='#64748b';
      ctx.fillText(overStr(b.balls,bpo),W-pad-120,y+12);
      ctx.fillText(String(b.runs),W-pad-90,y+12);
      ctx.fillStyle='#166534';ctx.font='bold 11px Oswald,sans-serif';
      ctx.fillText(String(b.wickets),W-pad-60,y+12);
      ctx.fillStyle='#64748b';ctx.font='11px Source Sans 3,sans-serif';
      ctx.fillText(econ,W-pad,y+12);
      y+=bowlLineH;
    });
    y+=secGap;
  }

  drawInnings(i1,m.teamA);
  drawInnings(i2,m.teamB);

  // Footer
  ctx.fillStyle='#94a3b8';ctx.font='9px Rajdhani,sans-serif';ctx.textAlign='center';
  ctx.fillText('Generated by PitchUp · pitchup.up.railway.app',W/2,y+10);

  // Convert to image and share/download
  c.toBlob(blob=>{
    if(!blob)return;
    const file=new File([blob],m.teamA+'_vs_'+m.teamB+'_summary.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({
        title:'Match Summary: '+m.teamA+' vs '+m.teamB,
        text:winner==='Tie'?'TIE!':winner+' won '+margin,
        files:[file]
      }).catch(()=>{downloadBlob(blob,file.name);});
    }else{
      downloadBlob(blob,file.name);
    }
  },'image/png');
}
window.shareMatchSummary=shareMatchSummary;

function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast('Summary image saved','success');
}

// ─── Global error handlers (reports to Sentry if enabled, logs always) ───────
window.addEventListener('error',e=>{
  console.error('Unhandled error:',e.error||e.message);
  sentryCapture(e.error||new Error(e.message),{source:'window.onerror'});
});
window.addEventListener('unhandledrejection',e=>{
  console.error('Unhandled promise rejection:',e.reason);
  sentryCapture(e.reason instanceof Error?e.reason:new Error(String(e.reason)),{source:'unhandledrejection'});
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
detectViewerMode();
loadSyncConfig();
loadAuthCache();
loadState();
updateOffline();
render();
initFirebase();
</script>
