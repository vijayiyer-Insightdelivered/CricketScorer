// Estimate match duration in hours based on format/overs
function estimateMatchDurationHours(m){
  const overs=m&&m.totalOvers?Number(m.totalOvers):20;
  if(m&&m.format==='T20')return 3;
  // Scale: 20 overs = 3 hours, linear extrapolation, min 2h
  return Math.max(2,Math.round((overs/20)*3*10)/10);
}

// Check if two match time windows overlap
// Returns true if they conflict (player can't play both)
function matchWindowsOverlap(currentStart,currentEndHours,otherMatch){
  if(!currentStart)return true; // no date on current match — treat everything same-day as conflict
  if(!otherMatch.matchDate)return true; // other has no date — assume conflict
  const otherStart=new Date(otherMatch.matchDate);
  const otherDurationHours=estimateMatchDurationHours(otherMatch);
  const otherEnd=new Date(otherStart.getTime()+otherDurationHours*60*60*1000);
  const currentStartMs=currentStart.getTime();
  const currentEndMs=currentStartMs+currentEndHours*60*60*1000;
  // Overlap if: current starts before other ends AND current ends after other starts
  return currentStartMs<otherEnd.getTime()&&currentEndMs>otherStart.getTime();
}

// Find players who are already committed to another concurrent match
// Returns a map: lowercased player name -> {matchId, teamName, matchInfo}
function getConcurrentPlayerConflicts(){
  const conflicts={};
  const currentMatchId=setupData.editingMatchId||state.match?.matchId||null;
  const currentDateStr=setupData.matchDate||'';
  const currentStart=currentDateStr?new Date(currentDateStr):null;
  const currentOvers=setupData.format==='T20'?20:(setupData.overs||20);
  const currentDurationHours=setupData.format==='T20'?3:Math.max(2,(currentOvers/20)*3);

  (state.activeMatches||[]).forEach(m=>{
    if(!m||m.matchId===currentMatchId)return;
    if(m.complete)return;
    // Live match being scored — always a conflict (happening right now)
    let isConcurrent=false;
    if(m.scoringLockUid||(m.innings&&m.innings.length>0)){
      isConcurrent=true;
    }else{
      // Check time window overlap with this match's start + estimated duration
      isConcurrent=matchWindowsOverlap(currentStart,currentDurationHours,m);
    }
    if(!isConcurrent)return;
    const addConflict=(name,teamName)=>{
      if(!name)return;
      const key=name.trim().toLowerCase();
      if(key&&!conflicts[key]){
        conflicts[key]={matchId:m.matchId,teamName,matchInfo:m.teamA+' vs '+m.teamB};
      }
    };
    (m.playersA||[]).forEach(p=>addConflict(p,m.teamA));
    (m.playersB||[]).forEach(p=>addConflict(p,m.teamB));
  });
  return conflicts;
}

function addSetupPlayerFromSquad(side,name){
  // Check against the other side of this same match
  const otherArr=side==='A'?setupData.playersB:setupData.playersA;
  const otherSize=side==='A'?setupData.sizeB:setupData.sizeA;
  if(otherArr.slice(0,otherSize).some(p=>(p||'').trim().toLowerCase()===name.trim().toLowerCase())){
    toast(name+' is already in the other team of this match','error');
    return;
  }
  // Check against concurrent matches
  const conflicts=getConcurrentPlayerConflicts();
  const conflict=conflicts[name.trim().toLowerCase()];
  if(conflict){
    toast(name+' is already in '+conflict.matchInfo,'error');
    return;
  }
  const arr=side==='A'?setupData.playersA:setupData.playersB;
  const sizeKey=side==='A'?'sizeA':'sizeB';
  const emptyIdx=arr.findIndex((p,i)=>i<setupData[sizeKey]&&(!p||!p.trim()));
  if(emptyIdx>=0){
    arr[emptyIdx]=name;
  }else{
    arr.push(name);
    setupData[sizeKey]=Math.min(15,setupData[sizeKey]+1);
  }
  render();
}
window.addSetupPlayerFromSquad=addSetupPlayerFromSquad;

  const otherSize=side==='A'?setupData.sizeB:setupData.sizeA;
  const otherNames=otherArr.slice(0,otherSize).map(p=>(p||'').trim().toLowerCase()).filter(Boolean);
  // Players already booked in parallel matches
  const conflicts=getConcurrentPlayerConflicts();

  const allRegions=[...new Set(state.squads.map(s=>s.region).filter(Boolean))].sort();
  const allGroups=[...new Set(state.squads.filter(s=>!f.region||s.region===f.region).map(s=>s.group).filter(Boolean))].sort();
  const searchLower=f.search.trim().toLowerCase();

  const matches=[];
  getVisibleSquads().forEach(sq=>{
    if(f.region&&sq.region!==f.region)return;
    if(f.group&&sq.group!==f.group)return;
    sq.players.forEach(p=>{
      if(searchLower&&!p.name.toLowerCase().includes(searchLower))return;
      if(f.skills.length>0){

        if(!f.skills.some(s=>ps.includes(s)))return;

  }).join('');

        <option value="">All Regions</option>
        ${allRegions.map(r=>`<option value="${escHtml(r)}" ${f.region===r?'selected':''}>📍 ${escHtml(r)}</option>`).join('')}

        const nameLower=p.name.trim().toLowerCase();
        const alreadyAdded=existingNames.includes(nameLower);

// ─── SCORING ──────────────────────────────────────────────────────────────────
function renderScorecard(inn,teamName,bpo){
  if(!inn)return'';
  const crr=inn.legalBalls>0?((inn.total/inn.legalBalls)*bpo).toFixed(2):'0.00';
  // Get captain/keeper from match if available
  const m=state.match||viewerMatch||{};
  const capName=(teamName===m.teamA?m.captainA:m.captainB)||'';
  const kprName=(teamName===m.teamA?m.keeperA:m.keeperB)||'';
  let br='';
  inn.batters.filter(b=>b.balls>0||inn.currentBatters.includes(b.id)).forEach(b=>{
    const isA=inn.currentBatters.includes(b.id);
    const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
    const nc=isA?'td-active':b.retired?'td-retired':'td-normal';
    const pre=isA?'⚡ ':b.retired?'🏃 ':'';
    const isCap=capName&&b.name===capName;
    const isKpr=kprName&&b.name===kprName;
    const roleBadge=(isCap?'©':'')+(isKpr?' 🧤':'');
    const outsCount=b.outsCount||0;
    const outsLabel=outsCount>1?` · out ×${outsCount}`:'';
    let sub='';
    if(b.retired)sub=`<div class="td-sub">retired not out</div>`;
    else if(b.out)sub=`<div class="td-sub">${escHtml(b.dismissal)}${outsLabel}</div>`;
    else if(outsCount>0)sub=`<div class="td-sub" style="color:#b45309;">back after being out${outsCount>1?' ×'+outsCount:''}</div>`;
    br+=`<tr><td><span class="${nc}">${pre}${escHtml(b.name)}${roleBadge?'<span style="font-size:10px;margin-left:3px;">'+roleBadge+'</span>':''}</span>${sub}</td>
      <td class="td-runs">${b.runs}</td><td class="td-stat">${b.balls}</td>
      <td class="td-stat">${b.fours}</td><td class="td-stat">${b.sixes}</td><td class="td-stat">${sr}</td></tr>`;
  });
  let bwr='';
  inn.bowlers.filter(b=>b.balls>0||b.wides>0||b.noBalls>0).forEach(b=>{
    const econ=b.balls>0?(b.runs/(b.balls/bpo)).toFixed(1):'-';
    const isA=inn.charlieBowlers[0]===b.id;
    const nc=isA?'td-bact':b.retiredInjured?'td-bret':'';
    const pre=isA?'⚡ ':b.retiredInjured?'🚑 ':'';
    const sub=b.retiredInjured?`<div style="font-size:9px;color:#fb923c;">${b.retireReason}</div>`:'';
    bwr+=`<tr><td><span class="${nc}">${pre}${escHtml(b.name)}</span>${sub}</td>
      <td>${overStr(b.balls,bpo)}</td><td>${b.runs}</td><td>${b.wickets}</td>
      <td>${b.wides}</td><td>${b.noBalls}</td><td>${econ}</td></tr>`;
  });
  return `<div class="card anim-in">
    <div class="card-head"><span class="card-head-title">${escHtml(teamName)}</span><span class="card-head-crr">CRR ${crr}</span></div>
    <table class="ct"><thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody>${br}</tbody></table>
    <div class="card-extras"><span style="color:var(--home-muted)">Extras <strong style="color:var(--home-text)">${inn.extras.total}</strong> (W:${inn.extras.wides} NB:${inn.extras.noBalls} B:${inn.extras.byes} LB:${inn.extras.legByes})</span><span class="card-total">${inn.total}/${inn.wickets} (${overStr(inn.legalBalls,bpo)})</span></div>
    <div class="card-bowling"><table class="cbt"><thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Econ</th></tr></thead><tbody>${bwr}</tbody></table></div>
  </div>`;
}

function renderScoring(){
  const m=state.match,inn=getInn(),bpo=getBpo(),rules=getRules();
  const charlie=(m.bowlingMode||'charlie')==='charlie';
  const batTeam=state.currentInnings===0?m.teamA:m.teamB;
  const bowlTeam=state.currentInnings===0?m.teamB:m.teamA;
  const inningsOver=isInningsOver();
  const baseTarget=state.currentInnings===1&&m.innings[0]?m.innings[0].total+1:null;
  const target=baseTarget?baseTarget+(m.targetAdjustment||0):null;
  const runsNeeded=target?target-(inn.total||0):null;
  const ballsLeft=(m.totalOvers*bpo)-inn.legalBalls;

  let batsHtml='';
  inn.currentBatters.forEach((bId,i)=>{
    const b=inn.batters.find(x=>x.id===bId);if(!b)return;
    const retBalls=rules.retirementBalls||0;
    const nr=(rules.retirementScore>0&&b.runs>=rules.retirementScore-5)||(retBalls>0&&b.balls>=retBalls-5);
    batsHtml+=`<div class="sb-batter ${i===0?'striker':''}" onclick="${i===0?'openModal(\'striker\',{})':''}">
      <span class="sb-role">${i===0?'⚡ STRIKER':'NON-STRIKER'}</span>
      <span class="sb-name">${escHtml(b.name)}</span>
      <span class="sb-sc ${nr?'sb-warn':''}">${b.runs}(${b.balls})${nr?'⚠':''}
      </span>${i===0?'<span class="sb-edit">✎</span>':''}
    </div>`;
  });

  const active=inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const waiting=inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;

  const bvs=[{v:0,c:'b0'},{v:1,c:'b1'},{v:2,c:'b2'},{v:3,c:'b3'},{v:4,c:'b4',s:'FOUR'},{v:6,c:'b6',s:'SIX'}];
  const extraInfo={'Wide':`+${rules.wideRuns}r + runs`,'No Ball':`+${rules.noBallRuns}r + runs`,'Bye':'+ runs','Leg Bye':'+ runs'};

  let wicketSect='';
  if(wicketFormVisible){
    const abIds=inn.currentBatters.filter(Boolean);
    const bsel=abIds.map(id=>{const b=inn.batters.find(x=>x.id===id);return b?`<option value="${id}" ${wfs.outId===id?'selected':''}>${escHtml(b.name)}</option>`:''}).join('');
    const tsel=WICKET_TYPES.map(t=>`<option ${wfs.type===t?'selected':''}>${t}</option>`).join('');
    const needsFielder=wfs.type==='Caught'||wfs.type==='Run Out'||wfs.type==='Stumped';
    const fieldingTeam=state.currentInnings===0?m.playersB:m.playersA;
    const fielderSel=needsFielder?`<div class="wf-row" style="margin-top:0;">
      <select onchange="updateWFS('fielder',this.value)" style="flex:1;">
        <option value="">-- ${wfs.type==='Caught'?'Caught by':wfs.type==='Stumped'?'Stumped by':'Run out by'} --</option>
        ${fieldingTeam.map(name=>`<option value="${escHtml(name)}" ${wfs.fielder===name?'selected':''}>${escHtml(name)}</option>`).join('')}
      </select>
    </div>`:'';
    wicketSect=`<div class="wicket-form">
      <div class="wf-title">🏏 Record Wicket</div>
      <div class="wf-row">
        <select onchange="updateWFS('outId',this.value)">${bsel}</select>
        <select onchange="updateWFS('type',this.value)">${tsel}</select>
        <input type="number" min="0" max="6" value="${wfs.runs}" oninput="updateWFS('runs',this.value)" placeholder="Runs scored"/>
      </div>
      ${fielderSel}
      <div class="form-btns">
        <button class="btn-confirm" onclick="confirmWicket()">Confirm Wicket</button>
        <button class="btn-cancel" onclick="wicketFormVisible=false;render()">Cancel</button>
      </div></div>`;
  }else{
    wicketSect=`<button class="wicket-btn" ${inningsOver?'disabled':''} onclick="openWicketForm()">🏏 WICKET</button>`;
  }

  const overBalls=inn.deliveries.slice(-14).map(d=>{
    let cls='ob-run',lbl=d.runs;
    if(d.isWicket){cls='ob-wkt';lbl='W';}
    else if(d.runs===6)cls='ob-six';
    else if(d.runs===4)cls='ob-four';
    else if(d.isExtra){cls='ob-ext';lbl=d.extraType?.[0]||'E';}
    return `<div class="ob ${cls}">${lbl}</div>`;
  }).join('');

  const maxOv=rules.maxOversPerBowler||0;
  function bowlerQuotaLabel(bw){
    if(!bw||!maxOv)return '';
    const used=Math.floor(bw.balls/bpo);
    return ` · ${used}/${maxOv}ov`;
  }

  // Bowler stats helper
  function bwStatLine(bw){
    if(!bw)return '';
    const econ=bw.balls>0?(bw.runs/(bw.balls/bpo)).toFixed(1):'-';
    return `${overStr(bw.balls,bpo)}ov · ${bw.runs}r · ${bw.wickets}w · ${bw.wides}wd · ${bw.noBalls}nb · Econ ${econ}${bowlerQuotaLabel(bw)}`;
  }

  let mainContent='';
  if(showScorecard){
    mainContent=renderScorecard(inn,batTeam,bpo);
    if(m.innings[0]&&state.currentInnings===1)mainContent+=renderScorecard(m.innings[0],m.teamA,bpo);
  }else{
    mainContent=`
      <!-- LAYER 2: Batter cards -->
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;align-items:stretch;">
        ${inn.currentBatters.map((bId,i)=>{
          const b=bId?inn.batters.find(x=>x.id===bId):null;
          if(!b)return `<div class="sb-batter" style="flex:1;min-width:110px;cursor:pointer;border:2px dashed #fecaca;background:#fef2f2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px;" onclick="openModal('newbatter',{reason:'vacant'})">
            <span style="font-size:20px;">🏏</span>
            <span style="font-family:var(--fu);font-size:12px;font-weight:700;color:#dc2626;">Select Batter</span>
            <span style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${i===0?'Striker':'Non-striker'} needed</span>
          </div>`;
          const retBalls=rules.retirementBalls||0;
          const nr=(rules.retirementScore>0&&b.runs>=rules.retirementScore-5)||(retBalls>0&&b.balls>=retBalls-5);
          const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
          return `<div class="sb-batter ${i===0?'striker':''}" style="flex:1;min-width:110px;cursor:pointer;" onclick="openModal('striker',{})">
            <span class="sb-role">${i===0?'⚡ STRIKER':'NON-STRIKER'}</span>
            <span class="sb-name">${escHtml(b.name)}</span>
            <div style="display:flex;gap:8px;align-items:center;margin-top:2px;">
              <span class="sb-sc ${nr?'sb-warn':''}" style="font-size:18px;">${b.runs}<span style="font-size:11px;color:var(--home-muted);">(${b.balls})</span>${nr?'⚠':''}</span>
              <span style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${b.fours}×4 · ${b.sixes}×6 · SR ${sr}</span>
            </div>
            <div style="display:flex;gap:4px;margin-top:3px;">
              <button onclick="event.stopPropagation();addPlayerNote('${b.name.replace(/'/g,"\\'")}')" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;color:#2563eb;font-size:9px;padding:2px 6px;cursor:pointer;font-family:var(--fu);font-weight:700;">📝</button>
              ${(state.match?.playerNotes||[]).filter(n=>n.playerName===b.name).length>0?`<button onclick="event.stopPropagation();viewPlayerNotes('${b.name.replace(/'/g,"\\'")}')" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;color:var(--grass);font-size:9px;padding:2px 6px;cursor:pointer;font-family:var(--fu);font-weight:700;">${(state.match?.playerNotes||[]).filter(n=>n.playerName===b.name).length} notes</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
      <button onclick="swapStrike()" style="width:100%;background:#fff;border:1.5px solid var(--home-border);border-radius:9px;color:var(--home-text);padding:7px;cursor:pointer;font-family:var(--fu);font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;">⇄ Swap Strike</button>

      <!-- Partnership tracker -->
      ${(()=>{
        // Compute current partnership from deliveries since last wicket
        const dels=inn.deliveries;
        let lastWktIdx=-1;
        for(let i=dels.length-1;i>=0;i--){if(dels[i].isWicket){lastWktIdx=i;break;}}
        const partDels=dels.slice(lastWktIdx+1);
        const partRuns=partDels.reduce((s,d)=>s+(d.runs||0),0);
        const partBalls=partDels.filter(d=>!d.isExtra||(d.extraType!=='Wide'&&d.extraType!=='No Ball')).length;
        const bat0=inn.currentBatters[0]?inn.batters.find(b=>b.id===inn.currentBatters[0]):null;
        const bat1=inn.currentBatters[1]?inn.batters.find(b=>b.id===inn.currentBatters[1]):null;
        // Count per-batter runs in partnership
        let bat0Part=0,bat1Part=0;
        partDels.forEach(d=>{
          if(!d.isWicket&&!d.isExtra){
            if(d.batter===bat0?.name)bat0Part+=d.runs||0;
            else if(d.batter===bat1?.name)bat1Part+=d.runs||0;
          }
        });
        if(partBalls===0&&partRuns===0)return '';
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#fff;border:1px solid var(--home-border);border-radius:10px;padding:6px 10px;">
          <div style="font-size:9px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1px;">PARTNERSHIP</div>
          <div style="font-family:var(--fd);font-size:16px;font-weight:700;color:var(--home-text);">${partRuns}</div>
          <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">(${partBalls}b)</div>
          <div style="flex:1;"></div>
          ${bat0?`<span style="font-size:10px;font-family:var(--fu);color:var(--home-text);">${escHtml(bat0.name.split(' ')[0])} ${bat0Part}</span>`:''}
          ${bat0&&bat1?'<span style="color:var(--home-muted);font-size:10px;">·</span>':''}
          ${bat1?`<span style="font-size:10px;font-family:var(--fu);color:var(--home-text);">${escHtml(bat1.name.split(' ')[0])} ${bat1Part}</span>`:''}
        </div>`;
      })()}

      <!-- LAYER 3: Bowler stats card with change bowler -->
      ${charlie?`
      <div style="background:rgba(232,168,32,.05);border:1px solid rgba(232,168,32,.15);border-radius:12px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:600;">Bowling Pair</span>
          <button class="c-retire-btn" style="padding:5px 10px;border-radius:8px;font-size:11px;" onclick="retireBowlerState={slot:null,reason:'By Mistake'};openModal('retireBowler',{})">🔄 Change</button>
        </div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;background:#f8fafc;border-radius:9px;padding:7px 9px;">
            <div style="font-size:9px;color:var(--grass3);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟢 BOWLING NOW</div>
            <div style="font-family:var(--fd);font-size:15px;color:var(--home-text);margin:2px 0;">${escHtml(active?.name||'—')}</div>
            <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${active?bwStatLine(active):''}</div>
          </div>
          <button class="swap-btn" onclick="swapBowlers()" title="Manual swap" style="align-self:center;">⇄</button>
          <div style="flex:1;background:#f8fafc;border-radius:9px;padding:7px 9px;">
            <div style="font-size:9px;color:var(--gold);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟡 BOWLING NEXT</div>
            <div style="font-family:var(--fd);font-size:15px;color:var(--home-text);margin:2px 0;">${escHtml(waiting?.name||'—')}</div>
            <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${waiting?bwStatLine(waiting):''}</div>
          </div>
        </div>
      </div>`:`
      <div style="background:rgba(58,181,106,.05);border:1px solid rgba(58,181,106,.15);border-radius:12px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--grass3);text-transform:uppercase;font-weight:600;">Current Bowler</span>
          <div style="display:flex;gap:6px;">
            <button class="swap-btn" onclick="swapBowlers()" style="border-color:rgba(58,181,106,.3);color:var(--grass3);padding:5px 10px;border-radius:8px;font-size:11px;">⇄ Change</button>
            <button class="c-retire-btn" style="padding:5px 10px;border-radius:8px;font-size:11px;" onclick="retireBowlerState={slot:null,reason:'By Mistake'};openModal('retireBowler',{})">🔄 Replace</button>
          </div>
        </div>
        <div style="background:#f8fafc;border-radius:9px;padding:8px 10px;">
          <div style="font-family:var(--fd);font-size:16px;color:var(--home-text);margin-bottom:2px;">${escHtml(active?.name||'—')}</div>
          <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);">${active?bwStatLine(active):''}</div>
        </div>
      </div>`}

      <!-- LAYER 4: This Over + Run buttons + Extras + Wicket -->
      <div class="score-zone">
        <div class="zone-lbl">This Over</div>
        <div class="over-row">${overBalls}</div>
        <div class="ball-grid">${bvs.map(b=>`<button class="ball-btn ${b.c}" ${inningsOver?'disabled':''} onclick="scoreRuns(${b.v})">${b.v}${b.s?`<span class="badge">${b.s}</span>`:''}</button>`).join('')}</div>
        <div class="extras-grid">${['Wide','No Ball','Bye','Leg Bye'].map(e=>`<button class="extra-btn" ${inningsOver?'disabled':''} onclick="scoreExtra('${e}')"><span class="en">${e.toUpperCase()}</span><span class="es">${extraInfo[e]}</span></button>`).join('')}</div>
        ${wicketSect}
        <button onclick="openModal('scoringNotes',{})" style="width:100%;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;color:#2563eb;padding:10px;font-size:13px;font-family:var(--fd);font-weight:600;cursor:pointer;letter-spacing:1px;">📝 ADD NOTE FOR ANY PLAYER</button>
      </div>

      ${inningsOver?`<button class="end-btn" onclick="endInnings()">${state.currentInnings===0?'END INNINGS → Start 2nd':'🏆 END MATCH'}</button>`:''}

      <!-- LAYER 5: Tandem bowling info (Charlie) -->
      ${charlie?`
      <div class="charlie-panel" style="margin-top:10px;">
        <div class="charlie-hdr">
          <span class="charlie-lbl">⚡ Charlie Tandem Bowling</span>
        </div>
        <div style="display:flex;gap:10px;margin-top:6px;">
          <div style="flex:1;text-align:center;">
            <div style="font-size:9px;color:var(--grass3);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟢 BOWLING</div>
            <div style="font-family:var(--fd);font-size:14px;color:var(--home-text);">${escHtml(active?.name||'—')}</div>
            <div class="b-can yes" style="font-size:10px;">✅ Can field this ball</div>
          </div>
          <div style="flex:1;text-align:center;">
            <div style="font-size:9px;color:var(--gold);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟡 WAITING</div>
            <div style="font-family:var(--fd);font-size:14px;color:var(--home-text);">${escHtml(waiting?.name||'—')}</div>
            <div class="b-can no" style="font-size:10px;">❌ Cannot field this ball</div>
          </div>
        </div>
        <div style="font-size:10px;color:var(--home-muted);margin-top:6px;text-align:center;font-family:var(--fu);">Bowlers auto-swap after each legal delivery</div>
      </div>`:''}

      <div class="rules-pills" style="margin-top:8px;">
        <span class="rpill">${bpo}b/over</span>
        <span class="rpill">Wide +${rules.wideRuns}r${rules.wideBowlAgain?' rebowl':''}</span>
        <span class="rpill">NB +${rules.noBallRuns}r${rules.noBallBowlAgain?' rebowl':''}</span>
        ${rules.retirementScore>0?`<span class="rpill">Retire@${rules.retirementScore}</span>`:''}
        ${maxOv>0?`<span class="rpill">Max ${maxOv}ov/bowler</span>`:''}
      </div>

      ${renderScorecard(inn,batTeam,bpo)}`;
  }

  const locked=!canScore();
  const lockBanner=locked?`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;">
    <span style="font-size:18px;">🔒</span>
    <div style="flex:1;">
      <div style="font-family:var(--fu);font-size:12px;font-weight:700;color:#dc2626;">Locked by ${escHtml(lockOwnerName())}</div>
      <div style="font-size:10px;color:#991b1b;font-family:var(--fu);">View only — scoring disabled</div>
    </div>
    ${isAdmin()?`<button onclick="takeLock()" style="background:#dc2626;border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;font-family:var(--fu);font-weight:700;cursor:pointer;">Take Lock</button>`:''}
  </div>`:'';

  return `<div class="screen dark active">
    <div class="topbar dark">
      <span style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--grass3);">${escHtml(batTeam)} vs ${escHtml(bowlTeam)}</span>
      <div class="topbar-actions">
        ${!locked&&_undoStack.length>0?`<button class="tbtn dark" onclick="undoLastBall()" title="Undo last ball" style="color:#f87171;">↩</button>`:''}
        ${!locked?`<button class="tbtn dark" onclick="openTransferModal()" title="Transfer scoring">🔄</button>`:''}
        <button class="tbtn dark" onclick="openShareModal()">📡</button>
        <button class="tbtn dark" onclick="toggleScorecard()">${showScorecard?'▶':'📋'}</button>
        <button class="tbtn gold" onclick="exportCSV(state.match)">📥</button>
      </div>
    </div>
    <div class="screen-inner">
      ${lockBanner}
      <!-- LAYER 1: Top scoreboard -->
      <div class="scoreboard">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="sb-label">${escHtml(batTeam)} BATTING</div>
            <div class="sb-score">${inn.total}<span class="wkts">/${inn.wickets}</span></div>
            <div class="sb-overs">${overStr(inn.legalBalls,bpo)} overs</div>
          </div>
          <div style="text-align:right;">
            ${target?`<div class="sb-target-txt" style="display:flex;align-items:center;gap:6px;">TARGET <strong>${target}</strong>${m.targetAdjustment?` <span style="font-size:10px;color:var(--home-muted);">(${m.targetAdjustment>0?'+':''}${m.targetAdjustment})</span>`:''}
              ${!locked?`<button onclick="event.stopPropagation();adjustTarget()" style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;color:#b45309;padding:2px 6px;cursor:pointer;font-size:9px;font-family:var(--fu);font-weight:700;">±</button>`:''}</div>`:''}
            ${runsNeeded!==null?`<div class="sb-target-txt" style="font-size:11px;">Need ${runsNeeded} off ${ballsLeft}</div>`:''}
            <div style="color:var(--home-muted);font-size:10px;margin-top:6px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;">${m.totalOvers}ov · ${bpo}b/ov</div>
            ${charlie?`<div style="color:var(--gold);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;margin-top:3px;">⚡ CHARLIE MODE</div>`:`<div style="color:var(--grass3);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;margin-top:3px;">🏏 STANDARD</div>`}
            ${rules.retirementScore>0?`<div style="color:#a78bfa;font-size:10px;font-family:'Rajdhani',sans-serif;">Retire@${rules.retirementScore}</div>`:''}
          </div>
        </div>
      </div>
      ${mainContent}
    </div>
  </div>`;
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function renderModal(modal){
  let inner='';
  if(modal.type==='newbatter')inner=renderNewBatterModal(modal.data);
  else if(modal.type==='striker')inner=renderStrikerModal();
  else if(modal.type==='retireBowler')inner=renderRetireBowlerModal();
  else if(modal.type==='replaceBowler')inner=renderReplaceBowlerModal(modal.data);
  else if(modal.type==='nextbowler')inner=renderNextBowlerModal();
  else if(modal.type==='playernote')inner=renderPlayerNoteModal(modal.data);
  else if(modal.type==='viewnotes')inner=renderViewNotesModal(modal.data);
  else if(modal.type==='share')inner=renderShareModal();
  else if(modal.type==='transferLock')inner=renderTransferLockModal();
  else if(modal.type==='byeRuns')inner=renderByeRunsModal(modal.data);
  else if(modal.type==='scoringNotes')inner=renderScoringNotesModal();
  else if(modal.type==='bestXI')inner=`<div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">⭐ Best XI</div><div class="modal-sub">Based on recent form, skills & balance</div><div style="max-height:400px;overflow-y:auto;">${modal.data?.html||''}</div><button class="modal-cancel" onclick="closeModal()">Close</button></div>`;
  else if(modal.type==='matchReport')inner=`<div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">📋 Match Report</div><div class="modal-sub">Copy and paste into WhatsApp, email, or newsletter</div><textarea style="width:100%;height:200px;padding:10px;border:1px solid var(--home-border);border-radius:9px;font-size:12px;font-family:monospace;color:var(--home-text);resize:vertical;" readonly>${escHtml(modal.data?.text||'')}</textarea><button class="modal-cancel" onclick="closeModal()">Close</button></div>`;
  else if(modal.type==='uploadPreview')inner=renderUploadPreviewModal();
  const noClose=modal.type==='newbatter'||modal.type==='nextbowler';
  return `<div class="modal-overlay" onclick="if(event.target===this&&!${noClose})closeModal()">${inner}</div>`;
}

function renderNewBatterModal(data){
  const inn=getInn();
  const fresh=inn.batters.filter(b=>!b.out&&!b.retired&&!inn.currentBatters.includes(b.id));
  const retiredNotOut=inn.batters.filter(b=>!b.out&&b.retired&&!inn.currentBatters.includes(b.id))
    .sort((a,b)=>(a.retiredAt||0)-(b.retiredAt||0));
  const playToFull=getRules().playToFullOvers;
  // When 'Play to full overs' is on and no fresh/retired, allow previously-out batters to return
  const outBatters=playToFull?inn.batters.filter(b=>b.out&&!inn.currentBatters.includes(b.id))
    .sort((a,b)=>(a.outsCount||1)-(b.outsCount||1)||(a.outAt||0)-(b.outAt||0)):[];
  const avail=[...fresh,...retiredNotOut,...(fresh.length===0&&retiredNotOut.length===0?outBatters:[])];
  const isRetired=data?.reason==='retired';
  let listHtml='';
  if(avail.length===0){
    listHtml=`<p style="color:var(--home-muted);font-size:13px;margin-bottom:14px;">No more batters. Innings over.</p>
    <button class="btn-primary" onclick="_pendingNextBowler=false;closeModal();endInnings()">End Innings</button>`;
  }else{
    let items='';
    if(fresh.length>0){
      items+=fresh.map(b=>`<div class="mitem" onclick="selectNewBatter('${b.id}')">
        <span class="mitem-name">${escHtml(b.name)}</span>
        <span class="mitem-meta">Yet to bat</span>
      </div>`).join('');
    }
    if(retiredNotOut.length>0){
      items+=`<div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1px;margin:8px 0 4px;text-transform:uppercase;">Retired Not Out (can bat again)</div>`;
      items+=retiredNotOut.map(b=>`<div class="mitem" style="border-color:#c4b5fd;" onclick="selectNewBatter('${b.id}')">
        <span class="mitem-name">${escHtml(b.name)}</span>
        <span class="mitem-meta" style="color:#7c3aed;">${b.runs}(${b.balls}) · retired${(b.retireCount||0)>1?' ×'+(b.retireCount||0):''}</span>
      </div>`).join('');
    }
    // Only show previously-out batters if rule is on AND no fresh/retired available
    if(fresh.length===0&&retiredNotOut.length===0&&outBatters.length>0){
      items+=`<div style="font-size:11px;color:#dc2626;font-family:var(--fu);font-weight:700;letter-spacing:1px;margin:8px 0 4px;text-transform:uppercase;">Previously Out (Junior Rule — can bat again)</div>`;
      items+=outBatters.map(b=>{
        const outsCount=b.outsCount||1;
        return `<div class="mitem" style="border-color:#fecaca;" onclick="selectReturningOutBatter('${b.id}')">
          <span class="mitem-name">${escHtml(b.name)}</span>
          <span class="mitem-meta" style="color:#dc2626;">${b.runs}(${b.balls}) · out${outsCount>1?' ×'+outsCount:''}</span>
        </div>`;
      }).join('');
    }
    listHtml=`<div class="modal-list">${items}</div>`;
  }
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:${isRetired?'#a78bfa':'#f87171'}">${isRetired?`🏃 ${escHtml(data?.name||'')} Retired Not Out`:'🏏 Wicket — New Batter'}</div>
    <div class="modal-sub">${isRetired?`Retired on ${getRules().retirementScore} — who comes in?`:'Select next batter'}</div>
    ${listHtml}
  </div>`;
}

function renderStrikerModal(){
  const inn=getInn();
  let items='';
  inn.currentBatters.filter(Boolean).forEach(id=>{
    const b=inn.batters.find(x=>x.id===id);if(!b)return;
    const isS=inn.currentBatters[0]===id;
    items+=`<div class="mitem ${isS?'sel':''}" onclick="applyStriker('${id}')">
      <div><span class="mitem-name">${escHtml(b.name)}</span></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="mitem-meta">${b.runs}(${b.balls})</span>
        ${isS?`<span class="mitem-badge">STRIKER ⚡</span>`:''}
      </div>
    </div>`;
  });
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚡ Who faces next delivery?</div>
    <div class="modal-sub">Override which batter is on strike</div>
    <div class="modal-list">${items}</div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>`;
}

function renderRetireBowlerModal(){
  const inn=getInn();
  const charlie=isCharlie();
  const actB=inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const watB=inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;
  const bpo=getBpo();
  // In standard mode only show slot 0 (active bowler); tandem waiting slot irrelevant
  const slots=charlie
    ? [{slot:0,label:'🟢 Bowling Now',b:actB},{slot:1,label:'🟡 Bowling Next',b:watB}]
    : [{slot:0,label:'🟢 Current Bowler',b:actB}];
  let items='';
  slots.forEach(({slot,label,b})=>{
    if(!b)return;
    items+=`<div class="mitem ${retireBowlerState.slot===slot?'sel':''}" onclick="setRetireSlot(${slot})">
      <div>
        <div style="font-size:9px;color:var(--home-muted);font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-bottom:2px;">${label}</div>
        <div class="mitem-name">${escHtml(b.name)}</div>
        <div class="mitem-meta">${overStr(b.balls,bpo)} · ${b.runs}r · ${b.wickets}w</div>
      </div>
      ${retireBowlerState.slot===slot?'<span style="color:var(--gold);font-size:16px;">✓</span>':''}
    </div>`;
  });
  const rsel=RETIRE_REASONS.map(r=>`<option ${retireBowlerState.reason===r?'selected':''}>${r}</option>`).join('');
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:#fb923c;">🔄 Change Bowler</div>
    <div class="modal-sub">Select bowler and reason for change</div>
    <div class="modal-list">${items}</div>
    ${retireBowlerState.slot!==null?`<div class="form-section"><label class="form-label">Reason</label><select class="form-input" onchange="setRetireReason(this.value)">${rsel}</select></div>`:''}
    <div class="form-btns" style="margin-bottom:8px;">
      <button class="btn-confirm" ${retireBowlerState.slot===null?'disabled style="opacity:.4"':''} onclick="confirmRetireBowler()">Change Bowler</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
}

function renderReplaceBowlerModal(data){
  const inn=getInn();
  const bpo=getBpo();
  const bowlingPlayers=state.currentInnings===0?state.match.playersB:state.match.playersA;
  const activeBIds=inn.charlieBowlers.filter(Boolean);
  const avail=bowlingPlayers.filter(name=>{
    const ex=inn.bowlers.find(b=>b.name===name);
    if(!ex)return true;
    return !ex.retiredInjured&&!activeBIds.includes(ex.id);
  });
  // Injured/retired bowlers who could come back
  const injured=inn.bowlers.filter(b=>b.retiredInjured&&!activeBIds.includes(b.id));
  let items=avail.length===0&&injured.length===0?`<p style="color:var(--home-muted);font-size:13px;margin-bottom:14px;">No bowlers available.</p>`:
    `<div class="modal-list">${avail.map(name=>{
      const ex=inn.bowlers.find(b=>b.name===name);
      return `<div class="mitem" onclick="applyReplaceBowler('${escHtml(name)}',${data.slot})">
        <span class="mitem-name">${escHtml(name)}</span>
        <span class="mitem-meta">${ex?`${overStr(ex.balls,bpo)} · ${ex.runs}r`:'Fresh'}</span>
      </div>`;
    }).join('')}</div>`;
  const injuredHtml=injured.length>0?`
    <div style="font-size:11px;color:#fb923c;font-family:var(--fu);font-weight:700;letter-spacing:1px;margin:10px 0 6px;text-transform:uppercase;">Recovered (can bowl again)</div>
    <div class="modal-list">${injured.map(b=>{
      const safeName=b.name.replace(/'/g,"\\'");
      return `<div class="mitem" style="border-color:#fed7aa;" onclick="recoverBowler('${safeName}',${data.slot})">
        <span class="mitem-name">${escHtml(b.name)}</span>
        <span class="mitem-meta" style="color:#fb923c;">${overStr(b.balls,bpo)} · ${b.runs}r · was: ${escHtml(b.retireReason||'retired')}</span>
      </div>`;
    }).join('')}</div>`:'';

  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🔄 Replacement Bowler</div>
    <div class="modal-sub">Who takes the ${data.slot===0?'active':'waiting'} bowling slot?</div>
    ${items}
    ${injuredHtml}
    <button class="modal-cancel" style="margin-bottom:6px;" onclick="skipBowlerPick(${data.slot})">⏭ Pick Later</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>`;
}

// ─── Player Notes ────────────────────────────────────────────────────────────
let noteFormText='';

function addPlayerNote(playerName){
  noteFormText='';
  openModal('playernote',{playerName});
}
window.addPlayerNote=addPlayerNote;

function savePlayerNote(){
  const m=state.match;if(!m)return;
  const data=state.modal?.data;if(!data)return;
  const text=noteFormText.trim();if(!text)return;
  if(!m.playerNotes)m.playerNotes=[];
  m.playerNotes.push({
    playerName:data.playerName,
    note:text,
    timestamp:new Date().toISOString(),
    author:authUser?.displayName||authUser?.email||'',
    category:document.getElementById('note-category')?.value||'general'
  });
  noteFormText='';
  persist();
  if(state.match&&!state.match.complete)syncMatchToFirestore(true);
  closeModal();
}
window.savePlayerNote=savePlayerNote;

function deletePlayerNote(idx){
  if(!state.match?.playerNotes)return;
  state.match.playerNotes.splice(idx,1);
  persist();render();
}
window.deletePlayerNote=deletePlayerNote;

function viewPlayerNotes(playerName){
  openModal('viewnotes',{playerName});
}
window.viewPlayerNotes=viewPlayerNotes;

function renderPlayerNoteModal(data){
  const categories=[
    {val:'appreciation',label:'👏 Appreciation',color:'#16a34a'},

    {val:'attitude',label:'💪 Attitude',color:'#d97706'},

  ];
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📝 Note for ${escHtml(data.playerName)}</div>

    <div style="margin-bottom:10px;">

            <span style="font-size:9px;color:var(--home-muted);font-family:var(--fu);">${d}</span>
          </div>
          <div style="font-size:12px;color:var(--home-text);font-family:var(--fb);line-height:1.5;">${escHtml(n.note)}</div>

// ─── Share Live Match (QR code for parents) ─────────────────────────────────
function openShareModal(){
  if(!state.match?.matchId){toast('Save match first','error');return;}
  // Force a sync so viewers can see the latest state
  syncMatchToFirestore(true);
  openModal('share',{});
}
window.openShareModal=openShareModal;

function renderShareModal(){
  const matchId=state.match?.matchId;
  if(!matchId)return '<div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">No active match</div></div>';
  const baseUrl=window.location.origin+window.location.pathname;
  const viewerUrl=baseUrl+'?view='+matchId;
  const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=240x240&data='+encodeURIComponent(viewerUrl);
  const m=state.match;
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📡 Share Live Match</div>
    <div class="modal-sub">Parents and spectators can scan this QR or open the link to watch live</div>
    <div style="background:#fff;padding:14px;border-radius:14px;text-align:center;margin-bottom:12px;border:1px solid var(--home-border);">
      <img src="${qrUrl}" alt="QR Code" style="width:100%;max-width:240px;height:auto;display:block;margin:0 auto;"/>
      <div style="font-family:var(--fu);font-size:11px;font-weight:700;color:var(--home-text);margin-top:8px;">${escHtml(m.teamA)} vs ${escHtml(m.teamB)}</div>
      <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">Live Scorecard</div>
    </div>
    <div style="background:#f8fafc;border:1px solid var(--home-border);border-radius:9px;padding:8px 10px;margin-bottom:10px;font-size:10px;font-family:monospace;color:var(--home-text);word-break:break-all;">${escHtml(viewerUrl)}</div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <button class="btn-primary" style="flex:1;" onclick="copyShareUrl('${viewerUrl.replace(/'/g,"\\'")}')">📋 Copy Link</button>
      ${navigator.share?`<button class="btn-primary" style="flex:1;background:#2563eb;" onclick="nativeShare('${viewerUrl.replace(/'/g,"\\'")}','${escHtml(m.teamA)} vs ${escHtml(m.teamB)}')">📤 Share</button>`:''}
    </div>
    <button class="modal-cancel" onclick="closeModal()">Close</button>
  </div>`;
}

function copyShareUrl(url){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>toast('Link copied!','success')).catch(()=>{
      prompt('Copy this link:',url);
    });
  }else{
    prompt('Copy this link:',url);
  }
}
window.copyShareUrl=copyShareUrl;

function nativeShare(url,title){
  if(navigator.share){
    navigator.share({title:'PitchUp Live: '+title,text:'Watch '+title+' live on PitchUp',url}).catch(()=>{});
  }
}
window.nativeShare=nativeShare;

// ─── Transfer Scoring Lock ──────────────────────────────────────────────────
let transferUsers=[];
let transferLoadStatus='idle'; // 'idle'|'loading'|'loaded'|'error'

function openTransferModal(){
  if(!state.match){toast('No active match','error');return;}
  if(!canScore()){toast('Only the current scoring user can transfer the match','error');return;}
  transferUsers=[];transferLoadStatus='loading';
  openModal('transferLock',{});
  // Load users from Firestore
  if(db){
    db.collection('users').get().then(snap=>{
      transferUsers=[];
      snap.forEach(doc=>{
        const u=doc.data();
        if(u.uid&&u.uid!==authUser.uid)transferUsers.push(u);
      });
      transferLoadStatus='loaded';
      const overlay=document.querySelector('.modal-overlay');
      if(overlay)overlay.innerHTML=renderTransferLockModal();
    }).catch(()=>{
      transferLoadStatus='error';
      const overlay=document.querySelector('.modal-overlay');
      if(overlay)overlay.innerHTML=renderTransferLockModal();
    });
  }
}
window.openTransferModal=openTransferModal;

function transferScoringTo(uid,email,name){
  confirmModal('Transfer scoring rights to '+name+'? You will no longer be able to score this match unless they transfer it back.','Transfer Scoring',{okLabel:'Transfer'}).then(ok=>{
    if(!ok)return;
    state.match={...state.match,
      scoringLockUid:uid,
      scoringLockEmail:email,
      scoringLockName:name,
      scoringLockAt:new Date().toISOString(),
    };
    persist();syncMatchToFirestore(true);
    closeModal();
    toast('Scoring transferred to '+name,'success');
    render();
  });
}
window.transferScoringTo=transferScoringTo;

function releaseLock(){
  confirmModal('Release the scoring lock? Anyone can then take over scoring this match.','Release Lock',{okLabel:'Release'}).then(ok=>{
    if(!ok)return;
    state.match={...state.match,
      scoringLockUid:null,scoringLockEmail:'',scoringLockName:'',scoringLockAt:null};
    persist();syncMatchToFirestore(true);
    closeModal();render();
  });
}
window.releaseLock=releaseLock;

function takeLock(){
  confirmModal('Take scoring control of this match? The current locker ('+lockOwnerName()+') will lose scoring rights.','Take Lock',{danger:true,okLabel:'Take Lock'}).then(ok=>{
    if(!ok)return;
    _takeLockInternal();
  });
}
function _takeLockInternal(){
  state.match={...state.match,
    scoringLockUid:authUser?.uid||null,
    scoringLockEmail:authUser?.email||'',
    scoringLockName:authUser?.displayName||authUser?.email||'',
    scoringLockAt:new Date().toISOString(),
  };
  persist();syncMatchToFirestore(true);
  closeModal();render();
}

// ─── Next Bowler Modal (end of over / pair) ──────────────────────────────────
let nextBowlerSelection={slot0:null,slot1:null};
let _pendingNextBowler=false; // queued bowler change after batter modal closes

function renderNextBowlerModal(){
  const inn=getInn();if(!inn)return '';
  const bpo=getBpo();
  const charlie=isCharlie();
  const rules=getRules();
  const maxOv=rules.maxOversPerBowler||0;
  const bowlingPlayers=state.currentInnings===0?state.match.playersB:state.match.playersA;
  const activeBIds=inn.charlieBowlers.filter(Boolean);

  // Categorise all bowling-side players
  const previousPair=[];
  const available=[];
  const quotaDone=[];
  const injured=[];

  bowlingPlayers.forEach((name,idx)=>{
    const ex=inn.bowlers.find(b=>b.name===name);
    const num=idx+1;
    const entry={name,ex,num};
    if(ex&&ex.retiredInjured){injured.push(entry);return;}
    if(ex&&activeBIds.includes(ex.id)){previousPair.push(entry);return;}
    if(ex&&maxOv>0&&Math.floor(ex.balls/bpo)>=maxOv){quotaDone.push(entry);return;}
    available.push(entry);
  });

  function bowlerStats(b){
    if(!b.ex)return 'Fresh';
    const oStr=overStr(b.ex.balls,bpo);
    let s=`${oStr} · ${b.ex.runs}r · ${b.ex.wickets}w`;
    if(maxOv>0){const used=Math.floor(b.ex.balls/bpo);s+=` · ${used}/${maxOv}ov`;}
    return s;
  }

  function infoItem(b,tag,color){
    return `<div class="mitem" style="opacity:0.45;border-radius:10px;">
      <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
      <span class="mitem-name">${escHtml(b.name)}</span>
      <span class="mitem-meta">${bowlerStats(b)} · <span style="color:${color};font-weight:700;">${tag}</span></span>
    </div>`;
  }

  function sectionHdr(title,color){
    return `<div style="font-size:11px;color:${color};font-family:var(--fu);font-weight:700;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;">${title}</div>`;
  }

  const overNum=inn.overs;
  const sel0=nextBowlerSelection.slot0;
  const sel1=nextBowlerSelection.slot1;
  let content='';

  if(charlie){
    // Single list — tap once = Active (slot 0), tap again or second player = Waiting (slot 1)
    // Show assignment badges on each item
    const listItems=available.map(b=>{
      const safeName=b.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const isSlot0=sel0===b.name;
      const isSlot1=sel1===b.name;
      const borderColor=isSlot0?'var(--grass3)':isSlot1?'var(--gold)':'transparent';
      const badge=isSlot0?'<span style="background:var(--grass3);color:#fff;font-size:9px;font-family:var(--fu);font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:1px;">ACTIVE</span>'
        :isSlot1?'<span style="background:var(--gold);color:#000;font-size:9px;font-family:var(--fu);font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:1px;">WAITING</span>':'';
      return `<div class="mitem" style="border:2px solid ${borderColor};border-radius:10px;cursor:pointer;" onclick="toggleNextBowler('${safeName}')">
        <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
        <span class="mitem-name" style="flex:1;">${escHtml(b.name)}</span>
        ${badge}
        <span class="mitem-meta">${bowlerStats(b)}</span>
      </div>`;
    }).join('');

    // Summary of selections
    const selSummary=(sel0||sel1)?`<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
      ${sel0?`<div style="background:rgba(30,107,60,.15);border:1px solid rgba(30,107,60,.3);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--grass3);font-weight:700;">🟢 Active: ${escHtml(sel0)}</div>`:'<div style="background:#f8fafc;border:1px dashed var(--home-border);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--home-muted);">🟢 Tap a bowler</div>'}
      ${sel1?`<div style="background:rgba(232,168,32,.1);border:1px solid rgba(232,168,32,.25);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--gold);font-weight:700;">🟡 Waiting: ${escHtml(sel1)}</div>`:'<div style="background:#f8fafc;border:1px dashed var(--home-border);border-radius:8px;padding:5px 10px;font-size:12px;font-family:var(--fu);color:var(--home-muted);">🟡 Tap another</div>'}
    </div>`:'';

    content=`
      <div class="modal-title">🏏 Next Bowling Pair</div>
      <div class="modal-sub">Overs ${overNum+1}-${overNum+2} · Tap to assign Active, tap another for Waiting</div>
      ${selSummary}
      ${previousPair.length?`${sectionHdr('Previous Pair (just bowled)','var(--muted)')}<div class="modal-list" style="margin-bottom:10px;">${previousPair.map(b=>infoItem(b,'outgoing','var(--muted)')).join('')}</div>`:''}
      ${sectionHdr('Available Bowlers','var(--gold)')}
      <div class="modal-list">${listItems}${available.length===0?'<div style="color:var(--home-muted);font-size:12px;padding:8px;">No bowlers available</div>':''}</div>
      ${quotaDone.length?`${sectionHdr(`Quota Completed (${maxOv} overs)`,'#f87171')}<div class="modal-list">${quotaDone.map(b=>infoItem(b,'done','#f87171')).join('')}</div>`:''}
      ${injured.length?`${sectionHdr('Recovered? Tap to bring back','#fb923c')}<div class="modal-list">${injured.map(b=>{
        const safeName=b.name.replace(/'/g,"\\'");
        return `<div class="mitem" style="border-color:#fed7aa;cursor:pointer;" onclick="recoverAndSelectBowler('${safeName}')">
          <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
          <span class="mitem-name" style="flex:1;">${escHtml(b.name)}</span>
          <span class="mitem-meta" style="color:#fb923c;">was: ${escHtml(b.reason||'retired')}</span>
        </div>`;
      }).join('')}</div>`:''}
      <button class="btn-primary" style="width:100%;margin-top:10px;" onclick="confirmNextBowler()" ${sel0&&sel1?'':'disabled style="opacity:.4;width:100%;margin-top:10px;"'}>${sel0&&sel1?'Confirm Pair':'Select 2 bowlers'}</button>
      <button class="modal-cancel" onclick="skipNextBowler()">Keep Current</button>`;
  }else{
    // Standard: single bowler selection
    const listItems=available.map(b=>{
      const safeName=b.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const isSelected=sel0===b.name;
      return `<div class="mitem" style="border:2px solid ${isSelected?'var(--gold)':'transparent'};border-radius:10px;cursor:pointer;" onclick="selectNextBowler(0,'${safeName}')">
        <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
        <span class="mitem-name" style="flex:1;">${escHtml(b.name)}</span>

    content=`

      ${previousPair.length?`${sectionHdr('Previous Bowler','var(--muted)')}<div class="modal-list" style="margin-bottom:10px;">${previousPair.map(b=>infoItem(b,'outgoing','var(--muted)')).join('')}</div>`:''}
      ${sectionHdr('Available Bowlers','var(--gold)')}
      <div class="modal-list">${listItems}${available.length===0?'<div style="color:var(--home-muted);font-size:12px;padding:8px;">No bowlers available</div>':''}</div>
      ${quotaDone.length?`${sectionHdr(`Quota Completed (${maxOv} overs)`,'#f87171')}<div class="modal-list">${quotaDone.map(b=>infoItem(b,'done','#f87171')).join('')}</div>`:''}
      ${injured.length?`${sectionHdr('Recovered? Tap to bring back','#fb923c')}<div class="modal-list">${injured.map(b=>{
        const safeName=b.name.replace(/'/g,"\\'");
        return `<div class="mitem" style="border-color:#fed7aa;cursor:pointer;" onclick="recoverAndSelectBowler('${safeName}')">
          <span style="color:var(--home-muted);font-size:10px;font-family:var(--fu);width:18px;text-align:right;flex-shrink:0;">${b.num}</span>
          <span class="mitem-name" style="flex:1;">${escHtml(b.name)}</span>
          <span class="mitem-meta" style="color:#fb923c;">was: ${escHtml(b.reason||'retired')}</span>
        </div>`;
      }).join('')}</div>`:''}
      <button class="btn-primary" style="width:100%;margin-top:10px;" onclick="confirmNextBowler()" ${sel0?'':'disabled style="opacity:.4;width:100%;margin-top:10px;"'}>${sel0?'Confirm':'Select a bowler'}</button>
      <button class="modal-cancel" onclick="skipNextBowler()">Keep Current</button>`;
  }

  return `<div class="modal-sheet"><div class="modal-handle"></div>${content}</div>`;
}

function selectNextBowler(slot,name){
  if(slot===0)nextBowlerSelection.slot0=name;
  else nextBowlerSelection.slot1=name;
  _refreshBowlerModal();
}
window.selectNextBowler=selectNextBowler;

// Charlie mode: single list, tap to cycle assignment
// 1st tap on a name → Active (slot0). 2nd tap on different name → Waiting (slot1).
// Tap on already-assigned name → unassign it. Tap on unassigned when both full → swap to replace slot1.
function toggleNextBowler(name){
  const s=nextBowlerSelection;
  if(s.slot0===name){
    // Unassign from Active
    s.slot0=s.slot1;s.slot1=null;
  }else if(s.slot1===name){
    // Unassign from Waiting
    s.slot1=null;
  }else if(!s.slot0){
    // Assign to Active (empty)
    s.slot0=name;
  }else if(!s.slot1){
    // Assign to Waiting (empty)
    s.slot1=name;
  }else{
    // Both full — replace Waiting
    s.slot1=name;
  }
  _refreshBowlerModal();
}
window.toggleNextBowler=toggleNextBowler;

function _refreshBowlerModal(){
  const overlay=document.querySelector('.modal-overlay');
  if(overlay){overlay.innerHTML=renderNextBowlerModal();}
}

function confirmNextBowler(){
  const inn=getInn();if(!inn)return;
  const charlie=isCharlie();
  const bowlingPlayers=state.currentInnings===0?state.match.playersB:state.match.playersA;

  if(charlie){
    if(!nextBowlerSelection.slot0||!nextBowlerSelection.slot1){toast('Select both bowlers','error');return;}
    if(nextBowlerSelection.slot0===nextBowlerSelection.slot1){toast('Select two different bowlers','error');return;}
    updateInn(inn=>{
      // Ensure bowlers exist in innings bowler list
      [nextBowlerSelection.slot0,nextBowlerSelection.slot1].forEach(name=>{
        if(!inn.bowlers.find(b=>b.name===name)){
          const idx=bowlingPlayers.indexOf(name);
          inn.bowlers.push(initBowler(name,`bowl_${idx>=0?idx:inn.bowlers.length}`));
        }
      });
      const b0=inn.bowlers.find(b=>b.name===nextBowlerSelection.slot0);
      const b1=inn.bowlers.find(b=>b.name===nextBowlerSelection.slot1);
      inn.charlieBowlers=[b0?.id,b1?.id];
      return inn;
    });
  }else{
    if(!nextBowlerSelection.slot0){toast('Select a bowler','error');return;}
    updateInn(inn=>{
      let bw=inn.bowlers.find(b=>b.name===nextBowlerSelection.slot0);
      if(!bw){
        const idx=bowlingPlayers.indexOf(nextBowlerSelection.slot0);
        bw=initBowler(nextBowlerSelection.slot0,`bowl_${idx>=0?idx:inn.bowlers.length}`);
        inn.bowlers.push(bw);
      }
      inn.charlieBowlers=[bw.id,null]; // Standard mode: only one bowler, no waiting slot
      return inn;
    });
  }
  nextBowlerSelection={slot0:null,slot1:null};
  closeModal();
}
window.confirmNextBowler=confirmNextBowler;

function skipNextBowler(){
  nextBowlerSelection={slot0:null,slot1:null};
  closeModal();
}
window.skipNextBowler=skipNextBowler;

function handleSquadUpload(fileInput){
  const file=fileInput.files[0];
  if(!file){return;}
  if(typeof XLSX==='undefined'){toast('Excel library not loaded','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const sheetName=wb.SheetNames.find(n=>n.toLowerCase().includes('player'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      parseSquadUpload(rows,file.name);
    }catch(err){
      toast('Failed to parse file: '+err.message,'error');
    }
  };
  reader.readAsArrayBuffer(file);
  fileInput.value=''; // allow re-uploading same file
}
window.handleSquadUpload=handleSquadUpload;

function parseSquadUpload(rows,filename){
  if(!rows||rows.length<2){toast('File is empty or has no data rows','error');return;}
  // Find header row
  let headerIdx=0;
  for(let i=0;i<Math.min(5,rows.length);i++){
    const cellsLower=rows[i].map(c=>String(c||'').toLowerCase());
    if(cellsLower.some(c=>c.includes('region'))&&cellsLower.some(c=>c.includes('player'))){
      headerIdx=i;break;
    }
  }
  const header=rows[headerIdx].map(c=>String(c||'').trim().toLowerCase());
  const colRegion=header.findIndex(c=>c.includes('region'));
  const colGroup=header.findIndex(c=>c.includes('group')||c.includes('training'));
  const colName=header.findIndex(c=>c.includes('player')||c.includes('name'));
  if(colRegion<0||colGroup<0||colName<0){
    toast('Missing required columns: Region, Training Group, Player Name','error');
    return;
  }
  // Skill columns (fuzzy match)
  const skillMap={BAT:['bat','batter','batting'],WK:['wk','keeper','wicket'],SPIN:['spin'],SEAM:['seam'],PACE:['pace','fast'],ALRND:['all-rounder','allrounder','all rounder','all']};
  const skillCols={};
  Object.keys(skillMap).forEach(key=>{
    const idx=header.findIndex(c=>skillMap[key].some(k=>c===k||c.startsWith(k+' ')||c.startsWith(k)));
    if(idx>=0)skillCols[key]=idx;
  });

  // Parse rows into squad groups
  const squadMap={}; // key: region|group -> {region,group,players:[]}
  let skipped=0;
  for(let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    const region=String(r[colRegion]||'').trim();
    const group=String(r[colGroup]||'').trim();
    const name=String(r[colName]||'').trim();
    if(!region||!group||!name){skipped++;continue;}
    const key=region+'|'+group;
    if(!squadMap[key])squadMap[key]={region,group,players:[]};
    const skills=[];
    Object.keys(skillCols).forEach(key2=>{
      const val=String(r[skillCols[key2]]||'').trim().toLowerCase();
      if(val&&val!=='n'&&val!=='no'&&val!=='0'&&val!=='false')skills.push(key2);
    });
    squadMap[key].players.push({id:uid(),name,skills});
  }
  const newSquads=Object.values(squadMap);
  if(newSquads.length===0){
    toast('No valid rows found in file','error');
    return;
  }
  // Show preview/confirmation
  _uploadPreview={filename,squads:newSquads,skipped,totalPlayers:newSquads.reduce((s,sq)=>s+sq.players.length,0)};
  openModal('uploadPreview',{});
}

let _uploadPreview=null;

function confirmSquadUpload(mergeMode){
  if(!_uploadPreview)return;
  const {squads:newSquads}=_uploadPreview;
  let merged=0,created=0;
  newSquads.forEach(ns=>{
    // Match existing squad by region+group (case-insensitive)
    const existing=state.squads.find(s=>s.region.toLowerCase()===ns.region.toLowerCase()&&s.group.toLowerCase()===ns.group.toLowerCase());
    if(existing){
      if(mergeMode==='replace'){
        // Replace all players
        existing.players=ns.players;
      }else{
        // Merge: add new players, skip duplicates
        ns.players.forEach(np=>{
          const dup=existing.players.find(p=>p.name.toLowerCase()===np.name.toLowerCase());
          if(!dup){
            existing.players.push(np);
          }else if(np.skills.length>0){
            // Merge skills
            dup.skills=[...new Set([...(dup.skills||[]),...np.skills])];
          }
        });
      }
      merged++;
    }else{
      state.squads.push({id:'sq_'+uid(),region:ns.region,group:ns.group,players:ns.players});
      created++;
    }
  });
  persist();syncSquadsToFirestore();
  closeModal();
  _uploadPreview=null;
  toast('Imported: '+created+' new, '+merged+' updated','success');
  render();
}
window.confirmSquadUpload=confirmSquadUpload;

function renameRegion(oldName){
  promptModal('New name for region "'+oldName+'":',oldName,'Rename Region').then(newName=>{
    if(!newName||!newName.trim()||newName.trim()===oldName)return;
    const trimmed=newName.trim();
    const existingRegions=[...new Set(state.squads.filter(s=>s.region!==oldName).map(s=>s.region).filter(Boolean))];
    const conflict=existingRegions.find(r=>r.toLowerCase()===trimmed.toLowerCase());
    const doRename=()=>{
      let count=0;
      state.squads.forEach(sq=>{if(sq.region===oldName){sq.region=trimmed;count++;}});
      if(count>0){
        persist();syncSquadsToFirestore();
        toast('Renamed '+count+' squad'+(count!==1?'s':''),'success');
        render();
      }
    };
    const doMerge=()=>{
      const oldGroups=state.squads.filter(s=>s.region===oldName).map(s=>s.group.toLowerCase());
      const newGroups=state.squads.filter(s=>s.region===conflict).map(s=>s.group.toLowerCase());
      const dups=oldGroups.filter(g=>newGroups.includes(g));
      if(dups.length>0){
        toast('Cannot merge — duplicate groups: '+dups.join(', '),'error');
        return;
      }
      let count=0;
      state.squads.forEach(sq=>{if(sq.region===oldName){sq.region=conflict;count++;}});
      persist();syncSquadsToFirestore();
      toast('Merged '+count+' squad'+(count!==1?'s':'')+' into '+conflict,'success');
      render();
    };
    if(conflict){
      confirmModal('Region "'+conflict+'" already exists. Merge all squads from "'+oldName+'" into "'+conflict+'"?','Merge Regions',{okLabel:'Merge'}).then(ok=>{if(ok)doMerge();});
    }else{
      doRename();
    }
  });
}
window.renameRegion=renameRegion;

function saveSquad(){
  if(!editSquadData)return;
  let region=editSquadData.region.trim();
  let group=editSquadData.group.trim();
  if(!region){toast('Enter a region name','error');return;}
  if(!group){toast('Enter a training group name','error');return;}

  // Normalize region: if a region exists with same name (case-insensitive),
  // automatically use the existing exact spelling to prevent duplicates
  const existingRegions=[...new Set(state.squads.filter(s=>s.id!==editSquadData.id).map(s=>s.region).filter(Boolean))];
  const matchingRegion=existingRegions.find(r=>r.toLowerCase()===region.toLowerCase());
  if(matchingRegion&&matchingRegion!==region){
    region=matchingRegion;
    editSquadData.region=region;
    toast('Using existing region: '+matchingRegion,'info');
  }

  // Normalize group within the same region (case-insensitive)
  const existingGroupsInRegion=state.squads.filter(s=>s.id!==editSquadData.id&&s.region===region).map(s=>s.group);
  const matchingGroup=existingGroupsInRegion.find(g=>g.toLowerCase()===group.toLowerCase());
  if(matchingGroup&&matchingGroup!==group){
    toast('A training group named "'+matchingGroup+'" already exists in '+region+'. Use a different name.','error');
    return;
  }

  // Prevent exact duplicate (region + group already exists)
  const dup=state.squads.find(s=>s.id!==editSquadData.id&&s.region===region&&s.group===group);
  if(dup){
    toast('A squad for "'+group+'" in "'+region+'" already exists. Edit that squad instead.','error');
    return;
  }

  const players=editSquadData.players.filter(p=>p.name.trim()).map(p=>({id:p.id,name:p.name.trim(),skills:p.skills||[]}));
  if(players.length<1){toast('Add at least one player','error');return;}
  const sq={id:editSquadData.id,region,group,players,
    visibility:editSquadData.visibility||'public',
    sharedWith:editSquadData.sharedWith||[],
    createdBy:editSquadData.createdBy||authUser?.uid||null,
    createdByName:editSquadData.createdByName||authUser?.displayName||authUser?.email||''};
  const idx=state.squads.findIndex(s=>s.id===sq.id);
  if(idx>=0)state.squads[idx]=sq;else state.squads.push(sq);
  persist();syncSquadsToFirestore();
  editSquadData=null;state.screen='squads';render();
}

let adminUsersData=[];
let adminUsersLoading=false;

function loadAdminUsers(){
  if(!db||!isAdmin())return;
  adminUsersLoading=true;render();
  db.collection('users').get({source:'server'}).then(snap=>{
    adminUsersData=[];
    snap.forEach(doc=>adminUsersData.push(doc.data()));
    adminUsersLoading=false;
    // Enrich with match/squad activity
    adminUsersData.forEach(u=>{
      u._matchesScored=0;u._matchesScheduled=0;u._squadsEdited=0;u._notesAdded=0;u._lastActive='';
      state.savedMatches.forEach(m=>{
        if(m.scoringLockUid===u.uid||m.scheduledBy===u.uid)u._matchesScored++;
        (m.playerNotes||[]).forEach(n=>{if(n.author===u.displayName||n.author===u.email)u._notesAdded++;});
      });
      (state.activeMatches||[]).forEach(m=>{
        if(m.scoringLockUid===u.uid)u._matchesScored++;
        if(m.scheduledBy===u.uid)u._matchesScheduled++;
      });
    });
    adminUsersData.sort((a,b)=>(b._matchesScored+b._matchesScheduled)-(a._matchesScored+a._matchesScheduled));
    render();
  }).catch(e=>{
    adminUsersLoading=false;
    toast('Failed to load users: '+e.message,'error');
    render();
  });
}
window.loadAdminUsers=loadAdminUsers;

function adminChangeRole(uid,newRole){
  if(!isAdmin()||!db)return;
  const u=adminUsersData.find(x=>x.uid===uid);
  const name=u?u.displayName||u.email:'this user';
  const label=newRole==='admin'?'Admin':'Standard User';
  confirmModal('Change '+name+' to '+label+'?','Change Role',{okLabel:'Change'}).then(ok=>{
    if(!ok)return;
    db.collection('users').doc(uid).update({role:newRole}).then(()=>{
      if(u)u.role=newRole;
      if(uid===authUser?.uid){authUser.role=newRole;saveAuthCache();}
      toast(name+' is now '+label,'success');
      render();
    }).catch(e=>toast('Failed: '+e.message,'error'));
  });
}
window.adminChangeRole=adminChangeRole;

function adminDeleteUser(uid){
  if(!isAdmin()||!db)return;
  const u=adminUsersData.find(x=>x.uid===uid);
  if(u&&u.uid===authUser?.uid){toast('Cannot delete your own account','error');return;}
  const name=u?u.displayName||u.email:'this user';
  confirmModal('Remove '+name+' from the system? Their Firebase Auth account will still exist but PitchUp profile will be deleted.','Delete User',{danger:true,okLabel:'Delete'}).then(ok=>{
    if(!ok)return;
    db.collection('users').doc(uid).delete().then(()=>{
      adminUsersData=adminUsersData.filter(x=>x.uid!==uid);
      toast(name+' removed','success');
      render();
    }).catch(e=>toast('Failed: '+e.message,'error'));
  });
}
window.adminDeleteUser=adminDeleteUser;

// ─── PLAYER PERFORMANCE ──────────────────────────────────────────────────────
let perfViewPlayer=null; // player name for detail view

function initPlayerEntry(){
  return {
    name:'',matches:new Set(),
    bat:{inn:0,runs:0,balls:0,fours:0,sixes:0,hs:0,notOuts:0,outs:0,
      dismissals:{Bowled:0,Caught:0,LBW:0,'Run Out':0,Stumped:0,'Hit Wicket':0,Retired:0,other:0}},
    bowl:{balls:0,runs:0,wickets:0,wides:0,noBalls:0,best:''},
    field:{catches:0,runOuts:0,stumpings:0},
    notesCount:0
  };
}

// Get the set of player names this user is allowed to view performance for
function getVisiblePlayerNames(){
  const names=new Set();
  getVisibleSquads().forEach(sq=>{
    sq.players.forEach(p=>{if(p.name)names.add(p.name.trim().toLowerCase());});
  });
  return names;
}

function aggregatePlayerStats(){
  const players={};
  state.savedMatches.forEach(m=>{
    if(!m.innings)return;
    const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
    m.innings.forEach((inn,innIdx)=>{
      if(!inn)return;
      // Batting stats
      inn.batters.forEach(b=>{
        if(!b.name)return;
        if(!players[b.name]){const e=initPlayerEntry();e.name=b.name;players[b.name]=e;}
        const p=players[b.name];
        p.matches.add(m.matchId||m.date);
        if(b.balls>0||b.runs>0){
          p.bat.inn+=1;p.bat.runs+=b.runs;p.bat.balls+=b.balls;
          p.bat.fours+=b.fours||0;p.bat.sixes+=b.sixes||0;
          if(b.runs>p.bat.hs)p.bat.hs=b.runs;
          if(b.out){
            p.bat.outs+=1;
            // Track dismissal type
            const dtype=b.dismissalType||parseDismissalType(b.dismissal||'');
            if(dtype&&p.bat.dismissals[dtype]!==undefined)p.bat.dismissals[dtype]+=1;
            else p.bat.dismissals.other+=1;
          }else{p.bat.notOuts+=1;}
        }
      });
      // Bowling stats
      inn.bowlers.forEach(b=>{
        if(!b.name)return;
        if(!players[b.name]){const e=initPlayerEntry();e.name=b.name;players[b.name]=e;}
        const p=players[b.name];
        p.matches.add(m.matchId||m.date);
        if(b.balls>0){
          p.bowl.balls+=b.balls;p.bowl.runs+=b.runs;p.bowl.wickets+=b.wickets;
          p.bowl.wides+=b.wides||0;p.bowl.noBalls+=b.noBalls||0;
          const fig=`${b.wickets}/${b.runs}`;
          if(!p.bowl.best||b.wickets>(parseInt(p.bowl.best)||0)||(b.wickets===parseInt(p.bowl.best)&&b.runs<parseInt(p.bowl.best.split('/')[1]||999)))p.bowl.best=fig;
        }
      });
      // Fielding stats — from batter dismissals (fielder credited)
      inn.batters.forEach(b=>{
        if(!b.out)return;
        const fielder=b.dismissalFielder||parseFielderFromDismissal(b.dismissal||'');
        const dtype=b.dismissalType||parseDismissalType(b.dismissal||'');
        if(fielder){
          if(!players[fielder]){const e=initPlayerEntry();e.name=fielder;players[fielder]=e;}
          const fp=players[fielder];
          fp.matches.add(m.matchId||m.date);
          if(dtype==='Caught')fp.field.catches+=1;
          else if(dtype==='Run Out')fp.field.runOuts+=1;
          else if(dtype==='Stumped')fp.field.stumpings+=1;
        }
      });
    });
    // Notes count from match.playerNotes
    (m.playerNotes||[]).forEach(n=>{
      if(!n.playerName)return;
      if(!players[n.playerName]){const e=initPlayerEntry();e.name=n.playerName;players[n.playerName]=e;}
      players[n.playerName].notesCount=(players[n.playerName].notesCount||0)+1;
    });
  });
  // Convert Sets to counts and compute derived stats
  return Object.values(players).map(p=>{
    p.matchCount=p.matches.size;
    delete p.matches;
    p.bat.avg=p.bat.outs>0?(p.bat.runs/p.bat.outs).toFixed(1):p.bat.runs>0?'N/A':'-';
    p.bat.sr=p.bat.balls>0?((p.bat.runs/p.bat.balls)*100).toFixed(0):'-';
    const bpo=6;
    p.bowl.oversStr=overStr(p.bowl.balls,bpo);
    p.bowl.econ=p.bowl.balls>0?(p.bowl.runs/(p.bowl.balls/bpo)).toFixed(1):'-';
    return p;
  }).sort((a,b)=>b.matchCount-a.matchCount||b.bat.runs-a.bat.runs);
}

// Parse dismissal type from old-format text (e.g. "bowled b Player1", "c Player2 b Player1")
function parseDismissalType(dis){
  if(!dis)return '';
  const d=dis.toLowerCase().trim();
  if(d.startsWith('b '))return 'Bowled';
  if(d.startsWith('c '))return 'Caught';
  if(d.startsWith('lbw'))return 'LBW';
  if(d.startsWith('run out'))return 'Run Out';
  if(d.startsWith('st '))return 'Stumped';
  if(d.startsWith('hit wicket'))return 'Hit Wicket';
  if(d.startsWith('bowled'))return 'Bowled';
  if(d.startsWith('caught'))return 'Caught';
  if(d.startsWith('stumped'))return 'Stumped';
  return '';
}

// Parse fielder name from old-format dismissal text
function parseFielderFromDismissal(dis){
  if(!dis)return '';
  const d=dis.trim();
  // "c FielderName b BowlerName"
  let m=d.match(/^c\s+(.+?)\s+b\s+/i);if(m)return m[1].trim();
  // "run out (FielderName)"
  m=d.match(/run out\s*\((.+?)\)/i);if(m)return m[1].trim();
  // "st FielderName b BowlerName"
  m=d.match(/^st\s+(.+?)\s+b\s+/i);if(m)return m[1].trim();
  return '';
}

function getPlayerMatchHistory(playerName){
  const history=[];
  state.savedMatches.forEach(m=>{
    if(!m.innings)return;
    const bpo=(m.rules||DEFAULT_RULES).ballsPerOver||6;
    const entry={date:m.date,teamA:m.teamA,teamB:m.teamB,matchId:m.matchId,bat:null,bowl:null,notes:[]};
    m.innings.forEach(inn=>{
      if(!inn)return;
      const b=inn.batters.find(x=>x.name===playerName);
      if(b&&(b.balls>0||b.runs>0))entry.bat={runs:b.runs,balls:b.balls,fours:b.fours||0,sixes:b.sixes||0,out:b.out,dismissal:b.dismissal||'',sr:b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-'};
      const bw=inn.bowlers.find(x=>x.name===playerName);
      if(bw&&bw.balls>0)entry.bowl={overs:overStr(bw.balls,bpo),runs:bw.runs,wickets:bw.wickets,wides:bw.wides||0,noBalls:bw.noBalls||0,econ:bw.balls>0?(bw.runs/(bw.balls/bpo)).toFixed(1):'-'};
    });
    entry.notes=(m.playerNotes||[]).filter(n=>n.playerName===playerName);
    if(entry.bat||entry.bowl||entry.notes.length>0)history.push(entry);
  });
  return history.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

let editMatchIdx=null;

function editSavedMatch(idx){
  if(!isAdmin())return;
  editMatchIdx=idx;
  state.screen='edit_match';render();
}
window.editSavedMatch=editSavedMatch;

function updateMatchBatter(innIdx,batIdx,field,value){
  const m=state.savedMatches[editMatchIdx];if(!m)return;
  const b=m.innings[innIdx]?.batters[batIdx];if(!b)return;
  if(field==='runs'||field==='balls'||field==='fours'||field==='sixes')b[field]=Number(value)||0;
  else if(field==='out')b.out=value==='true';
  else if(field==='dismissal'||field==='dismissalType'||field==='dismissalFielder')b[field]=value;
  // Recalculate innings total
  const inn=m.innings[innIdx];
  inn.total=inn.batters.reduce((s,bt)=>s+bt.runs,0)+inn.extras.total;
  inn.wickets=inn.batters.filter(bt=>bt.out).length;
  persist();render();
}
window.updateMatchBatter=updateMatchBatter;

function updateMatchBowler(innIdx,bowIdx,field,value){
  const m=state.savedMatches[editMatchIdx];if(!m)return;
  const b=m.innings[innIdx]?.bowlers[bowIdx];if(!b)return;
  if(['balls','runs','wickets','wides','noBalls'].includes(field))b[field]=Number(value)||0;
  persist();render();
}
window.updateMatchBowler=updateMatchBowler;

function saveEditedMatch(){
  const m=state.savedMatches[editMatchIdx];
  if(m)syncSavedMatchToFirestore(m);
  state.screen='home';editMatchIdx=null;render();
}

// ─── Offline & Sync Status ───────────────────────────────────────────────────
function updateOffline(){
  const b=document.getElementById('offline-bar');
  if(b)b.classList.toggle('show',!navigator.onLine);
  if(!navigator.onLine)syncStatus='offline';
  updateSyncBar();
}
function updateSyncBar(){
  const el=document.getElementById('sync-bar');if(!el)return;
  clearTimeout(el._hideTimer);
  if(syncStatus==='synced'&&navigator.onLine){
    el.className='sync-bar synced';el.textContent='☁️ Synced to cloud';
    el.style.display='block';
    el._hideTimer=setTimeout(()=>{el.style.display='none';},2000);
  }else if(syncStatus==='pending'){
    el.className='sync-bar pending';el.textContent='⏳ Syncing...';el.style.display='block';
    // Auto-hide pending bar after 5s to prevent it getting stuck
    el._hideTimer=setTimeout(()=>{el.style.display='none';},5000);
  }else if(!navigator.onLine){
    el.className='sync-bar offline';el.textContent='📶 Offline — data saves locally';
    el.style.display='block';
  }else{el.style.display='none';}
}
window.addEventListener('online',()=>{updateOffline();syncMatchToFirestore(true);});
window.addEventListener('offline',updateOffline);
// Sync when app goes to background + pause listeners to save battery
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){
    // Sync before going to background
    if(state.match&&!state.match.complete&&syncConfig.syncOnBackground){
      syncMatchToFirestore(true);
    }
    // Pause viewer listener when in background
    if(_viewerUnsub){_viewerUnsubPaused=_viewerUnsub;_viewerUnsub();_viewerUnsub=null;}
  }else{
    // Resume viewer listener when coming back
    if(_viewerUnsubPaused&&viewerMode&&viewerMatchId){
      startViewerListener();
      _viewerUnsubPaused=null;
    }
  }
});
let _viewerUnsubPaused=null;

// Register the service worker + detect updates
let _newSwWaiting=null;
function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  // Try loading a real sw.js file; fall back silently if not found
  navigator.serviceWorker.register('/sw.js',{scope:'/'}).then(reg=>{
    // Check for updates every 2 hours (saves battery)
    setInterval(()=>{reg.update().catch(()=>{});},2*60*60*1000);
    // Listen for new SW waiting
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          _newSwWaiting=nw;
          showUpdateBanner();
        }
      });
    });
  }).catch(()=>{});

  // When the active SW changes (new version took over), reload once
  let _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_swReloaded)return;
    _swReloaded=true;
    // Small delay so toasts/renders can finish
    setTimeout(()=>location.reload(),100);
  });

  // Messages from SW
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data&&e.data.type==='SW_UPDATED'){
      console.log('Service worker updated:',e.data.version);
    }
  });
}
registerServiceWorker();

// Override showUpdateBanner from schema section to also handle SW updates
(function(){
  const orig=showUpdateBanner;
  showUpdateBanner=function(){
    if(document.getElementById('update-banner'))return;
    const el=document.createElement('div');
    el.id='update-banner';
    el.style.cssText='position:fixed;top:0;left:0;right:0;background:#d97706;color:#fff;padding:10px 14px;z-index:999;font-family:var(--fu);font-size:13px;font-weight:700;display:flex;gap:10px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2);';
    el.innerHTML='<span style="flex:1;">⬆️ New version available</span>'+
      '<button onclick="applyUpdate();" style="background:#fff;color:#d97706;border:none;padding:6px 12px;border-radius:6px;font-family:var(--fu);font-weight:700;font-size:12px;cursor:pointer;">Update Now</button>';
    document.body.appendChild(el);
  };
})();

function applyUpdate(){
  if(_newSwWaiting){
    _newSwWaiting.postMessage({type:'SKIP_WAITING'});
  }else{
    location.reload();
  }
}
window.applyUpdate=applyUpdate;
