<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap');
:root{
  --navy:#050a14;--navy2:#0c1624;--navy3:#111e30;--navy4:#1a2d46;
  --gold:#e8a820;--gold2:#f5c842;--gold3:#c8881a;
  --grass:#1e6b3c;--grass2:#2a9152;--grass3:#3ab56a;
  --red:#c0392b;--sky:#3b82f6;
  --white:#f0f4f8;--muted:#8899aa;--faint:#1e2d40;--border:#1e3050;
  --home-bg:#f0f7f2;--home-text:#0f172a;--home-muted:#64748b;--home-border:#d6e8db;
  --card-bg:#f8fafc;
  --fd:\'Oswald\',sans-serif;--fu:\'Rajdhani\',sans-serif;--fb:\'Source Sans 3\',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{touch-action:manipulation;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:var(--fb);-webkit-text-size-adjust:100%;text-size-adjust:100%;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px;}

/* ── App shell ── */
#app{min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* ── Screen system ── */
.screen{display:none;flex-direction:column;flex:1;}
.screen.active{display:flex;}
.screen.dark{background:var(--home-bg);color:var(--home-text);}
.screen.light{background:var(--home-bg);color:var(--home-text);}
.screen-inner{flex:1;overflow-y:auto;padding:16px 16px 40px;}
.screen-inner.light{background:var(--home-bg);}

/* ── Top bar – dark ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top,0)) 16px 10px;border-bottom:1px solid var(--home-border);background:var(--home-bg);position:sticky;top:0;z-index:20;}
.topbar.light{background:#fff;border-bottom:1px solid var(--home-border);}
.topbar-title{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:1px;}
.topbar.dark .topbar-title{color:var(--home-text);}
.topbar.light .topbar-title{color:var(--home-text);}
.topbar-back{background:none;border:none;cursor:pointer;font-size:20px;padding:0 6px;display:flex;align-items:center;}
.topbar.dark .topbar-back{color:var(--home-muted);}
.topbar.light .topbar-back{color:var(--home-muted);}
.topbar-actions{display:flex;gap:6px;}
.tbtn{border-radius:8px;cursor:pointer;font-size:11px;font-family:var(--fu);font-weight:600;padding:5px 10px;letter-spacing:.5px;}
.tbtn.dark{background:#f1f5f9;border:1px solid var(--home-border);color:#475569;}
.tbtn.gold{color:var(--gold);border:1px solid rgba(232,168,32,.25);background:rgba(232,168,32,.08);}
.tbtn.light-btn{background:#f1f5f9;border:1px solid var(--home-border);color:#475569;}

/* ════════════════════════════════════
   HOME SCREEN – white, clean, modern
   ════════════════════════════════════ */
.home-topbar{background:#fff;border-bottom:1px solid var(--home-border);padding:calc(16px + env(safe-area-inset-top,0)) 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.home-logo-row{display:flex;align-items:center;gap:10px;}
.home-logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--grass),var(--grass2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(42,145,82,.3);}
.home-logo-name{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:1.5px;color:var(--home-text);}
.home-logo-name em{color:var(--grass2);font-style:normal;}
.home-logo-tag{font-family:var(--fu);font-size:9px;letter-spacing:2px;color:var(--home-muted);text-transform:uppercase;margin-top:1px;}

/* hero banner */
.home-hero{background:linear-gradient(135deg,var(--grass) 0%,#0d4a28 100%);padding:28px 20px 32px;position:relative;overflow:hidden;}
.home-hero::after{content:'🏏';position:absolute;right:-10px;bottom:-16px;font-size:110px;opacity:.08;transform:rotate(-20deg);}
.home-hero-eyebrow{font-family:var(--fu);font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:8px;}
.home-hero-title{font-family:var(--fd);font-size:30px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.15;margin-bottom:4px;}
.home-hero-sub{font-size:13px;color:rgba(255,255,255,.7);line-height:1.5;}

/* action cards */
.home-actions{padding:20px 16px 0;}
.action-card{border-radius:16px;padding:18px;margin-bottom:12px;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;gap:14px;text-decoration:none;}
.action-card:active{transform:scale(.98);}
.action-card.primary{background:linear-gradient(135deg,var(--grass),var(--grass2));box-shadow:0 4px 18px rgba(42,145,82,.35);}
.action-card.secondary{background:#fff;border:1.5px solid var(--home-border);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.action-card.warning{background:#fffbeb;border:1.5px solid #fde68a;}
.ac-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ac-icon.green{background:rgba(255,255,255,.2);}
.ac-icon.white-green{background:rgba(42,145,82,.1);}
.ac-icon.white-amber{background:#fef3c7;}
.ac-title{font-family:var(--fd);font-size:17px;font-weight:600;letter-spacing:.5px;}
.ac-sub{font-size:12px;margin-top:2px;}
.action-card.primary .ac-title,.action-card.primary .ac-sub{color:#fff;}
.action-card.primary .ac-sub{opacity:.8;}
.action-card.secondary .ac-title{color:var(--home-text);}
.action-card.secondary .ac-sub{color:var(--home-muted);}
.action-card.warning .ac-title{color:#92400e;}
.action-card.warning .ac-sub{color:#b45309;}
.ac-arrow{margin-left:auto;font-size:18px;flex-shrink:0;opacity:.5;}
.action-card.primary .ac-arrow{color:#fff;}

/* section headers */
.home-sec{padding:20px 16px 0;}
.home-sec-title{font-family:var(--fu);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--home-muted);margin-bottom:12px;}

/* team cards */
.team-card{background:#fff;border:1.5px solid var(--home-border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.team-card:active{border-color:var(--grass2);}
.team-avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--grass),var(--grass2));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(42,145,82,.3);}
.team-info{flex:1;}
.team-name{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--home-text);letter-spacing:.5px;}
.team-meta{font-size:11px;color:var(--home-muted);margin-top:2px;font-family:var(--fu);}
.team-actions{display:flex;gap:6px;}
.team-action-btn{background:#f1f5f9;border:1px solid var(--home-border);border-radius:8px;color:#475569;padding:6px 10px;cursor:pointer;font-size:11px;font-family:var(--fu);font-weight:600;}
.team-action-btn.danger{background:#fef2f2;border-color:#fecaca;color:#dc2626;}

/* match history */
.match-card{background:#fff;border:1.5px solid var(--home-border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.match-vs{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--home-text);}
.match-meta{font-size:11px;color:var(--home-muted);font-family:var(--fu);margin-top:2px;}
.match-csv{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;color:#16a34a;padding:6px 10px;cursor:pointer;font-size:11px;font-family:var(--fu);font-weight:600;white-space:nowrap;}

/* empty state */
.empty-state{text-align:center;padding:32px 20px;color:var(--home-muted);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-text{font-size:13px;line-height:1.5;}

/* footer */
.home-footer{padding:24px 16px 32px;text-align:center;}
.home-footer-text{font-size:10px;color:#4a6352;font-family:var(--fu);letter-spacing:1.5px;}

/* ════════════════════════════════════
   TEAM MANAGEMENT SCREEN
   ════════════════════════════════════ */
.team-form-card{background:#fff;border:1.5px solid var(--home-border);border-radius:16px;padding:18px;margin-bottom:14px;}
.team-form-title{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--home-text);letter-spacing:.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--home-border);}
.light-input{background:#f8fafc;border:1.5px solid var(--home-border);border-radius:10px;color:var(--home-text);padding:11px 13px;font-size:14px;font-family:var(--fb);width:100%;}
.light-input:focus{outline:none;border-color:var(--grass2);background:#fff;}
.light-label{font-family:var(--fu);font-size:10px;letter-spacing:2px;color:var(--home-muted);text-transform:uppercase;display:block;margin-bottom:6px;font-weight:600;}
.player-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.player-num{color:var(--home-muted);font-size:11px;width:20px;text-align:right;flex-shrink:0;font-family:var(--fu);}
.player-input{flex:1;background:#f8fafc;border:1.5px solid var(--home-border);border-radius:9px;color:var(--home-text);padding:9px 11px;font-size:13px;font-family:var(--fb);}
.player-input:focus{outline:none;border-color:var(--grass2);}
.player-del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;}
.player-del:hover{color:#f87171;}
.squad-pill{display:inline-flex;align-items:center;gap:8px;background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:5px 12px;margin-bottom:12px;}
.squad-pill-label{color:var(--grass2);font-size:11px;font-weight:700;font-family:var(--fu);}
.light-btn-primary{width:100%;background:linear-gradient(135deg,var(--grass),var(--grass2));border:none;border-radius:13px;color:#fff;padding:14px;font-family:var(--fd);font-size:15px;font-weight:600;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 14px rgba(42,145,82,.3);}
.light-btn-primary:active{opacity:.88;}
.light-btn-secondary{background:#f1f5f9;border:1.5px solid var(--home-border);border-radius:13px;color:#475569;padding:12px;font-family:var(--fu);font-size:14px;font-weight:600;cursor:pointer;}
.light-nav-row{display:flex;gap:10px;}
.light-nav-row .light-btn-secondary{flex:1;}
.light-nav-row .light-btn-primary{flex:2;}
.add-player-btn{width:100%;background:#f8fafc;border:1.5px dashed var(--home-border);border-radius:10px;color:var(--home-muted);padding:10px;cursor:pointer;font-family:var(--fu);font-size:12px;font-weight:600;margin-top:4px;letter-spacing:.5px;}
.add-player-btn:hover{border-color:var(--grass2);color:var(--grass2);}

/* ════════════════════════════════════
   DARK SCREENS (scoring, setup, etc.)
   ════════════════════════════════════ */
.form-section{margin-bottom:16px;}
.form-label{font-family:var(--fu);font-size:10px;letter-spacing:2px;color:var(--home-muted);text-transform:uppercase;display:block;margin-bottom:7px;font-weight:600;}
.form-input{background:#fff;border:1px solid var(--home-border);border-radius:11px;color:var(--home-text);padding:11px 13px;font-size:14px;font-family:var(--fb);width:100%;}
.form-input:focus{outline:none;border-color:var(--grass2);}
.seg-row{display:flex;gap:8px;}
.seg-btn{flex:1;background:#f8fafc;border:1px solid var(--home-border);border-radius:11px;color:var(--home-muted);padding:11px;cursor:pointer;font-family:var(--fu);font-size:13px;font-weight:600;transition:all .15s;letter-spacing:.5px;}
.seg-btn.ag{background:#f0fdf4;border-color:var(--grass2);color:var(--grass);}
.seg-btn.agold{background:#fffbeb;border-color:#d97706;color:#b45309;}
.seg-btn.ablue{background:#eff6ff;border-color:var(--sky);color:#2563eb;}

/* scoreboard */
.scoreboard{background:linear-gradient(145deg,#f0fdf4,#ecfdf5,#f0fdf4);border-radius:18px;padding:18px 20px;margin-bottom:12px;border:1px solid #bbf7d0;position:relative;overflow:hidden;}
.scoreboard::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(30,107,60,.04),transparent 70%);}
.sb-label{font-family:var(--fu);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--home-muted);margin-bottom:4px;font-weight:600;}
.sb-score{font-family:var(--fd);font-size:56px;font-weight:700;line-height:1;color:var(--home-text);}
.sb-score .wkts{font-size:26px;color:var(--grass);margin-left:2px;}
.sb-overs{font-family:var(--fd);font-size:16px;color:var(--grass);margin-top:2px;}
.sb-target-txt{font-family:var(--fd);font-size:13px;color:#b45309;margin-bottom:2px;}
.sb-target-txt strong{font-size:21px;}
.sb-batters{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px;}
.sb-batter{background:#f8fafc;border:1.5px solid var(--home-border);border-radius:10px;padding:6px 11px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.sb-batter.striker{background:#fffbeb;border-color:#fde68a;}
.sb-role{font-family:var(--fu);font-size:9px;font-weight:700;letter-spacing:1.5px;color:#b45309;text-transform:uppercase;}
.sb-name{font-family:var(--fu);font-size:15px;font-weight:700;color:var(--home-text);}
.sb-sc{font-size:12px;color:var(--home-muted);}
.sb-warn{color:#ea580c;font-weight:700;}
.sb-edit{color:#cbd5e1;font-size:9px;}

/* charlie panel */
.charlie-panel{background:#fffbeb;border-radius:14px;padding:12px 14px;margin-bottom:11px;border:1px solid #fde68a;}
.charlie-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.charlie-lbl{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:#b45309;text-transform:uppercase;font-weight:600;}
.c-retire-btn{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;padding:4px 10px;cursor:pointer;font-size:10px;font-family:var(--fu);font-weight:700;letter-spacing:.5px;}
.c-bowlers{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.bcard{border-radius:11px;padding:9px 11px;}
.bcard.active{background:#f0fdf4;border:1px solid #bbf7d0;}
.bcard.waiting{background:#fff7ed;border:1px solid #fed7aa;}
.b-role{font-family:var(--fu);font-size:8px;letter-spacing:1.2px;font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.b-role.a{color:var(--grass);}
.b-role.w{color:#ea580c;}
.b-name{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--home-text);}
.b-stats{font-size:11px;color:var(--home-muted);margin-top:1px;}
.b-can{font-size:9px;margin-top:3px;}
.b-can.yes{color:var(--grass);}
.b-can.no{color:#dc2626;}
.swap-btn{background:#fffbeb;border:1px solid #fde68a;border-radius:9px;color:#b45309;width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* balls */
.ball-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:10px;}
.ball-btn{border:none;border-radius:12px;color:#fff;height:56px;cursor:pointer;font-family:var(--fd);font-size:22px;font-weight:700;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .08s;-webkit-user-select:none;}
.ball-btn:active{transform:scale(.92);}
.ball-btn:disabled{opacity:.3;}
.ball-btn .badge{position:absolute;bottom:5px;font-size:7px;font-family:var(--fu);letter-spacing:1px;font-weight:700;color:var(--gold2);}
.b0{background:#94a3b8;}.b0:hover{background:#78899c;}
.b1{background:var(--grass);}.b1:hover{background:var(--grass2);}
.b2{background:#3b82f6;}.b2:hover{background:#2563eb;}
.b3{background:#8b5cf6;}.b3:hover{background:#7c3aed;}
.b4{background:#d97706;}.b4:hover{background:#b45309;}
.b6{background:#dc2626;}.b6:hover{background:#b91c1c;}

/* extras */
.extras-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.extra-btn{background:#fff7ed;border:1px solid #fed7aa;border-radius:11px;color:#c2410c;padding:9px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--fu);}
.extra-btn:active{background:#ffedd5;}
.extra-btn:disabled{opacity:.35;}
.en{font-size:11px;font-weight:700;letter-spacing:.5px;}
.es{font-size:9px;color:var(--home-muted);font-weight:400;}

/* wicket */
.wicket-btn{width:100%;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;color:#dc2626;padding:12px;font-size:14px;font-family:var(--fd);font-weight:600;cursor:pointer;margin-bottom:10px;letter-spacing:1px;}
.wicket-btn:active{background:#fee2e2;}
.wicket-btn:disabled{opacity:.35;}
.wicket-form{background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:14px;margin-bottom:10px;}
.wf-title{color:#dc2626;font-family:var(--fu);font-weight:700;font-size:13px;margin-bottom:10px;}
.wf-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.wf-row select,.wf-row input{background:#fff;border:1px solid var(--home-border);border-radius:9px;color:var(--home-text);padding:9px;font-size:12px;font-family:var(--fb);flex:1;}
.wf-row input{width:66px;flex:none;}
.form-btns{display:flex;gap:8px;}
.btn-confirm{flex:1;background:#dc2626;border:none;border-radius:9px;color:#fff;padding:10px;font-family:var(--fu);font-size:13px;font-weight:700;cursor:pointer;}
.btn-cancel{background:#f1f5f9;border:1px solid var(--home-border);border-radius:9px;color:var(--home-muted);padding:10px 14px;cursor:pointer;font-size:12px;}

/* over balls */
.over-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;min-height:34px;}
.ob{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:12px;font-weight:700;color:#fff;}
.ob-run{background:#94a3b8;}
.ob-four{background:#d97706;}
.ob-six{background:#dc2626;}
.ob-wkt{background:#7f1d1d;}
.ob-ext{background:#6366f1;}

/* rules pills */
.rules-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.rpill{background:#f1f5f9;border:1px solid var(--home-border);border-radius:20px;padding:3px 9px;color:var(--home-muted);font-size:10px;font-family:var(--fu);}
.rpill.gold{background:#fffbeb;border-color:#fde68a;color:#b45309;cursor:pointer;}

/* score zone */

<body>
<div id="offline-bar" class="offline-bar">📶 Offline mode — all scoring & data saves locally on your device</div>

<div id="app"></div>
<script>
'use strict';
// ─── Constants ────────────────────────────────────────────────────────────────
const DEFAULT_RULES={ballsPerOver:6,wideRuns:1,wideBowlAgain:true,noBallRuns:1,noBallBowlAgain:true,retirementScore:0,maxOversPerBowler:0};
const STORAGE_KEY='pitchup_v1';
const WICKET_TYPES=['Bowled','Caught','LBW','Run Out','Stumped','Hit Wicket','Retired'];
const RETIRE_REASONS=['Injury','Illness','Coach decision','Other'];

// ─── Firebase ────────────────────────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyBJ6akMXtSXvVwPxJ-MiskL7DSCdZPyg2M",
  authDomain:"pitchup-7dd42.firebaseapp.com",
  projectId:"pitchup-7dd42",
  storageBucket:"pitchup-7dd42.firebasestorage.app",
  messagingSenderId:"809639466734",
  appId:"1:809639466734:web:97156bc5fec12832be45ff",
  measurementId:"G-DE14L1LRE1"
};

let fb=null,db=null,fbAuth=null,fbReady=false,fbUid=null;
let syncStatus='offline'; // 'synced'|'pending'|'offline'
let pendingSyncTimer=null;

// ─── Device Sync Config (per-device, stored in localStorage) ─────────────────
const SYNC_CONFIG_KEY='pitchup_sync_config';
const DEFAULT_SYNC_CONFIG={
  enabled:true,           // master toggle: cloud sync on/off
  frequency:'auto',       // 'auto'|'2overs'|'5overs'|'manual'
                          // auto = every over (standard) or every pair (charlie)
  syncOnWicket:true,      // always sync on wicket
  syncOnInningsEnd:true,  // always sync on innings end
  syncOnBackground:true,  // sync when app goes to background
  deviceName:'',          // friendly name for this device (e.g. "Ground A iPad")
};
let syncConfig={...DEFAULT_SYNC_CONFIG};

function loadSyncConfig(){
  try{const d=JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY)||'{}');syncConfig={...DEFAULT_SYNC_CONFIG,...d};}catch(e){}
}
function saveSyncConfig(){
  try{localStorage.setItem(SYNC_CONFIG_KEY,JSON.stringify(syncConfig));}catch(e){}
}
function isSyncEnabled(){return syncConfig.enabled&&fbReady;}

// ─── Auth & Role System ──────────────────────────────────────────────────────
const AUTH_KEY='pitchup_auth';
let authUser=null; // {uid, email, role, displayName}
let authScreen='login'; // 'login'|'register'|'reset'
let authForm={email:'',password:'',name:'',error:'',success:''};

function loadAuthCache(){
  try{const d=JSON.parse(localStorage.getItem(AUTH_KEY)||'null');if(d)authUser=d;}catch(e){}
}
function saveAuthCache(){
  try{localStorage.setItem(AUTH_KEY,JSON.stringify(authUser));}catch(e){}
}
function clearAuthCache(){
  authUser=null;
  try{localStorage.removeItem(AUTH_KEY);}catch(e){}
}
function isAdmin(){return authUser?.role==='admin';}
function isLoggedIn(){return !!authUser;}

function saveUserToFirestore(user,role){
  if(!db)return;
  db.collection('users').doc(user.uid).set({
    uid:user.uid,email:user.email,displayName:user.displayName||authForm.name||'',
    role:role||'standard',
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true}).catch(()=>{});
}

const ADMIN_EMAILS=['vijay.iyer@thinkviz.com'];

function loadUserRole(user){
  // Hardcoded admin emails always get admin role
  if(user.email&&ADMIN_EMAILS.includes(user.email.toLowerCase()))return Promise.resolve('admin');
  if(!db)return Promise.resolve('standard');
  return db.collection('users').doc(user.uid).get().then(doc=>{
    if(doc.exists)return doc.data().role||'standard';
    return 'standard';
  }).catch(()=>'standard');
}

function handleAuthReady(user){
  fbUid=user.uid;fbReady=true;
  syncStatus=navigator.onLine?'synced':'offline';
  // Determine role immediately — check hardcoded admin list first
  const isHardAdmin=user.email&&ADMIN_EMAILS.includes(user.email.toLowerCase());
  const immediateRole=isHardAdmin?'admin':(authUser?.uid===user.uid?authUser.role:'standard');
  authUser={uid:user.uid,email:user.email,role:immediateRole,displayName:user.displayName||authForm.name||''};
  saveAuthCache();
  if(state.screen==='login')state.screen='home';
  render();
  // Also refresh from Firestore in background (for non-hardcoded users)
  if(!isHardAdmin){
    loadUserRole(user).then(role=>{
      if(role!==authUser.role){authUser.role=role;saveAuthCache();render();}
    }).catch(()=>{});
  }
  try{saveUserToFirestore(user,authUser.role);}catch(e){}
  migrateLocalToFirestore();
  loadFromFirestore();
}

function doLogin(){
  authForm.error='';authForm.success='';
  if(!authForm.email||!authForm.password){authForm.error='Enter email and password';render();return;}
  fbAuth.signInWithEmailAndPassword(authForm.email,authForm.password).then(cred=>{
    handleAuthReady(cred.user);
  }).catch(e=>{
    authForm.error=e.code==='auth/user-not-found'?'No account with this email':
      e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'?'Incorrect password':
      e.code==='auth/invalid-email'?'Invalid email format':e.message;
    render();
  });
}
window.doLogin=doLogin;

function doRegister(){
  authForm.error='';authForm.success='';
  if(!authForm.email||!authForm.password){authForm.error='Enter email and password';render();return;}
  if(authForm.password.length<6){authForm.error='Password must be at least 6 characters';render();return;}
  if(!authForm.name.trim()){authForm.error='Enter your name';render();return;}
  // Check existing user count first to determine role
  const rolePromise=db?db.collection('users').get().then(snap=>snap.size===0?'admin':'standard').catch(()=>'standard'):Promise.resolve('standard');
  rolePromise.then(role=>{
    return fbAuth.createUserWithEmailAndPassword(authForm.email,authForm.password).then(cred=>{
      return cred.user.updateProfile({displayName:authForm.name.trim()}).then(()=>{
        saveUserToFirestore(cred.user,role);
        // handleAuthReady will be called by onAuthStateChanged
      });
    });
  }).catch(e=>{
    authForm.error=e.code==='auth/email-already-in-use'?'Email already registered — try logging in':
      e.code==='auth/invalid-email'?'Invalid email format':
      e.code==='auth/weak-password'?'Password too weak (min 6 characters)':e.message;
    render();
  });
}
window.doRegister=doRegister;

function doResetPassword(){
  authForm.error='';authForm.success='';
  if(!authForm.email){authForm.error='Enter your email address';render();return;}
  fbAuth.sendPasswordResetEmail(authForm.email).then(()=>{
    authForm.success='Password reset link sent to '+authForm.email;authForm.error='';render();
  }).catch(e=>{
    authForm.error=e.code==='auth/user-not-found'?'No account with this email':e.message;
    render();
  });
}
window.doResetPassword=doResetPassword;

function doLogout(){
  clearAuthCache();fbReady=false;fbUid=null;
  authForm={email:'',password:'',name:'',error:'',success:''};
  authScreen='login';state.screen='login';render();
  try{if(fbAuth)fbAuth.signOut().catch(()=>{});}catch(e){}
}
window.doLogout=doLogout;

function setAuthScreen(s){authScreen=s;authForm.error='';authForm.success='';render();}
window.setAuthScreen=setAuthScreen;
function updateAuthForm(k,v){authForm[k]=v;}
window.updateAuthForm=updateAuthForm;

// Admin can change a user's role (via Firestore)
function setUserRole(uid,role){
  if(!isAdmin()||!db)return;
  db.collection('users').doc(uid).update({role}).then(()=>{
    if(uid===authUser.uid){authUser.role=role;saveAuthCache();}
    render();
  }).catch(()=>{});
}
window.setUserRole=setUserRole;

function renderLoginScreen(){
  const isReg=authScreen==='register';
  const isReset=authScreen==='reset';
  return `<div class="screen light active">
    <div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--grass),var(--grass2));display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;box-shadow:0 4px 14px rgba(42,145,82,.3);">🏏</div>
      <div style="font-family:var(--fd);font-size:26px;font-weight:700;color:var(--home-text);letter-spacing:1px;">PITCH<em style="color:var(--grass2);font-style:normal;">UP</em></div>
      <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);margin-bottom:24px;">Junior Cricket · Player Development</div>

      <div style="width:100%;max-width:320px;">
        <div style="font-family:var(--fu);font-size:16px;font-weight:700;color:var(--home-text);margin-bottom:16px;text-align:center;">
          ${isReset?'Reset Password':isReg?'Create Account':'Sign In'}
        </div>

        ${authForm.error?`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#dc2626;font-family:var(--fu);">${escHtml(authForm.error)}</div>`:''}
        ${authForm.success?`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#16a34a;font-family:var(--fu);">${escHtml(authForm.success)}</div>`:''}

        ${isReg?`<input class="light-input" style="margin-bottom:10px;" placeholder="Your name" value="${escHtml(authForm.name)}" oninput="updateAuthForm('name',this.value)"/>`:''}

        <input class="light-input" style="margin-bottom:10px;" type="email" placeholder="Email address" value="${escHtml(authForm.email)}" oninput="updateAuthForm('email',this.value)" onkeydown="if(event.key==='Enter')${isReset?'doResetPassword()':isReg?'doRegister()':'doLogin()'}"/>

        ${!isReset?`<input class="light-input" style="margin-bottom:14px;" type="password" placeholder="Password" value="${escHtml(authForm.password)}" oninput="updateAuthForm('password',this.value)" onkeydown="if(event.key==='Enter')${isReg?'doRegister()':'doLogin()'}"/>`:''}

        ${isReset?`
          <button class="light-btn-primary" style="width:100%;margin-bottom:10px;" onclick="doResetPassword()">Send Reset Link</button>
          <button class="light-btn-secondary" style="width:100%;" onclick="setAuthScreen('login')">← Back to Sign In</button>
        `:isReg?`
          <button class="light-btn-primary" style="width:100%;margin-bottom:10px;" onclick="doRegister()">Create Account</button>
          <div style="text-align:center;margin-top:12px;">
            <span style="font-size:12px;color:var(--home-muted);font-family:var(--fu);">Already have an account?</span>
            <button style="background:none;border:none;color:var(--grass2);font-size:12px;font-family:var(--fu);font-weight:700;cursor:pointer;margin-left:4px;" onclick="setAuthScreen('login')">Sign In</button>
          </div>
        `:`
          <button class="light-btn-primary" style="width:100%;margin-bottom:10px;" onclick="doLogin()">Sign In</button>
          <div style="display:flex;justify-content:space-between;margin-top:12px;">
            <button style="background:none;border:none;color:var(--grass2);font-size:12px;font-family:var(--fu);font-weight:700;cursor:pointer;" onclick="setAuthScreen('register')">Create Account</button>
            <button style="background:none;border:none;color:var(--home-muted);font-size:12px;font-family:var(--fu);cursor:pointer;" onclick="setAuthScreen('reset')">Forgot Password?</button>
          </div>
        `}
      </div>

      <div style="margin-top:32px;font-size:9px;color:var(--home-muted);font-family:var(--fu);letter-spacing:1px;text-align:center;">PITCHUP · A PRODUCT OF THINKVIZ LIMITED<br>© 2025 ALL RIGHTS RESERVED</div>
    </div>
  </div>`;
}

let _firebaseInitDone=false;

// ─── Viewer Mode (read-only spectator) ───────────────────────────────────────
let viewerMode=false;
let viewerMatchId=null;
let viewerMatch=null;
let viewerError='';
let _viewerUnsub=null;

function detectViewerMode(){
  try{
    const params=new URLSearchParams(window.location.search);
    const viewId=params.get('view');
    if(viewId){
      viewerMode=true;
      viewerMatchId=viewId;
      return true;
    }
  }catch(e){}
  return false;
}

function startViewerListener(){
  if(!db||!viewerMatchId)return;
  // Sign in anonymously to satisfy Firestore rules
  fbAuth.signInAnonymously().catch(e=>{
    viewerError='Could not connect to live match. Anonymous auth may be disabled.';
    render();
  });
  // Subscribe to live match updates
  _viewerUnsub=db.collection('matches').doc(viewerMatchId).onSnapshot(doc=>{
    if(doc.exists){
      viewerMatch=doc.data();
      viewerError='';
    }else{
      viewerError='Match not found. Check the link or QR code.';
    }
    render();
  },err=>{
    viewerError='Could not load match: '+err.message;
    render();
  });
}

function initFirebase(){
  try{
    fb=firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    fbAuth=firebase.auth();
    db.enablePersistence({synchronizeTabs:true}).catch(e=>{
      console.warn('Firestore persistence unavailable:',e.code);
    });
    if(viewerMode){
      _firebaseInitDone=true;
      state.screen='viewer';
      startViewerListener();
      render();
      return;
    }
    // Listen for auth state changes
    fbAuth.onAuthStateChanged(user=>{
      _firebaseInitDone=true;
      if(user&&user.email){
        handleAuthReady(user);
      }else{
        clearAuthCache();
        fbReady=false;fbUid=null;
        state.screen='login';render();
      }
    });
  }catch(e){
    console.warn('Firebase init failed, using offline mode:',e);
    _firebaseInitDone=true;
    if(authUser){state.screen='home';}else{state.screen='login';}
    render();
  }
}

// ─── Firestore sync engine (batched, not per-ball) ───────────────────────────
let _lastSyncedOver=-1;
let _lastSyncedCharliePair=-1;

function shouldSyncNow(){
  if(!isSyncEnabled()||!state.match)return false;
  if(syncConfig.frequency==='manual')return false;
  const inn=getInn();if(!inn)return false;
  const bpo=getBpo();
  const charlie=isCharlie();
  const currentOver=Math.floor(inn.legalBalls/bpo);
  if(inn.legalBalls%bpo!==0)return false; // only sync at over boundaries

  // Determine over interval based on config
  let interval=1;
  if(syncConfig.frequency==='auto') interval=charlie?2:1;
  else if(syncConfig.frequency==='2overs') interval=2;
  else if(syncConfig.frequency==='5overs') interval=5;

  if(charlie){
    const pair=Math.floor(currentOver/interval);
    if(pair>_lastSyncedCharliePair){_lastSyncedCharliePair=pair;return true;}
  }else{
    const bucket=Math.floor(currentOver/interval);
    if(bucket>_lastSyncedOver){_lastSyncedOver=bucket;return true;}
  }
  return false;
}

function resetSyncCounters(){_lastSyncedOver=-1;_lastSyncedCharliePair=-1;}

function syncMatchToFirestore(force){
  if(!isSyncEnabled()||!db||!state.match)return;
  if(!force&&!shouldSyncNow())return;

    innings:m.innings.map(inn=>inn?{
      total:inn.total,wickets:inn.wickets,legalBalls:inn.legalBalls,overs:inn.overs,
      complete:inn.complete,extras:{...inn.extras},
      batters:inn.batters.map(b=>({...b})),
      bowlers:inn.bowlers.map(b=>({...b})),
      currentBatters:[...inn.currentBatters],
      charlieBowlers:[...inn.charlieBowlers],
      deliveries:inn.deliveries.map(d=>({...d}))
    }:null),

function loadFromFirestore(){
  if(!fbReady||!db)return;
  // Load teams from Firestore (merge with local)
  db.collection('teams').get().then(snap=>{
    const fbTeams=[];
    snap.forEach(doc=>fbTeams.push(doc.data()));
    // Merge: Firestore wins for existing IDs, keep local-only teams
    const merged=[...state.teams];
    fbTeams.forEach(ft=>{
      const idx=merged.findIndex(t=>t.id===ft.id);
      if(idx>=0)merged[idx]={...merged[idx],...ft};
      else merged.push(ft);
    });
    state.teams=merged;
    persist();render();
  }).catch(()=>{});
  // Load saved matches from Firestore (merge with local)
  db.collection('matches').where('complete','==',true).orderBy('date','desc').limit(20).get().then(snap=>{
    const fbMatches=[];
    snap.forEach(doc=>fbMatches.push(doc.data()));
    const merged=[...state.savedMatches];
    fbMatches.forEach(fm=>{
      if(!fm.matchId)return;
      const idx=merged.findIndex(m=>m.matchId===fm.matchId);
      if(idx>=0)merged[idx]={...merged[idx],...fm};
      else merged.push(fm);
    });
    state.savedMatches=merged.slice(0,20);
    persist();render();
  }).catch(()=>{});
  // Load squads from Firestore (merge with local)
  db.collection('squads').get().then(snap=>{
    const fbSquads=[];
    snap.forEach(doc=>fbSquads.push(doc.data()));
    const merged=[...state.squads];
    fbSquads.forEach(fs=>{
      const idx=merged.findIndex(s=>s.id===fs.id);
      if(idx>=0)merged[idx]={...merged[idx],...fs};
      else merged.push(fs);
    });
    state.squads=merged;
    persist();render();
  }).catch(()=>{});
}

// ─── State helpers ────────────────────────────────────────────────────────────
function getInn(){return state.match?.innings?.[state.currentInnings];}
function getRules(){return state.match?.rules||DEFAULT_RULES;}
function getBpo(){return getRules().ballsPerOver||6;}
function isCharlie(){return (state.match?.bowlingMode||'charlie')==='charlie';}
// Returns true at an over boundary where we should prompt for next bowler(s)
// Standard: every over. Charlie: every 2 overs (pair boundary).
function isOverBoundary(inn){
  if(!inn)return false;
  if(isInningsOver())return false; // don't prompt for bowlers when innings is done
  const bpo=getBpo();
  if(inn.legalBalls===0||inn.legalBalls%bpo!==0)return false;
  if(isCharlie()){
    // In Charlie, prompt every 2 overs (pair boundary)
    return inn.overs%2===0&&inn.overs>0;
  }
  return true; // Standard: every over
}
// Check if a bowler has completed their over quota
function bowlerQuotaDone(bowlerObj){
  const max=getRules().maxOversPerBowler;
  if(!max||max<=0||!bowlerObj)return false;
  const bpo=getBpo();
  return Math.floor(bowlerObj.balls/bpo)>=max;
}
function updateInn(fn){
  const m=state.match;
  const innings=[...m.innings];
  innings[state.currentInnings]=fn(JSON.parse(JSON.stringify(innings[state.currentInnings])));
  state.match={...m,innings};
}

function exportCSV(match){

  let csv=`PitchUp · Cricket Management Platform\nProduct of ThinkViz Limited · pitchup.app\n${teamA} vs ${teamB}\n${match.totalOvers} overs · ${bpo}b/over · ${match.bowlingMode==='standard'?'Standard':'Charlie Cricket (tandem)'}\n\n`;
  [0,1].forEach(idx=>{
    const inn=innings[idx];if(!inn)return;
    const team=idx===0?teamA:teamB;
    csv+=`\n=== ${team} Innings ===\nBATTING\nBatter,R,B,4s,6s,SR,Status\n`;
    inn.batters.forEach(b=>{
      const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):'-';
      csv+=`${b.name},${b.runs},${b.balls},${b.fours},${b.sixes},${sr},${b.retired?'retired not out':b.out?b.dismissal:'not out'}\n`;
    });
    csv+=`Extras,${inn.extras.total}\nTOTAL,${inn.total}/${inn.wickets} (${overStr(inn.legalBalls,bpo)})\n`;
    csv+=`BOWLING\nBowler,O,R,W,Wd,NB,Econ\n`;
    inn.bowlers.forEach(b=>{
      const econ=b.balls>0?(b.runs/(b.balls/bpo)).toFixed(2):'-';
      csv+=`${b.name},${overStr(b.balls,bpo)},${b.runs},${b.wickets},${b.wides},${b.noBalls},${econ}\n`;
    });
    csv+=`BALL-BY-BALL\nOver,Ball,Bowler,Batter,Event,Runs\n`;
    inn.deliveries.forEach(d=>{ csv+=`${d.over+1},${d.ball},${d.bowler||''},${d.batter||''},${d.event},${d.runs}\n`; });
  });
  // Player notes
  if(match.playerNotes&&match.playerNotes.length>0){
    csv+=`\nPLAYER NOTES\nPlayer,Category,Note,Author,Date\n`;
    match.playerNotes.forEach(n=>{
      const d=new Date(n.timestamp).toLocaleDateString('en-GB');
      csv+=`${n.playerName},${n.category||'general'},"${(n.note||'').replace(/"/g,'""')}",${n.author||''},${d}\n`;
    });
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${teamA}_vs_${teamB}.csv`;a.click();
}

// ─── Scoring actions ──────────────────────────────────────────────────────────
function scoreRuns(runs){
  const rules=getRules(),bpo=getBpo(),charlie=isCharlie();
  let retiredName=null;
  updateInn(inn=>{
    const ab=inn.batters.find(b=>b.id===inn.currentBatters[0]);
    const bw=inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]);
    if(ab){ab.runs+=runs;ab.balls+=1;if(runs===4)ab.fours+=1;if(runs===6)ab.sixes+=1;}
    if(bw){bw.runs+=runs;bw.balls+=1;}
    inn.total+=runs;inn.legalBalls+=1;
    inn.deliveries.push({over:inn.overs,ball:inn.legalBalls%bpo,bowler:bw?.name,batter:ab?.name,event:`${runs}`,runs});
    if(runs%2===1)inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];
    if(inn.legalBalls%bpo===0){inn.overs+=1;inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];}
    // Charlie mode: swap bowlers every delivery. Standard: no auto-swap (scorer manually picks each over)
    if(charlie) inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];
    if(rules.retirementScore>0&&ab&&ab.runs>=rules.retirementScore){
      // Retire at each multiple of retirementScore (25, 50, 75, ...)
      const timesRetired=ab.retireCount||0;
      const nextThreshold=rules.retirementScore*(timesRetired+1);
      if(ab.runs>=nextThreshold){
        // Only retire if there's another batter available (fresh or retired not-out)
        const hasReplacement=inn.batters.some(b=>b.id!==ab.id&&!b.out&&!inn.currentBatters.includes(b.id));
        if(hasReplacement){
          ab.retired=true;ab.retireCount=timesRetired+1;ab.retiredAt=Date.now();
          inn.currentBatters=inn.currentBatters.map(id=>id===ab.id?null:id);retiredName=ab.name;
        }
      }
    }
    return inn;
  });
  persist();syncMatchToFirestore(false);
  const innAfter=getInn();
  const needBowlerChange=innAfter&&isOverBoundary(innAfter);
  if(retiredName){
    _pendingNextBowler=!!needBowlerChange;
    openModal('newbatter',{reason:'retired',name:retiredName});
  }else if(needBowlerChange){openModal('nextbowler',{});}
  else render();
}
window.scoreRuns=scoreRuns;

function scoreExtra(type){
  const rules=getRules(),bpo=getBpo(),charlie=isCharlie();
  updateInn(inn=>{
    const bw=inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]);
    const isWide=type==='Wide',isNB=type==='No Ball',isBye=type==='Bye',isLB=type==='Leg Bye';
    const extraRuns=isWide?rules.wideRuns:isNB?rules.noBallRuns:1;
    const isLegal=(isWide&&!rules.wideBowlAgain)||(isNB&&!rules.noBallBowlAgain)||isBye||isLB;
    inn.total+=extraRuns;inn.extras.total+=extraRuns;
    if(isWide){inn.extras.wides+=1;if(bw){bw.runs+=extraRuns;bw.wides+=1;}}
    if(isNB){inn.extras.noBalls+=1;if(bw){bw.runs+=extraRuns;bw.noBalls+=1;}}
    if(isBye)inn.extras.byes+=1;if(isLB)inn.extras.legByes+=1;
    if(isLegal){
      inn.legalBalls+=1;if(bw)bw.balls+=1;
      if(inn.legalBalls%bpo===0){inn.overs+=1;inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];}
      // Charlie: swap on every legal delivery. Standard: no auto-swap.
      if(charlie) inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];
    }
    inn.deliveries.push({over:inn.overs,ball:inn.legalBalls%bpo,bowler:bw?.name,batter:'Extra',event:type,runs:extraRuns,isExtra:true,extraType:type});
    return inn;
  });
  persist();syncMatchToFirestore(false);
  const innAfter=getInn();
  if(innAfter&&isOverBoundary(innAfter)){openModal('nextbowler',{});}
  else render();
}
window.scoreExtra=scoreExtra;

function scoreWicket(outId,type,runs,fielder){
  const bpo=getBpo(),charlie=isCharlie();
  updateInn(inn=>{
    const bw=inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]);
    const bt=inn.batters.find(b=>b.id===outId);
    if(bt){
      bt.out=true;bt.balls+=1;bt.runs+=runs;
      // Build structured dismissal
      let dis='';
      if(type==='Bowled')dis=`b ${bw?.name||''}`;
      else if(type==='Caught')dis=`c ${fielder||'?'} b ${bw?.name||''}`;
      else if(type==='LBW')dis=`lbw b ${bw?.name||''}`;
      else if(type==='Run Out')dis=`run out${fielder?' ('+fielder+')':''}`;
      else if(type==='Stumped')dis=`st ${fielder||'?'} b ${bw?.name||''}`;
      else if(type==='Hit Wicket')dis=`hit wicket b ${bw?.name||''}`;
      else dis=type.toLowerCase();
      bt.dismissal=dis;
      bt.dismissalType=type;
      bt.dismissalFielder=fielder||'';
      bt.dismissalBowler=bw?.name||'';
    }
    if(bw&&type!=='Run Out'){bw.wickets+=1;bw.balls+=1;}
    inn.total+=runs;inn.wickets+=1;inn.legalBalls+=1;
    inn.currentBatters=inn.currentBatters.map(id=>id===outId?null:id);
    inn.deliveries.push({over:inn.overs,ball:inn.legalBalls%bpo,bowler:bw?.name,batter:bt?.name,event:`W (${type})`,runs,isWicket:true,fielder:fielder||''});
    if(inn.legalBalls%bpo===0){inn.overs+=1;inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];}
    if(charlie) inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];
    return inn;
  });
  persist();if(syncConfig.syncOnWicket)syncMatchToFirestore(true);
  const innAfterW=getInn();
  _pendingNextBowler=!!(innAfterW&&isOverBoundary(innAfterW));
  openModal('newbatter',{reason:'wicket'});
}

function swapBowlers(){updateInn(inn=>{inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];return inn;});render();}
window.swapBowlers=swapBowlers;

function isInningsOver(){
  const inn=getInn();if(!inn)return false;
  const bp=state.currentInnings===0?state.match.playersA:state.match.playersB;
  return inn.wickets>=bp.length-1||inn.legalBalls>=state.match.totalOvers*getBpo();
}

function endInnings(){
  updateInn(inn=>{inn.complete=true;return inn;});
  if(syncConfig.syncOnInningsEnd)syncMatchToFirestore(true);
  if(state.currentInnings===0){state.currentInnings=1;state.screen='innings_setup';resetSyncCounters();}
  else{
    state.screen='result';
    const m={...state.match,complete:true,date:new Date().toISOString()};
    state.match=m;
    state.savedMatches=[m,...state.savedMatches.slice(0,19)];
    persist();
    syncMatchToFirestore(true); // sync completed match
  }
  render();
}

  state.match={

    playersB:d.playersB.slice(0,d.sizeB).filter(p=>p&&p.trim()),

// ─── Innings setup state ──────────────────────────────────────────────────────
let innSetup={op1:0,op2:1,bw1:0,bw2:1};

function startInnings(){
  const m=state.match,idx=state.currentInnings;
  const batP=idx===0?m.playersA:m.playersB;
  const bowlP=idx===0?m.playersB:m.playersA;
  const batters=batP.map((n,i)=>initBatter(n,`bat_${i}`));
  const bowlers=bowlP.map((n,i)=>initBowler(n,`bowl_${i}`));
  const b1=bowlers.find(b=>b.name===bowlP[innSetup.bw1]);
  const b2=bowlers.find(b=>b.name===bowlP[innSetup.bw2]);
  const op1=batters.find(b=>b.name===batP[innSetup.op1]);
  const op2=batters.find(b=>b.name===batP[innSetup.op2]);
  const inn={total:0,wickets:0,legalBalls:0,overs:0,batters,bowlers,
    currentBatters:[op1?.id,op2?.id],charlieBowlers:[b1?.id,b2?.id],
    extras:{total:0,wides:0,noBalls:0,byes:0,legByes:0},deliveries:[],complete:false};
  const innings=[...(m.innings||[])];innings[idx]=inn;
  state.match={...m,innings};state.screen='scoring';
  innSetup={op1:0,op2:1,bw1:0,bw2:1};render();
}
window.startInnings=startInnings;

function updateWFS(k,v){
  wfs[k]=k==='runs'?Number(v):v;
  if(k==='type'){
    wfs.runs=(v==='Run Out')?1:0;
    wfs.fielder=(v==='Caught'||v==='Run Out'||v==='Stumped')?'':'';
    render();
  }
}

// ─── Striker override ─────────────────────────────────────────────────────────
function applyStriker(id){
  updateInn(inn=>{const other=inn.currentBatters.find(x=>x!==id);inn.currentBatters=[id,other];return inn;});
  closeModal();
}
window.applyStriker=applyStriker;

// ─── Bowler retirement ────────────────────────────────────────────────────────
let retireBowlerState={slot:null,reason:'Injury'};
function setRetireSlot(s){retireBowlerState.slot=s;render();}
window.setRetireSlot=setRetireSlot;
function setRetireReason(r){retireBowlerState.reason=r;render();}
window.setRetireReason=setRetireReason;
function confirmRetireBowler(){
  const {slot,reason}=retireBowlerState;if(slot===null)return;
  updateInn(inn=>{
    const bId=inn.charlieBowlers[slot];
    const b=inn.bowlers.find(x=>x.id===bId);
    if(b){b.retiredInjured=true;b.retireReason=reason;}
    inn.charlieBowlers[slot]=null;return inn;
  });
  state.modal={type:'replaceBowler',data:{slot}};
  retireBowlerState={slot:null,reason:'Injury'};render();
}
window.confirmRetireBowler=confirmRetireBowler;

function applyReplaceBowler(name,slot){
  updateInn(inn=>{
    let nb=inn.bowlers.find(b=>b.name===name);
    if(!nb){const id=`bx_${Date.now()}`;inn.bowlers.push(initBowler(name,id));nb=inn.bowlers[inn.bowlers.length-1];}
    inn.charlieBowlers[slot]=nb.id;return inn;
  });
  closeModal();
}
window.applyReplaceBowler=applyReplaceBowler;

function selectNewBatter(id){
  updateInn(inn=>{
    const nb=inn.batters.find(b=>b.id===id);
    const slot=inn.currentBatters.findIndex(x=>x===null);
    if(nb&&slot!==-1){
      inn.currentBatters[slot]=nb.id;
      if(nb.retired)nb.retired=false; // retired not-out batter returns to crease
    }
    return inn;
  });
  if(_pendingNextBowler){
    _pendingNextBowler=false;
    openModal('nextbowler',{});
  }else{
    closeModal();
  }
}
window.selectNewBatter=selectNewBatter;

        state.squads.forEach(sq=>sq.players.forEach(p=>{
          if(teamNames.includes(p.name.trim().toLowerCase())){
            (p.skills||[]).forEach(s=>{teamSkills[s]=(teamSkills[s]||0)+1;});
            teamPlayerSkills.push({name:p.name,skills:p.skills||[]});
          }
        }));
        const wkCount=teamSkills['WK']||0;
        const spinCount=teamSkills['SPIN']||0;
        const seamCount=teamSkills['SEAM']||0;
        const paceCount=teamSkills['PACE']||0;
        const batCount=teamSkills['BAT']||0;
        const hasBalance=teamNames.length>0;
        const balanceCard=hasBalance?`<div class="team-form-card" style="margin-bottom:12px;">
          <div class="team-form-title" style="color:#2563eb;">⚖️ Team Balance</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">
            ${PLAYER_SKILLS.map(s=>{
              const cnt=teamSkills[s.key]||0;
              const warn=s.key==='WK'&&cnt===0&&teamNames.length>=4;
              const good=s.key==='WK'&&cnt>=1&&cnt<=3;
              return `<div style="padding:6px 10px;border-radius:8px;border:1px solid ${warn?'#fecaca':good?'#bbf7d0':'var(--home-border)'};background:${warn?'#fef2f2':good?'#f0fdf4':'#fff'};text-align:center;min-width:55px;">
                <div style="font-family:var(--fd);font-size:18px;font-weight:700;color:${s.color};">${cnt}</div>
                <div style="font-size:9px;color:var(--home-muted);font-family:var(--fu);">${s.icon} ${s.label}</div>
              </div>`;
            }).join('')}
          </div>
          ${wkCount===0&&teamNames.length>=4?'<div style="font-size:11px;color:#dc2626;font-family:var(--fu);margin-bottom:4px;">⚠️ No WK — add a wicketkeeper</div>':''}
          ${wkCount>3?'<div style="font-size:11px;color:#d97706;font-family:var(--fu);margin-bottom:4px;">⚠️ '+wkCount+' WKs — consider max 3</div>':''}
          ${spinCount===0&&seamCount===0&&paceCount===0&&teamNames.length>=4?'<div style="font-size:11px;color:#d97706;font-family:var(--fu);margin-bottom:4px;">⚠️ No bowlers selected — add spin or seam</div>':''}
        </div>`:'';

        return balanceCard;
      })()}
      ${state.squads.length>0?`<div class="team-form-card">
        <div class="team-form-title" style="color:#b45309;">🏅 Pick from Master Squad</div>
        <div style="font-size:11px;color:var(--home-muted);margin-bottom:10px;font-family:var(--fu);">Tap players to add · Skills shown as tags</div>
        ${(()=>{
          const regions={};
          state.squads.forEach(sq=>{
            const r=sq.region||'Unassigned';
            if(!regions[r])regions[r]=[];
            regions[r].push(sq);
          });
          const existingNames=editTeamData.players.map(p=>p.name.trim().toLowerCase()).filter(Boolean);
          return Object.keys(regions).sort().map(region=>{
            return `<div style="margin-bottom:10px;">
              <div style="font-size:10px;color:#b45309;font-family:var(--fu);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">📍 ${escHtml(region)}</div>
              ${regions[region].map(sq=>{
                return `<div style="margin-bottom:8px;">
                  <div style="font-size:11px;color:var(--home-text);font-family:var(--fu);font-weight:700;margin-bottom:4px;">${escHtml(sq.group)}</div>
                  <div style="display:flex;flex-direction:column;gap:4px;">
                    ${sq.players.map(p=>{
                      const alreadyAdded=existingNames.includes(p.name.trim().toLowerCase());
                      const safeName=p.name.replace(/'/g,"\\'");
                      const skillTags=(p.skills||[]).map(sk=>{
                        const def=PLAYER_SKILLS.find(s=>s.key===sk);
                        return def?`<span style="font-size:8px;padding:1px 4px;border-radius:4px;background:${def.color}18;color:${def.color};font-weight:700;">${def.icon}${def.label}</span>`:'';
                      }).join('');
                      return `<button style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;font-size:11px;font-family:var(--fu);font-weight:600;cursor:pointer;border:1px solid ${alreadyAdded?'#bbf7d0':'var(--home-border)'};background:${alreadyAdded?'#f0fdf4':'#fff'};color:${alreadyAdded?'var(--grass)':'var(--home-text)'};text-align:left;" onclick="${alreadyAdded?'':`addPlayerFromSquad('${safeName}')`}" ${alreadyAdded?'disabled':''}>
                        <span style="flex:1;">${escHtml(p.name)}${alreadyAdded?' ✓':''}</span>
                        <span style="display:flex;gap:3px;">${skillTags}</span>
                      </button>`;
                    }).join('')}
                  </div>
                </div>`;
              }).join('')}
            </div>`;
          }).join('');
        })()}
      </div>`:''}
      <div class="light-nav-row">
        <button class="light-btn-secondary" onclick="state.screen='teams';state.editTeamId=null;render()">Cancel</button>
        <button class="light-btn-primary" onclick="saveTeam()">✓ Save Team</button>
      </div>
    </div>
  </div>`;
}

function renderRulesConfig(r){
  function tog(field,label,desc,onBg){
    const on=r[field];
    return `<div class="toggle-row">
      <div class="tinfo"><div class="tlabel">${label}</div><div class="tdesc">${desc}</div></div>
      <button class="tswitch" style="background:${on?onBg:'var(--faint)'}" onclick="toggleRule('${field}')">
        <div class="tknob" style="left:${on?'24px':'2px'}"></div>
      </button></div>`;
  }
  function step(field,label,desc,mn,mx){
    return `<div class="stepper-row">
      <div class="stepper-info"><div class="stepper-label">${label}</div>${desc?`<div class="stepper-desc">${desc}</div>`:''}</div>
      <div class="stepper-ctrl">
        <button class="stepper-btn" onclick="stepRule('${field}',-1,${mn},${mx})">−</button>
        <span class="stepper-val">${r[field]}</span>
        <button class="stepper-btn" onclick="stepRule('${field}',1,${mn},${mx})">+</button>
      </div></div>`;
  }
  return `
    <div class="rules-sec" style="background:rgba(232,168,32,.03);border:1px solid rgba(232,168,32,.14);">
      <div class="rules-sec-title" style="color:var(--gold);">⚙️ Over Length</div>
      ${step('ballsPerOver','Balls per Over','Standard=6 · Junior=5',4,8)}
    </div>
    <div class="rules-sec" style="background:rgba(255,160,80,.03);border:1px solid rgba(255,160,80,.14);">
      <div class="rules-sec-title" style="color:#fb923c;">〰️ Wide Rules</div>
      ${step('wideRuns','Runs per Wide','Extras on each wide',0,5)}
      ${tog('wideBowlAgain','Must re-bowl','ON=illegal · OFF=legal ball','#7b3f00')}
    </div>
    <div class="rules-sec" style="background:rgba(220,50,50,.03);border:1px solid rgba(220,50,50,.14);">
      <div class="rules-sec-title" style="color:#f87171;">⛔ No Ball Rules</div>
      ${step('noBallRuns','Runs per No Ball','Extras on each no ball',0,5)}
      ${tog('noBallBowlAgain','Must re-bowl','ON=illegal · OFF=legal ball','#7b0000')}
    </div>
    <div class="rules-sec" style="background:rgba(59,130,246,.03);border:1px solid rgba(59,130,246,.14);">
      <div class="rules-sec-title" style="color:var(--sky);">🎳 Bowling Quota</div>
      ${step('maxOversPerBowler','Max Overs per Bowler','0 = unlimited',0,10)}
    </div>
    <div class="rules-sec" style="background:rgba(129,140,248,.03);border:1px solid rgba(129,140,248,.14);">
      <div class="rules-sec-title" style="color:#a78bfa;">🏃 Batter Retirement</div>
      <div class="stepper-label" style="margin-bottom:3px;">Auto-retire at score</div>
      <div class="stepper-desc" style="margin-bottom:10px;">0 = disabled</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="stepper-btn" onclick="stepRule('retirementScore',-5,0,100)">−</button>
        <span class="retire-val" style="color:${r.retirementScore>0?'#a78bfa':'var(--muted)'};">${r.retirementScore>0?r.retirementScore:'OFF'}</span>
        <button class="stepper-btn" onclick="retirementInc()">+</button>
        ${r.retirementScore>0?`<button style="background:none;border:1px solid var(--border);border-radius:7px;color:var(--home-muted);padding:4px 9px;cursor:pointer;font-size:11px;" onclick="stepRule('retirementScore',-100,0,100)">Off</button>`:''}
      </div>
    </div>`;
}

function applyTeamFromRegistry(side,id){
  if(!id){setupData[side==='A'?'teamAId':'teamBId']=null;return;}
  const t=state.teams.find(x=>x.id===id);if(!t)return;
  if(side==='A'){
    setupData.teamA=t.name;setupData.teamAId=id;
    setupData.playersA=t.players.map(p=>p.name);
    setupData.sizeA=Math.max(2,Math.min(15,t.players.length));
  }else{
    setupData.teamB=t.name;setupData.teamBId=id;
    setupData.playersB=t.players.map(p=>p.name);
    setupData.sizeB=Math.max(2,Math.min(15,t.players.length));
  }
  render();
}
window.applyTeamFromRegistry=applyTeamFromRegistry;

// ─── SCORING ──────────────────────────────────────────────────────────────────
function renderScorecard(inn,teamName,bpo){
  if(!inn)return'';
  const crr=inn.legalBalls>0?((inn.total/inn.legalBalls)*bpo).toFixed(2):'0.00';
  let br='';
  inn.batters.filter(b=>b.balls>0||inn.currentBatters.includes(b.id)).forEach(b=>{
    const isA=inn.currentBatters.includes(b.id);
    const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
    const nc=isA?'td-active':b.retired?'td-retired':'td-normal';
    const pre=isA?'⚡ ':b.retired?'🏃 ':'';
    const sub=(b.out||b.retired)?`<div class="td-sub">${b.retired?'retired not out':escHtml(b.dismissal)}</div>`:'';
    br+=`<tr><td><span class="${nc}">${pre}${escHtml(b.name)}</span>${sub}</td>
      <td class="td-runs">${b.runs}</td><td class="td-stat">${b.balls}</td>
      <td class="td-stat">${b.fours}</td><td class="td-stat">${b.sixes}</td><td class="td-stat">${sr}</td></tr>`;
  });
  let bwr='';
  inn.bowlers.filter(b=>b.balls>0||b.wides>0||b.noBalls>0).forEach(b=>{
    const econ=b.balls>0?(b.runs/(b.balls/bpo)).toFixed(1):'-';
    const isA=inn.charlieBowlers[0]===b.id;
    const nc=isA?'td-bact':b.retiredInjured?'td-bret':'';
    const pre=isA?'⚡ ':b.retiredInjured?'🚑 ':'';
    const sub=b.retiredInjured?`<div style="font-size:9px;color:#fb923c;">${b.retireReason}</div>`:'';
    bwr+=`<tr><td><span class="${nc}">${pre}${escHtml(b.name)}</span>${sub}</td>
      <td>${overStr(b.balls,bpo)}</td><td>${b.runs}</td><td>${b.wickets}</td>
      <td>${b.wides}</td><td>${b.noBalls}</td><td>${econ}</td></tr>`;
  });
  return `<div class="card anim-in">
    <div class="card-head"><span class="card-head-title">${escHtml(teamName)}</span><span class="card-head-crr">CRR ${crr}</span></div>
    <table class="ct"><thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody>${br}</tbody></table>
    <div class="card-extras"><span style="color:var(--home-muted)">Extras <strong style="color:var(--home-text)">${inn.extras.total}</strong> (W:${inn.extras.wides} NB:${inn.extras.noBalls} B:${inn.extras.byes} LB:${inn.extras.legByes})</span><span class="card-total">${inn.total}/${inn.wickets} (${overStr(inn.legalBalls,bpo)})</span></div>
    <div class="card-bowling"><table class="cbt"><thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Econ</th></tr></thead><tbody>${bwr}</tbody></table></div>
  </div>`;
}

function renderScoring(){
  const m=state.match,inn=getInn(),bpo=getBpo(),rules=getRules();
  const charlie=(m.bowlingMode||'charlie')==='charlie';
  const batTeam=state.currentInnings===0?m.teamA:m.teamB;
  const bowlTeam=state.currentInnings===0?m.teamB:m.teamA;
  const inningsOver=isInningsOver();
  const target=state.currentInnings===1&&m.innings[0]?m.innings[0].total+1:null;
  const runsNeeded=target?target-(inn.total||0):null;
  const ballsLeft=(m.totalOvers*bpo)-inn.legalBalls;

  let batsHtml='';
  inn.currentBatters.forEach((bId,i)=>{
    const b=inn.batters.find(x=>x.id===bId);if(!b)return;
    const nr=rules.retirementScore>0&&b.runs>=rules.retirementScore-5;
    batsHtml+=`<div class="sb-batter ${i===0?'striker':''}" onclick="${i===0?'openModal(\'striker\',{})':''}">
      <span class="sb-role">${i===0?'⚡ STRIKER':'NON-STRIKER'}</span>
      <span class="sb-name">${escHtml(b.name)}</span>
      <span class="sb-sc ${nr?'sb-warn':''}">${b.runs}(${b.balls})${nr?'⚠':''}
      </span>${i===0?'<span class="sb-edit">✎</span>':''}
    </div>`;
  });

  const active=inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const waiting=inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;

  const bvs=[{v:0,c:'b0'},{v:1,c:'b1'},{v:2,c:'b2'},{v:3,c:'b3'},{v:4,c:'b4',s:'FOUR'},{v:6,c:'b6',s:'SIX'}];
  const extraInfo={'Wide':`+${rules.wideRuns}r${rules.wideBowlAgain?' rebowl':''}`,'No Ball':`+${rules.noBallRuns}r${rules.noBallBowlAgain?' rebowl':''}`,'Bye':'+1 legal','Leg Bye':'+1 legal'};

  let wicketSect='';
  if(wicketFormVisible){
    const abIds=inn.currentBatters.filter(Boolean);
    const bsel=abIds.map(id=>{const b=inn.batters.find(x=>x.id===id);return b?`<option value="${id}" ${wfs.outId===id?'selected':''}>${escHtml(b.name)}</option>`:''}).join('');
    const tsel=WICKET_TYPES.map(t=>`<option ${wfs.type===t?'selected':''}>${t}</option>`).join('');
    const needsFielder=wfs.type==='Caught'||wfs.type==='Run Out'||wfs.type==='Stumped';
    const fieldingTeam=state.currentInnings===0?m.playersB:m.playersA;
    const fielderSel=needsFielder?`<div class="wf-row" style="margin-top:0;">
      <select onchange="updateWFS('fielder',this.value)" style="flex:1;">
        <option value="">-- ${wfs.type==='Caught'?'Caught by':wfs.type==='Stumped'?'Stumped by':'Run out by'} --</option>
        ${fieldingTeam.map(name=>`<option value="${escHtml(name)}" ${wfs.fielder===name?'selected':''}>${escHtml(name)}</option>`).join('')}
      </select>
    </div>`:'';
    wicketSect=`<div class="wicket-form">
      <div class="wf-title">🏏 Record Wicket</div>
      <div class="wf-row">
        <select onchange="updateWFS('outId',this.value)">${bsel}</select>
        <select onchange="updateWFS('type',this.value)">${tsel}</select>
        <input type="number" min="0" max="6" value="${wfs.runs}" oninput="updateWFS('runs',this.value)" placeholder="Runs scored"/>
      </div>
      ${fielderSel}
      <div class="form-btns">
        <button class="btn-confirm" onclick="confirmWicket()">Confirm Wicket</button>
        <button class="btn-cancel" onclick="wicketFormVisible=false;render()">Cancel</button>
      </div></div>`;
  }else{
    wicketSect=`<button class="wicket-btn" ${inningsOver?'disabled':''} onclick="openWicketForm()">🏏 WICKET</button>`;
  }

  const overBalls=inn.deliveries.slice(-14).map(d=>{
    let cls='ob-run',lbl=d.runs;
    if(d.isWicket){cls='ob-wkt';lbl='W';}
    else if(d.runs===6)cls='ob-six';
    else if(d.runs===4)cls='ob-four';
    else if(d.isExtra){cls='ob-ext';lbl=d.extraType?.[0]||'E';}
    return `<div class="ob ${cls}">${lbl}</div>`;
  }).join('');

  const maxOv=rules.maxOversPerBowler||0;
  function bowlerQuotaLabel(bw){
    if(!bw||!maxOv)return '';
    const used=Math.floor(bw.balls/bpo);
    return ` · ${used}/${maxOv}ov`;
  }

  // Bowler stats helper
  function bwStatLine(bw){
    if(!bw)return '';
    const econ=bw.balls>0?(bw.runs/(bw.balls/bpo)).toFixed(1):'-';
    return `${overStr(bw.balls,bpo)}ov · ${bw.runs}r · ${bw.wickets}w · ${bw.wides}wd · ${bw.noBalls}nb · Econ ${econ}${bowlerQuotaLabel(bw)}`;
  }

  let mainContent='';
  if(showScorecard){
    mainContent=renderScorecard(inn,batTeam,bpo);
    if(m.innings[0]&&state.currentInnings===1)mainContent+=renderScorecard(m.innings[0],m.teamA,bpo);
  }else{
    mainContent=`
      <!-- LAYER 2: Batter cards -->
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;">
        ${inn.currentBatters.map((bId,i)=>{
          const b=inn.batters.find(x=>x.id===bId);if(!b)return '';
          const nr=rules.retirementScore>0&&b.runs>=rules.retirementScore-5;
          const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
          return `<div class="sb-batter ${i===0?'striker':''}" style="flex:1;min-width:120px;" onclick="${i===0?'openModal(&quot;striker&quot;,{})':''}">
            <span class="sb-role">${i===0?'⚡ STRIKER':'NON-STRIKER'}</span>
            <span class="sb-name">${escHtml(b.name)}</span>
            <div style="display:flex;gap:8px;align-items:center;margin-top:2px;">
              <span class="sb-sc ${nr?'sb-warn':''}" style="font-size:18px;">${b.runs}<span style="font-size:11px;color:var(--home-muted);">(${b.balls})</span>${nr?'⚠':''}</span>
              <span style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${b.fours}×4 · ${b.sixes}×6 · SR ${sr}</span>
            </div>
            <div style="display:flex;gap:4px;margin-top:3px;">
              ${i===0?'<span class="sb-edit">✎</span>':''}
              <button onclick="event.stopPropagation();addPlayerNote('${b.name.replace(/'/g,"\\'")}')" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;color:#2563eb;font-size:9px;padding:2px 6px;cursor:pointer;font-family:var(--fu);font-weight:700;">📝</button>
              ${(state.match?.playerNotes||[]).filter(n=>n.playerName===b.name).length>0?`<button onclick="event.stopPropagation();viewPlayerNotes('${b.name.replace(/'/g,"\\'")}')" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;color:var(--grass);font-size:9px;padding:2px 6px;cursor:pointer;font-family:var(--fu);font-weight:700;">${(state.match?.playerNotes||[]).filter(n=>n.playerName===b.name).length} notes</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>

      <!-- LAYER 3: Bowler stats card with change bowler -->
      ${charlie?`
      <div style="background:rgba(232,168,32,.05);border:1px solid rgba(232,168,32,.15);border-radius:12px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:600;">Bowling Pair</span>
          <button class="c-retire-btn" style="padding:5px 10px;border-radius:8px;font-size:11px;" onclick="retireBowlerState={slot:null,reason:'Injury'};openModal('retireBowler',{})">🔄 Change</button>
        </div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;background:#f8fafc;border-radius:9px;padding:7px 9px;">
            <div style="font-size:9px;color:var(--grass3);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟢 BOWLING NOW</div>
            <div style="font-family:var(--fd);font-size:15px;color:var(--home-text);margin:2px 0;">${escHtml(active?.name||'—')}</div>
            <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${active?bwStatLine(active):''}</div>
          </div>
          <button class="swap-btn" onclick="swapBowlers()" title="Manual swap" style="align-self:center;">⇄</button>
          <div style="flex:1;background:#f8fafc;border-radius:9px;padding:7px 9px;">
            <div style="font-size:9px;color:var(--gold);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟡 BOWLING NEXT</div>
            <div style="font-family:var(--fd);font-size:15px;color:var(--home-text);margin:2px 0;">${escHtml(waiting?.name||'—')}</div>
            <div style="font-size:10px;color:var(--home-muted);font-family:var(--fu);">${waiting?bwStatLine(waiting):''}</div>
          </div>
        </div>
      </div>`:`
      <div style="background:rgba(58,181,106,.05);border:1px solid rgba(58,181,106,.15);border-radius:12px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--grass3);text-transform:uppercase;font-weight:600;">Current Bowler</span>
          <div style="display:flex;gap:6px;">
            <button class="swap-btn" onclick="swapBowlers()" style="border-color:rgba(58,181,106,.3);color:var(--grass3);padding:5px 10px;border-radius:8px;font-size:11px;">⇄ Change</button>
            <button class="c-retire-btn" style="padding:5px 10px;border-radius:8px;font-size:11px;" onclick="retireBowlerState={slot:null,reason:'Injury'};openModal('retireBowler',{})">🔄 Replace</button>
          </div>
        </div>
        <div style="background:#f8fafc;border-radius:9px;padding:8px 10px;">
          <div style="font-family:var(--fd);font-size:16px;color:var(--home-text);margin-bottom:2px;">${escHtml(active?.name||'—')}</div>
          <div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);">${active?bwStatLine(active):''}</div>
        </div>
      </div>`}

      <!-- LAYER 4: This Over + Run buttons + Extras + Wicket -->
      <div class="score-zone">
        <div class="zone-lbl">This Over</div>
        <div class="over-row">${overBalls}</div>
        <div class="ball-grid">${bvs.map(b=>`<button class="ball-btn ${b.c}" ${inningsOver?'disabled':''} onclick="scoreRuns(${b.v})">${b.v}${b.s?`<span class="badge">${b.s}</span>`:''}</button>`).join('')}</div>
        <div class="extras-grid">${['Wide','No Ball','Bye','Leg Bye'].map(e=>`<button class="extra-btn" ${inningsOver?'disabled':''} onclick="scoreExtra('${e}')"><span class="en">${e.toUpperCase()}</span><span class="es">${extraInfo[e]}</span></button>`).join('')}</div>
        ${wicketSect}
      </div>

      ${inningsOver?`<button class="end-btn" onclick="endInnings()">${state.currentInnings===0?'END INNINGS → Start 2nd':'🏆 END MATCH'}</button>`:''}

      <!-- LAYER 5: Tandem bowling info (Charlie) -->
      ${charlie?`
      <div class="charlie-panel" style="margin-top:10px;">
        <div class="charlie-hdr">
          <span class="charlie-lbl">⚡ Charlie Tandem Bowling</span>
        </div>
        <div style="display:flex;gap:10px;margin-top:6px;">
          <div style="flex:1;text-align:center;">
            <div style="font-size:9px;color:var(--grass3);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟢 BOWLING</div>
            <div style="font-family:var(--fd);font-size:14px;color:var(--home-text);">${escHtml(active?.name||'—')}</div>
            <div class="b-can yes" style="font-size:10px;">✅ Can field this ball</div>
          </div>
          <div style="flex:1;text-align:center;">
            <div style="font-size:9px;color:var(--gold);font-family:var(--fu);font-weight:700;letter-spacing:1px;">🟡 WAITING</div>
            <div style="font-family:var(--fd);font-size:14px;color:var(--home-text);">${escHtml(waiting?.name||'—')}</div>
            <div class="b-can no" style="font-size:10px;">❌ Cannot field this ball</div>
          </div>
        </div>
        <div style="font-size:10px;color:var(--home-muted);margin-top:6px;text-align:center;font-family:var(--fu);">Bowlers auto-swap after each legal delivery</div>
      </div>`:''}

      <div class="rules-pills" style="margin-top:8px;">
        <span class="rpill">${bpo}b/over</span>
        <span class="rpill">Wide +${rules.wideRuns}r${rules.wideBowlAgain?' rebowl':''}</span>
        <span class="rpill">NB +${rules.noBallRuns}r${rules.noBallBowlAgain?' rebowl':''}</span>
        ${rules.retirementScore>0?`<span class="rpill">Retire@${rules.retirementScore}</span>`:''}
        ${maxOv>0?`<span class="rpill">Max ${maxOv}ov/bowler</span>`:''}
      </div>

      ${renderScorecard(inn,batTeam,bpo)}`;
  }

  return `<div class="screen dark active">
    <div class="topbar dark">
      <span style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--grass3);">${escHtml(batTeam)} vs ${escHtml(bowlTeam)}</span>
      <div class="topbar-actions">
        <button class="tbtn dark" onclick="openShareModal()">📡 Share</button>
        <button class="tbtn dark" onclick="toggleScorecard()">${showScorecard?'▶ Score':'📋 Card'}</button>
        <button class="tbtn gold" onclick="exportCSV(state.match)">📥</button>
      </div>
    </div>
    <div class="screen-inner">
      <!-- LAYER 1: Top scoreboard -->
      <div class="scoreboard">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="sb-label">${escHtml(batTeam)} BATTING</div>
            <div class="sb-score">${inn.total}<span class="wkts">/${inn.wickets}</span></div>
            <div class="sb-overs">${overStr(inn.legalBalls,bpo)} overs</div>
          </div>
          <div style="text-align:right;">
            ${target?`<div class="sb-target-txt">TARGET <strong>${target}</strong></div>`:''}
            ${runsNeeded!==null?`<div class="sb-target-txt" style="font-size:11px;">Need ${runsNeeded} off ${ballsLeft}</div>`:''}
            <div style="color:var(--home-muted);font-size:10px;margin-top:6px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;">${m.totalOvers}ov · ${bpo}b/ov</div>
            ${charlie?`<div style="color:var(--gold);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;margin-top:3px;">⚡ CHARLIE MODE</div>`:`<div style="color:var(--grass3);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;margin-top:3px;">🏏 STANDARD</div>`}
            ${rules.retirementScore>0?`<div style="color:#a78bfa;font-size:10px;font-family:'Rajdhani',sans-serif;">Retire@${rules.retirementScore}</div>`:''}
          </div>
        </div>
      </div>
      ${mainContent}
    </div>
  </div>`;
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function renderModal(modal){
  let inner='';
  if(modal.type==='newbatter')inner=renderNewBatterModal(modal.data);
  else if(modal.type==='striker')inner=renderStrikerModal();
  else if(modal.type==='retireBowler')inner=renderRetireBowlerModal();
  else if(modal.type==='replaceBowler')inner=renderReplaceBowlerModal(modal.data);
  else if(modal.type==='nextbowler')inner=renderNextBowlerModal();
  else if(modal.type==='playernote')inner=renderPlayerNoteModal(modal.data);
  else if(modal.type==='viewnotes')inner=renderViewNotesModal(modal.data);
  else if(modal.type==='share')inner=renderShareModal();
  const noClose=modal.type==='newbatter'||modal.type==='nextbowler';
  return `<div class="modal-overlay" onclick="if(event.target===this&&!${noClose})closeModal()">${inner}</div>`;
}

function renderNewBatterModal(data){
  const inn=getInn();
  const fresh=inn.batters.filter(b=>!b.out&&!b.retired&&!inn.currentBatters.includes(b.id));
  const retiredNotOut=inn.batters.filter(b=>!b.out&&b.retired&&!inn.currentBatters.includes(b.id))
    .sort((a,b)=>(a.retiredAt||0)-(b.retiredAt||0)); // earliest retired first, most recent last
  const avail=[...fresh,...retiredNotOut];
  const isRetired=data?.reason==='retired';
  let listHtml='';
  if(avail.length===0){
    listHtml=`<p style="color:var(--home-muted);font-size:13px;margin-bottom:14px;">No more batters. Innings over.</p>
    <button class="btn-primary" onclick="_pendingNextBowler=false;closeModal();endInnings()">End Innings</button>`;
  }else{
    let items='';
    if(fresh.length>0){
      items+=fresh.map(b=>`<div class="mitem" onclick="selectNewBatter('${b.id}')">
        <span class="mitem-name">${escHtml(b.name)}</span>
        <span class="mitem-meta">Yet to bat</span>
      </div>`).join('');
    }
    if(retiredNotOut.length>0){
      items+=`<div style="font-size:11px;color:var(--home-muted);font-family:var(--fu);font-weight:700;letter-spacing:1px;margin:8px 0 4px;text-transform:uppercase;">Retired Not Out (can bat again)</div>`;
      items+=retiredNotOut.map(b=>`<div class="mitem" style="border-color:#c4b5fd;" onclick="selectNewBatter('${b.id}')">
        <span class="mitem-name">${escHtml(b.name)}</span>
        <span class="mitem-meta" style="color:#7c3aed;">${b.runs}(${b.balls}) · retired${(b.retireCount||0)>1?' ×'+(b.retireCount||0):''}</span>
      </div>`).join('');
    }
    listHtml=`<div class="modal-list">${items}</div>`;
  }
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:${isRetired?'#a78bfa':'#f87171'}">${isRetired?`🏃 ${escHtml(data?.name||'')} Retired Not Out`:'🏏 Wicket — New Batter'}</div>
    <div class="modal-sub">${isRetired?`Retired on ${getRules().retirementScore} — who comes in?`:'Select next batter'}</div>
    ${listHtml}
  </div>`;
}

function renderStrikerModal(){
  const inn=getInn();
  let items='';
  inn.currentBatters.filter(Boolean).forEach(id=>{
    const b=inn.batters.find(x=>x.id===id);if(!b)return;
    const isS=inn.currentBatters[0]===id;
    items+=`<div class="mitem ${isS?'sel':''}" onclick="applyStriker('${id}')">
      <div><span class="mitem-name">${escHtml(b.name)}</span></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="mitem-meta">${b.runs}(${b.balls})</span>
        ${isS?`<span class="mitem-badge">STRIKER ⚡</span>`:''}
      </div>
    </div>`;
  });
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚡ Who faces next delivery?</div>
    <div class="modal-sub">Override which batter is on strike</div>
    <div class="modal-list">${items}</div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>`;
}

function renderRetireBowlerModal(){
  const inn=getInn();
  const charlie=isCharlie();
  const actB=inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const watB=inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;
  const bpo=getBpo();
  // In standard mode only show slot 0 (active bowler); tandem waiting slot irrelevant
  const slots=charlie
    ? [{slot:0,label:'🟢 Bowling Now',b:actB},{slot:1,label:'🟡 Bowling Next',b:watB}]
    : [{slot:0,label:'🟢 Current Bowler',b:actB}];
  let items='';
  slots.forEach(({slot,label,b})=>{
    if(!b)return;
    items+=`<div class="mitem ${retireBowlerState.slot===slot?'sel':''}" onclick="setRetireSlot(${slot})">
      <div>
        <div style="font-size:9px;color:var(--home-muted);font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-bottom:2px;">${label}</div>
        <div class="mitem-name">${escHtml(b.name)}</div>
        <div class="mitem-meta">${overStr(b.balls,bpo)} · ${b.runs}r · ${b.wickets}w</div>
      </div>
      ${retireBowlerState.slot===slot?'<span style="color:var(--gold);font-size:16px;">✓</span>':''}
    </div>`;
  });
  const rsel=RETIRE_REASONS.map(r=>`<option ${retireBowlerState.reason===r?'selected':''}>${r}</option>`).join('');
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:#fb923c;">🔄 Change Bowler</div>
    <div class="modal-sub">Select bowler and reason for change</div>
    <div class="modal-list">${items}</div>
    ${retireBowlerState.slot!==null?`<div class="form-section"><label class="form-label">Reason</label><select class="form-input" onchange="setRetireReason(this.value)">${rsel}</select></div>`:''}
    <div class="form-btns" style="margin-bottom:8px;">
      <button class="btn-confirm" ${retireBowlerState.slot===null?'disabled style="opacity:.4"':''} onclick="confirmRetireBowler()">Change Bowler</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
}

function renderReplaceBowlerModal(data){
  const inn=getInn();
  const bpo=getBpo();
  const bowlingPlayers=state.currentInnings===0?state.match.playersB:state.match.playersA;
  const activeBIds=inn.charlieBowlers.filter(Boolean);
  const avail=bowlingPlayers.filter(name=>{
    const ex=inn.bowlers.find(b=>b.name===name);
    if(!ex)return true;
    return !ex.retiredInjured&&!activeBIds.includes(ex.id);
  });
  let items=avail.length===0?`<p style="color:var(--home-muted);font-size:13px;margin-bottom:14px;">No bowlers available.</p>`:
    `<div class="modal-list">${avail.map(name=>{
      const ex=inn.bowlers.find(b=>b.name===name);
      return `<div class="mitem" onclick="applyReplaceBowler('${escHtml(name)}',${data.slot})">
        <span class="mitem-name">${escHtml(name)}</span>
        <span class="mitem-meta">${ex?`${overStr(ex.balls,bpo)} · ${ex.runs}r`:'Fresh'}</span>
      </div>`;
    }).join('')}</div>`;
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🔄 Replacement Bowler</div>
    <div class="modal-sub">Who takes the ${data.slot===0?'active':'waiting'} bowling slot?</div>
    ${items}
    <button class="modal-cancel" onclick="closeModal()">Close</button>
  </div>`;
}
