<title>PitchUp · by ThinkViz
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap');
:root{
  --navy:#050a14;--navy2:#0c1624;--navy3:#111e30;--navy4:#1a2d46;
  --gold:#e8a820;--gold2:#f5c842;--gold3:#c8881a;
  --grass:#1e6b3c;--grass2:#2a9152;--grass3:#3ab56a;
  --red:#c0392b;--sky:#3b82f6;
  --white:#f0f4f8;--muted:#8899aa;--faint:#1e2d40;--border:#1e3050;
  --home-bg:#ffffff;--home-text:#0f172a;--home-muted:#64748b;--home-border:#e2e8f0;
  --card-bg:#f8fafc;
  --fd:\'Oswald\',sans-serif;--fu:\'Rajdhani\',sans-serif;--fb:\'Source Sans 3\',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:var(--fb);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px;}

/* ── App shell ── */
#app{min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* ── Screen system ── */
.screen{display:none;flex-direction:column;flex:1;}
.screen.active{display:flex;}
.screen.dark{background:var(--navy);color:var(--white);}
.screen.light{background:var(--home-bg);color:var(--home-text);}
.screen-inner{flex:1;overflow-y:auto;padding:16px 16px 40px;}
.screen-inner.light{background:var(--home-bg);}

/* ── Top bar – dark ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top,0)) 16px 10px;border-bottom:1px solid var(--border);background:var(--navy);position:sticky;top:0;z-index:20;}
.topbar.light{background:#fff;border-bottom:1px solid var(--home-border);}
.topbar-title{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:1px;}
.topbar.dark .topbar-title{color:var(--white);}
.topbar.light .topbar-title{color:var(--home-text);}
.topbar-back{background:none;border:none;cursor:pointer;font-size:20px;padding:0 6px;display:flex;align-items:center;}
.topbar.dark .topbar-back{color:var(--muted);}
.topbar.light .topbar-back{color:var(--home-muted);}
.topbar-actions{display:flex;gap:6px;}
.tbtn{border-radius:8px;cursor:pointer;font-size:11px;font-family:var(--fu);font-weight:600;padding:5px 10px;letter-spacing:.5px;}
.tbtn.dark{background:var(--faint);border:1px solid var(--border);color:var(--muted);}
.tbtn.gold{color:var(--gold);border:1px solid rgba(232,168,32,.25);background:rgba(232,168,32,.08);}
.tbtn.light-btn{background:#f1f5f9;border:1px solid var(--home-border);color:#475569;}

/* ════════════════════════════════════
   HOME SCREEN – white, clean, modern
   ════════════════════════════════════ */
.home-topbar{background:#fff;border-bottom:1px solid var(--home-border);padding:calc(16px + env(safe-area-inset-top,0)) 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.home-logo-row{display:flex;align-items:center;gap:10px;}
.home-logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--grass),var(--grass2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(42,145,82,.3);}
.home-logo-name{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:1.5px;color:var(--home-text);}
.home-logo-name em{color:var(--grass2);font-style:normal;}
.home-logo-tag{font-family:var(--fu);font-size:9px;letter-spacing:2px;color:var(--home-muted);text-transform:uppercase;margin-top:1px;}

/* hero banner */
.home-hero{background:linear-gradient(135deg,var(--grass) 0%,#0d4a28 100%);padding:28px 20px 32px;position:relative;overflow:hidden;}
.home-hero::after{content:'🏏';position:absolute;right:-10px;bottom:-16px;font-size:110px;opacity:.08;transform:rotate(-20deg);}
.home-hero-eyebrow{font-family:var(--fu);font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:8px;}
.home-hero-title{font-family:var(--fd);font-size:30px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.15;margin-bottom:4px;}
.home-hero-sub{font-size:13px;color:rgba(255,255,255,.7);line-height:1.5;}

/* action cards */
.home-actions{padding:20px 16px 0;}
.action-card{border-radius:16px;padding:18px;margin-bottom:12px;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;gap:14px;text-decoration:none;}
.action-card:active{transform:scale(.98);}
.action-card.primary{background:linear-gradient(135deg,var(--grass),var(--grass2));box-shadow:0 4px 18px rgba(42,145,82,.35);}
.action-card.secondary{background:#fff;border:1.5px solid var(--home-border);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.action-card.warning{background:#fffbeb;border:1.5px solid #fde68a;}
.ac-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ac-icon.green{background:rgba(255,255,255,.2);}
.ac-icon.white-green{background:rgba(42,145,82,.1);}
.ac-icon.white-amber{background:#fef3c7;}
.ac-title{font-family:var(--fd);font-size:17px;font-weight:600;letter-spacing:.5px;}
.ac-sub{font-size:12px;margin-top:2px;}
.action-card.primary .ac-title,.action-card.primary .ac-sub{color:#fff;}
.action-card.primary .ac-sub{opacity:.8;}
.action-card.secondary .ac-title{color:var(--home-text);}
.action-card.secondary .ac-sub{color:var(--home-muted);}
.action-card.warning .ac-title{color:#92400e;}
.action-card.warning .ac-sub{color:#b45309;}
.ac-arrow{margin-left:auto;font-size:18px;flex-shrink:0;opacity:.5;}
.action-card.primary .ac-arrow{color:#fff;}

/* section headers */
.home-sec{padding:20px 16px 0;}
.home-sec-title{font-family:var(--fu);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--home-muted);margin-bottom:12px;}

/* team cards */
.team-card{background:#fff;border:1.5px solid var(--home-border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.team-card:active{border-color:var(--grass2);}
.team-avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--grass),var(--grass2));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(42,145,82,.3);}
.team-info{flex:1;}
.team-name{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--home-text);letter-spacing:.5px;}
.team-meta{font-size:11px;color:var(--home-muted);margin-top:2px;font-family:var(--fu);}
.team-actions{display:flex;gap:6px;}
.team-action-btn{background:#f1f5f9;border:1px solid var(--home-border);border-radius:8px;color:#475569;padding:6px 10px;cursor:pointer;font-size:11px;font-family:var(--fu);font-weight:600;}
.team-action-btn.danger{background:#fef2f2;border-color:#fecaca;color:#dc2626;}

/* match history */
.match-card{background:#fff;border:1.5px solid var(--home-border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.match-vs{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--home-text);}
.match-meta{font-size:11px;color:var(--home-muted);font-family:var(--fu);margin-top:2px;}
.match-csv{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;color:#16a34a;padding:6px 10px;cursor:pointer;font-size:11px;font-family:var(--fu);font-weight:600;white-space:nowrap;}

/* empty state */
.empty-state{text-align:center;padding:32px 20px;color:var(--home-muted);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-text{font-size:13px;line-height:1.5;}

/* footer */
.home-footer{padding:24px 16px 32px;text-align:center;}
.home-footer-text{font-size:10px;color:#cbd5e1;font-family:var(--fu);letter-spacing:1.5px;}

/* ════════════════════════════════════
   TEAM MANAGEMENT SCREEN
   ════════════════════════════════════ */
.team-form-card{background:#fff;border:1.5px solid var(--home-border);border-radius:16px;padding:18px;margin-bottom:14px;}
.team-form-title{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--home-text);letter-spacing:.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--home-border);}
.light-input{background:#f8fafc;border:1.5px solid var(--home-border);border-radius:10px;color:var(--home-text);padding:11px 13px;font-size:14px;font-family:var(--fb);width:100%;}
.light-input:focus{outline:none;border-color:var(--grass2);background:#fff;}
.light-label{font-family:var(--fu);font-size:10px;letter-spacing:2px;color:var(--home-muted);text-transform:uppercase;display:block;margin-bottom:6px;font-weight:600;}
.player-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.player-num{color:var(--home-muted);font-size:11px;width:20px;text-align:right;flex-shrink:0;font-family:var(--fu);}
.player-input{flex:1;background:#f8fafc;border:1.5px solid var(--home-border);border-radius:9px;color:var(--home-text);padding:9px 11px;font-size:13px;font-family:var(--fb);}
.player-input:focus{outline:none;border-color:var(--grass2);}
.player-del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;}
.player-del:hover{color:#f87171;}
.squad-pill{display:inline-flex;align-items:center;gap:8px;background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:5px 12px;margin-bottom:12px;}
.squad-pill-label{color:var(--grass2);font-size:11px;font-weight:700;font-family:var(--fu);}
.light-btn-primary{width:100%;background:linear-gradient(135deg,var(--grass),var(--grass2));border:none;border-radius:13px;color:#fff;padding:14px;font-family:var(--fd);font-size:15px;font-weight:600;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 14px rgba(42,145,82,.3);}
.light-btn-primary:active{opacity:.88;}
.light-btn-secondary{background:#f1f5f9;border:1.5px solid var(--home-border);border-radius:13px;color:#475569;padding:12px;font-family:var(--fu);font-size:14px;font-weight:600;cursor:pointer;}
.light-nav-row{display:flex;gap:10px;}
.light-nav-row .light-btn-secondary{flex:1;}
.light-nav-row .light-btn-primary{flex:2;}
.add-player-btn{width:100%;background:#f8fafc;border:1.5px dashed var(--home-border);border-radius:10px;color:var(--home-muted);padding:10px;cursor:pointer;font-family:var(--fu);font-size:12px;font-weight:600;margin-top:4px;letter-spacing:.5px;}
.add-player-btn:hover{border-color:var(--grass2);color:var(--grass2);}

/* ════════════════════════════════════
   DARK SCREENS (scoring, setup, etc.)
   ════════════════════════════════════ */
.form-section{margin-bottom:16px;}
.form-label{font-family:var(--fu);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:7px;font-weight:600;}
.form-input{background:var(--navy3);border:1px solid var(--border);border-radius:11px;color:var(--white);padding:11px 13px;font-size:14px;font-family:var(--fb);width:100%);}
.form-input:focus{outline:none;border-color:rgba(232,168,32,.4);}
.seg-row{display:flex;gap:8px;}
.seg-btn{flex:1;background:var(--navy3);border:1px solid var(--border);border-radius:11px;color:var(--muted);padding:11px;cursor:pointer;font-family:var(--fu);font-size:13px;font-weight:600;transition:all .15s;letter-spacing:.5px;}
.seg-btn.ag{background:rgba(30,107,60,.25);border-color:var(--grass2);color:var(--grass3);}
.seg-btn.agold{background:rgba(232,168,32,.12);border-color:var(--gold3);color:var(--gold);}
.seg-btn.ablue{background:rgba(59,130,246,.12);border-color:var(--sky);color:#93c5fd;}

/* scoreboard */
.scoreboard{background:linear-gradient(145deg,#081b2e,#0d2540,#091e34);border-radius:18px;padding:18px 20px;margin-bottom:12px;border:1px solid rgba(232,168,32,.12);position:relative;overflow:hidden;}
.scoreboard::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(232,168,32,.06),transparent 70%);}
.sb-label{font-family:var(--fu);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:600;}
.sb-score{font-family:var(--fd);font-size:56px;font-weight:700;line-height:1;color:var(--white);}
.sb-score .wkts{font-size:26px;color:var(--grass3);margin-left:2px;}
.sb-overs{font-family:var(--fd);font-size:16px;color:var(--grass3);margin-top:2px;}
.sb-target-txt{font-family:var(--fd);font-size:13px;color:var(--gold);margin-bottom:2px;}
.sb-target-txt strong{font-size:21px;}
.sb-batters{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px;}
.sb-batter{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:6px 11px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.sb-batter.striker{background:rgba(232,168,32,.1);border-color:rgba(232,168,32,.25);}
.sb-role{font-family:var(--fu);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;}
.sb-name{font-family:var(--fu);font-size:15px;font-weight:700;color:var(--white);}
.sb-sc{font-size:12px;color:var(--muted);}
.sb-warn{color:#f97316;font-weight:700;}
.sb-edit{color:rgba(255,255,255,.2);font-size:9px;}

/* charlie panel */
.charlie-panel{background:linear-gradient(135deg,#0e0e20,#1a1030);border-radius:14px;padding:12px 14px;margin-bottom:11px;border:1px solid rgba(232,168,32,.15);}
.charlie-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.charlie-lbl{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:600;}
.c-retire-btn{background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.2);border-radius:8px;color:#fc8181;padding:4px 10px;cursor:pointer;font-size:10px;font-family:var(--fu);font-weight:700;letter-spacing:.5px;}
.c-bowlers{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.bcard{border-radius:11px;padding:9px 11px;}
.bcard.active{background:rgba(232,168,32,.08);border:1px solid rgba(232,168,32,.3);}
.bcard.waiting{background:rgba(255,100,100,.05);border:1px solid rgba(255,100,100,.15);}
.b-role{font-family:var(--fu);font-size:8px;letter-spacing:1.2px;font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.b-role.a{color:var(--gold2);}
.b-role.w{color:#fc8181;}
.b-name{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--white);}
.b-stats{font-size:11px;color:var(--muted);margin-top:1px;}
.b-can{font-size:9px;margin-top:3px;}
.b-can.yes{color:var(--grass3);}
.b-can.no{color:#fc8181;}
.swap-btn{background:rgba(232,168,32,.12);border:1px solid rgba(232,168,32,.3);border-radius:9px;color:var(--gold);width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* balls */
.ball-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:10px;}
.ball-btn{border:none;border-radius:12px;color:#fff;height:56px;cursor:pointer;font-family:var(--fd);font-size:22px;font-weight:700;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .08s;-webkit-user-select:none;}
.ball-btn:active{transform:scale(.92);}
.ball-btn:disabled{opacity:.3;}
.ball-btn .badge{position:absolute;bottom:5px;font-size:7px;font-family:var(--fu);letter-spacing:1px;font-weight:700;color:var(--gold2);}
.b0{background:linear-gradient(160deg,#1a1a2e,#252540);}
.b1{background:linear-gradient(160deg,#0f3520,#1a5c35);}
.b2{background:linear-gradient(160deg,#0a2d42,#0f4060);}
.b3{background:linear-gradient(160deg,#1e1030,#2d1848);}
.b4{background:linear-gradient(160deg,#3d2000,#6b3800);}
.b6{background:linear-gradient(160deg,#5c0000,#9b1a1a);}

/* extras */
.extras-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.extra-btn{background:rgba(255,120,60,.08);border:1px solid rgba(255,120,60,.2);border-radius:11px;color:#fb923c;padding:9px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--fu);}
.extra-btn:active{background:rgba(255,120,60,.18);}
.extra-btn:disabled{opacity:.35;}
.en{font-size:11px;font-weight:700;letter-spacing:.5px;}
.es{font-size:9px;color:var(--muted);font-weight:400;}

/* wicket */
.wicket-btn{width:100%;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.28);border-radius:12px;color:#f87171;padding:12px;font-size:14px;font-family:var(--fd);font-weight:600;cursor:pointer;margin-bottom:10px;letter-spacing:1px;}
.wicket-btn:active{background:rgba(192,57,43,.22);}
.wicket-btn:disabled{opacity:.35;}
.wicket-form{background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);border-radius:14px;padding:14px;margin-bottom:10px;}
.wf-title{color:#f87171;font-family:var(--fu);font-weight:700;font-size:13px;margin-bottom:10px;}
.wf-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.wf-row select,.wf-row input{background:#060f1c;border:1px solid var(--border);border-radius:9px;color:var(--white);padding:9px;font-size:12px;font-family:var(--fb);flex:1;}
.wf-row input{width:66px;flex:none;}
.form-btns{display:flex;gap:8px;}
.btn-confirm{flex:1;background:var(--red);border:none;border-radius:9px;color:#fff;padding:10px;font-family:var(--fu);font-size:13px;font-weight:700;cursor:pointer;}
.btn-cancel{background:var(--faint);border:1px solid var(--border);border-radius:9px;color:var(--muted);padding:10px 14px;cursor:pointer;font-size:12px;}

/* over balls */
.over-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;min-height:34px;}
.ob{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.08);}
.ob-run{background:#162d1a;}
.ob-four{background:#3d2000;}
.ob-six{background:#5c0000;}
.ob-wkt{background:#6b1010;}
.ob-ext{background:#1a2535;}

/* rules pills */
.rules-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.rpill{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:3px 9px;color:var(--muted);font-size:10px;font-family:var(--fu);}
.rpill.gold{background:rgba(232,168,32,.07);border-color:rgba(232,168,32,.16);color:rgba(232,168,32,.7);cursor:pointer;}

/* score zone */

/* innings setup */

/* result */

.offline-bar.show{display:block;}

/* squad size */

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

</style>

<body>
<div id="offline-bar" class="offline-bar">📶 Offline mode — all scoring & data saves locally on your device</div>
<div id="app"></div>
<script>
'use strict';
// ─── Constants ────────────────────────────────────────────────────────────────
const DEFAULT_RULES={ballsPerOver:6,wideRuns:1,wideBowlAgain:true,noBallRuns:1,noBallBowlAgain:true,retirementScore:0};
const STORAGE_KEY='pitchup_v1';
const WICKET_TYPES=['Bowled','Caught','LBW','Run Out','Stumped','Hit Wicket','Retired'];
const RETIRE_REASONS=['Injury','Illness','Coach decision','Other'];

// ─── Helpers ──────────────────────────────────────────────────────────────────
const initBatter=(n,id)=>({id,name:n,runs:0,balls:0,fours:0,sixes:0,out:false,retired:false,dismissal:''});
const initBowler=(n,id)=>({id,name:n,balls:0,runs:0,wickets:0,wides:0,noBalls:0,retiredInjured:false,retireReason:''});
const overStr=(b,bpo=6)=>`${Math.floor(b/bpo)}.${b%bpo}`;
const escHtml=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Math.random().toString(36).slice(2,9);

// ─── State ────────────────────────────────────────────────────────────────────
let state={
  screen:'home',        // home|teams|edit_team|setup|innings_setup|scoring|result
  match:null,
  currentInnings:0,
  savedMatches:[],
  teams:[],             // [{id,name,players:[{id,name}]}]
  modal:null,
  editTeamId:null,
};

function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    state.savedMatches=d.matches||[];
    state.teams=d.teams||[];
  }catch(e){}
}
function persist(){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify({matches:state.savedMatches,teams:state.teams})); }catch(e){}
}

// ─── State helpers ────────────────────────────────────────────────────────────
function getInn(){return state.match?.innings?.[state.currentInnings];}
function getRules(){return state.match?.rules||DEFAULT_RULES;}
function getBpo(){return getRules().ballsPerOver||6;}
function isCharlie(){return (state.match?.bowlingMode||'charlie')==='charlie';}
function updateInn(fn){
  const m=state.match;
  const innings=[...m.innings];
  innings[state.currentInnings]=fn(JSON.parse(JSON.stringify(innings[state.currentInnings])));
  state.match={...m,innings};
}

// ─── CSV Export ───────────────────────────────────────────────────────────────
function exportCSV(match){
  const {teamA,teamB,innings}=match;
  const r=match.rules||DEFAULT_RULES;
  const bpo=r.ballsPerOver||6;
  let csv=`PitchUp · Cricket Management Platform\nProduct of ThinkViz Limited · pitchup.app\n${teamA} vs ${teamB}\n${match.totalOvers} overs · ${bpo}b/over · ${match.bowlingMode==='standard'?'Standard':'Charlie Cricket (tandem)'}\n\n`;
  [0,1].forEach(idx=>{
    const inn=innings[idx];if(!inn)return;
    const team=idx===0?teamA:teamB;
    csv+=`\n=== ${team} Innings ===\nBATTING\nBatter,R,B,4s,6s,SR,Status\n`;
    inn.batters.forEach(b=>{
      const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):'-';
      csv+=`${b.name},${b.runs},${b.balls},${b.fours},${b.sixes},${sr},${b.retired?'retired not out':b.out?b.dismissal:'not out'}\n`;
    });
    csv+=`Extras,${inn.extras.total}\nTOTAL,${inn.total}/${inn.wickets} (${overStr(inn.legalBalls,bpo)})\n`;
    csv+=`BOWLING\nBowler,O,R,W,Wd,NB,Econ\n`;
    inn.bowlers.forEach(b=>{
      const econ=b.balls>0?(b.runs/(b.balls/bpo)).toFixed(2):'-';
      csv+=`${b.name},${overStr(b.balls,bpo)},${b.runs},${b.wickets},${b.wides},${b.noBalls},${econ}\n`;
    });
    csv+=`BALL-BY-BALL\nOver,Ball,Bowler,Batter,Event,Runs\n`;
    inn.deliveries.forEach(d=>{ csv+=`${d.over+1},${d.ball},${d.bowler||''},${d.batter||''},${d.event},${d.runs}\n`; });
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${teamA}_vs_${teamB}.csv`;a.click();
}
window.exportCSV=exportCSV;

// ─── Scoring actions ──────────────────────────────────────────────────────────
function scoreRuns(runs){
  const rules=getRules(),bpo=getBpo(),charlie=isCharlie();
  let retiredName=null;
  updateInn(inn=>{
    const ab=inn.batters.find(b=>b.id===inn.currentBatters[0]);
    const bw=inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]);
    if(ab){ab.runs+=runs;ab.balls+=1;if(runs===4)ab.fours+=1;if(runs===6)ab.sixes+=1;}
    if(bw){bw.runs+=runs;bw.balls+=1;}
    inn.total+=runs;inn.legalBalls+=1;
    inn.deliveries.push({over:inn.overs,ball:inn.legalBalls%bpo,bowler:bw?.name,batter:ab?.name,event:`${runs}`,runs});
    if(runs%2===1)inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];
    if(inn.legalBalls%bpo===0){inn.overs+=1;inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];}
    // Charlie mode: swap bowlers every delivery. Standard: no auto-swap (scorer manually picks each over)
    if(charlie) inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];
    if(rules.retirementScore>0&&ab&&ab.runs>=rules.retirementScore){
      ab.retired=true;inn.currentBatters=inn.currentBatters.map(id=>id===ab.id?null:id);retiredName=ab.name;
    }
    return inn;
  });
  if(retiredName)openModal('newbatter',{reason:'retired',name:retiredName});
  else render();
}
window.scoreRuns=scoreRuns;

function scoreExtra(type){
  const rules=getRules(),bpo=getBpo(),charlie=isCharlie();
  updateInn(inn=>{
    const bw=inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]);
    const isWide=type==='Wide',isNB=type==='No Ball',isBye=type==='Bye',isLB=type==='Leg Bye';
    const extraRuns=isWide?rules.wideRuns:isNB?rules.noBallRuns:1;
    const isLegal=(isWide&&!rules.wideBowlAgain)||(isNB&&!rules.noBallBowlAgain)||isBye||isLB;
    inn.total+=extraRuns;inn.extras.total+=extraRuns;
    if(isWide){inn.extras.wides+=1;if(bw){bw.runs+=extraRuns;bw.wides+=1;}}
    if(isNB){inn.extras.noBalls+=1;if(bw){bw.runs+=extraRuns;bw.noBalls+=1;}}
    if(isBye)inn.extras.byes+=1;if(isLB)inn.extras.legByes+=1;
    if(isLegal){
      inn.legalBalls+=1;if(bw)bw.balls+=1;
      if(inn.legalBalls%bpo===0){inn.overs+=1;inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];}
      // Charlie: swap on every legal delivery. Standard: no auto-swap.
      if(charlie) inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];
    }
    inn.deliveries.push({over:inn.overs,ball:inn.legalBalls%bpo,bowler:bw?.name,batter:'Extra',event:type,runs:extraRuns,isExtra:true,extraType:type});
    return inn;
  });
  render();
}
window.scoreExtra=scoreExtra;

function scoreWicket(outId,type,runs){
  const bpo=getBpo(),charlie=isCharlie();
  updateInn(inn=>{
    const bw=inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]);
    const bt=inn.batters.find(b=>b.id===outId);
    if(bt){bt.out=true;bt.balls+=1;bt.runs+=runs;bt.dismissal=type==='Run Out'?'run out':`${type.toLowerCase()} b ${bw?.name}`;}
    if(bw&&type!=='Run Out'){bw.wickets+=1;bw.balls+=1;}
    inn.total+=runs;inn.wickets+=1;inn.legalBalls+=1;
    inn.currentBatters=inn.currentBatters.map(id=>id===outId?null:id);
    inn.deliveries.push({over:inn.overs,ball:inn.legalBalls%bpo,bowler:bw?.name,batter:bt?.name,event:`W (${type})`,runs,isWicket:true});
    if(inn.legalBalls%bpo===0){inn.overs+=1;inn.currentBatters=[inn.currentBatters[1],inn.currentBatters[0]];}
    if(charlie) inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];
    return inn;
  });
  openModal('newbatter',{reason:'wicket'});
}

function swapBowlers(){updateInn(inn=>{inn.charlieBowlers=[inn.charlieBowlers[1],inn.charlieBowlers[0]];return inn;});render();}
window.swapBowlers=swapBowlers;

function isInningsOver(){
  const inn=getInn();if(!inn)return false;
  const bp=state.currentInnings===0?state.match.playersA:state.match.playersB;
  return inn.wickets>=bp.length-1||inn.legalBalls>=state.match.totalOvers*getBpo();
}

function endInnings(){
  updateInn(inn=>{inn.complete=true;return inn;});
  if(state.currentInnings===0){state.currentInnings=1;state.screen='innings_setup';}
  else{
    state.screen='result';
    const m={...state.match,complete:true,date:new Date().toISOString()};
    state.match=m;
    state.savedMatches=[m,...state.savedMatches.slice(0,19)];
    persist();
  }
  render();
}
window.endInnings=endInnings;

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(type,data){state.modal={type,data};render();}
function closeModal(){state.modal=null;render();}
window.closeModal=closeModal;

// ─── Setup wizard state ───────────────────────────────────────────────────────
let setupData={};
function initSetup(teamAId,teamBId){
  const tA=state.teams.find(t=>t.id===teamAId);
  const tB=state.teams.find(t=>t.id===teamBId);
  setupData={
    step:0,teamA:tA?tA.name:'',teamB:tB?tB.name:'',
    format:'T20',overs:20,tossWinner:'A',tossChoice:'Bat',
    bowlingMode:'charlie',  // 'charlie' | 'standard'
    rules:{...DEFAULT_RULES},sizeA:11,sizeB:11,
    playersA:tA?tA.players.map(p=>p.name):Array(11).fill('').map((_,i)=>`Player ${i+1}`),
    playersB:tB?tB.players.map(p=>p.name):Array(11).fill('').map((_,i)=>`Player ${i+1}`),
    teamAId:teamAId||null,teamBId:teamBId||null,
  };
}
window.initSetup=initSetup;

// ─── Team Management ──────────────────────────────────────────────────────────
let editTeamData={name:'',players:[{id:uid(),name:''},{id:uid(),name:''},{id:uid(),name:''}]};

function saveTeam(){
  const name=editTeamData.name.trim();
  if(!name){alert('Enter a team name');return;}
  const players=editTeamData.players.filter(p=>p.name.trim()).map(p=>({id:p.id,name:p.name.trim()}));
  if(players.length<1){alert('Add at least one player');return;}
  if(state.editTeamId){
    const idx=state.teams.findIndex(t=>t.id===state.editTeamId);
    if(idx>=0)state.teams[idx]={id:state.editTeamId,name,players};
  }else{
    state.teams.push({id:uid(),name,players});
  }
  persist();
  state.screen='teams';state.editTeamId=null;
  render();
}
window.saveTeam=saveTeam;

function deleteTeam(id){
  if(!confirm('Delete this team?'))return;
  state.teams=state.teams.filter(t=>t.id!==id);
  persist();render();
}
window.deleteTeam=deleteTeam;

function editTeam(id){
  const t=state.teams.find(x=>x.id===id);
  if(!t)return;
  state.editTeamId=id;
  editTeamData={name:t.name,players:t.players.map(p=>({...p}))};
  state.screen='edit_team';render();
}
window.editTeam=editTeam;

function newTeam(){
  state.editTeamId=null;
  editTeamData={name:'',players:Array(11).fill(null).map(()=>({id:uid(),name:''}))};
  state.screen='edit_team';render();
}
window.newTeam=newTeam;

function updateTeamName(v){editTeamData.name=v;}
window.updateTeamName=updateTeamName;
function updateTeamPlayer(idx,v){editTeamData.players[idx].name=v;}
window.updateTeamPlayer=updateTeamPlayer;
function addTeamPlayer(){editTeamData.players.push({id:uid(),name:''});render();}
window.addTeamPlayer=addTeamPlayer;
function removeTeamPlayer(idx){if(editTeamData.players.length<=1)return;editTeamData.players.splice(idx,1);render();}
window.removeTeamPlayer=removeTeamPlayer;
function setSquadSizeEdit(delta){
  const cur=editTeamData.players.length;
  const next=Math.min(15,Math.max(11,cur+delta));
  if(next>cur){for(let i=cur;i<next;i++)editTeamData.players.push({id:uid(),name:''});}
  else{editTeamData.players=editTeamData.players.slice(0,next);}
  render();
}
window.setSquadSizeEdit=setSquadSizeEdit;

// ─── Setup functions ──────────────────────────────────────────────────────────
function toggleRule(f){setupData.rules[f]=!setupData.rules[f];render();}
window.toggleRule=toggleRule;
function stepRule(f,d,mn,mx){setupData.rules[f]=Math.min(mx,Math.max(mn,setupData.rules[f]+d));render();}
window.stepRule=stepRule;
function retirementInc(){setupData.rules.retirementScore=setupData.rules.retirementScore===0?20:setupData.rules.retirementScore+5;render();}
window.retirementInc=retirementInc;
function setSquadSize(t,d){if(t==='A')setupData.sizeA=Math.min(15,Math.max(11,setupData.sizeA+d));else setupData.sizeB=Math.min(15,Math.max(11,setupData.sizeB+d));render();}
window.setSquadSize=setSquadSize;
function updateSetupPlayer(t,i,v){if(t==='A')setupData.playersA[i]=v;else setupData.playersB[i]=v;}
window.updateSetupPlayer=updateSetupPlayer;

function handleSquadNext(){
  if(setupData.step===1){setupData.step=2;render();return;}
  const d=setupData;
  const batting1st=d.tossChoice==='Bat'?(d.tossWinner==='A'?d.teamA:d.teamB):(d.tossWinner==='A'?d.teamB:d.teamA);
  state.match={
    teamA:d.teamA,teamB:d.teamB,format:d.format,
    totalOvers:d.format==='T20'?20:Number(d.overs),
    tossWinner:d.tossWinner,tossChoice:d.tossChoice,batting1st,rules:{...d.rules},
    bowlingMode:d.bowlingMode||'charlie',
    playersA:d.playersA.slice(0,d.sizeA).filter(p=>p&&p.trim()),
    playersB:d.playersB.slice(0,d.sizeB).filter(p=>p&&p.trim()),
    innings:[]
  };
  state.currentInnings=0;state.screen='innings_setup';render();
}
window.handleSquadNext=handleSquadNext;

// ─── Innings setup state ──────────────────────────────────────────────────────
let innSetup={op1:0,op2:1,bw1:0,bw2:1};

function startInnings(){
  const m=state.match,idx=state.currentInnings;
  const batP=idx===0?m.playersA:m.playersB;
  const bowlP=idx===0?m.playersB:m.playersA;
  const batters=batP.map((n,i)=>initBatter(n,`bat_${i}`));
  const bowlers=bowlP.map((n,i)=>initBowler(n,`bowl_${i}`));
  const b1=bowlers.find(b=>b.name===bowlP[innSetup.bw1]);
  const b2=bowlers.find(b=>b.name===bowlP[innSetup.bw2]);
  const op1=batters.find(b=>b.name===batP[innSetup.op1]);
  const op2=batters.find(b=>b.name===batP[innSetup.op2]);
  const inn={total:0,wickets:0,legalBalls:0,overs:0,batters,bowlers,
    currentBatters:[op1?.id,op2?.id],charlieBowlers:[b1?.id,b2?.id],
    extras:{total:0,wides:0,noBalls:0,byes:0,legByes:0},deliveries:[],complete:false};
  const innings=[...(m.innings||[])];innings[idx]=inn;
  state.match={...m,innings};state.screen='scoring';
  innSetup={op1:0,op2:1,bw1:0,bw2:1};render();
}
window.startInnings=startInnings;

let wfs={outId:'',type:'Bowled',runs:0};
function openWicketForm(){
  const inn=getInn();const abIds=inn.currentBatters.filter(Boolean);
  wfs={outId:abIds[0]||'',type:'Bowled',runs:0};wicketFormVisible=true;render();
}
window.openWicketForm=openWicketForm;
function confirmWicket(){if(!wfs.outId)return;wicketFormVisible=false;scoreWicket(wfs.outId,wfs.type,wfs.runs);}
window.confirmWicket=confirmWicket;
function updateWFS(k,v){wfs[k]=k==='runs'?Number(v):v;}
window.updateWFS=updateWFS;

// ─── Striker override ─────────────────────────────────────────────────────────
function applyStriker(id){
  updateInn(inn=>{const other=inn.currentBatters.find(x=>x!==id);inn.currentBatters=[id,other];return inn;});
  closeModal();
}
window.applyStriker=applyStriker;

// ─── Bowler retirement ────────────────────────────────────────────────────────
let retireBowlerState={slot:null,reason:'Injury'};
function setRetireSlot(s){retireBowlerState.slot=s;render();}
window.setRetireSlot=setRetireSlot;
function setRetireReason(r){retireBowlerState.reason=r;render();}
window.setRetireReason=setRetireReason;
function confirmRetireBowler(){
  const {slot,reason}=retireBowlerState;if(slot===null)return;
  updateInn(inn=>{
    const bId=inn.charlieBowlers[slot];
    const b=inn.bowlers.find(x=>x.id===bId);
    if(b){b.retiredInjured=true;b.retireReason=reason;}
    inn.charlieBowlers[slot]=null;return inn;
  });
  state.modal={type:'replaceBowler',data:{slot}};
  retireBowlerState={slot:null,reason:'Injury'};render();
}
window.confirmRetireBowler=confirmRetireBowler;

function applyReplaceBowler(name,slot){
  updateInn(inn=>{
    let nb=inn.bowlers.find(b=>b.name===name);
    if(!nb){const id=`bx_${Date.now()}`;inn.bowlers.push(initBowler(name,id));nb=inn.bowlers[inn.bowlers.length-1];}
    inn.charlieBowlers[slot]=nb.id;return inn;
  });
  closeModal();
}
window.applyReplaceBowler=applyReplaceBowler;

function selectNewBatter(id){
  updateInn(inn=>{
    const nb=inn.batters.find(b=>b.id===id);
    const slot=inn.currentBatters.findIndex(x=>x===null);
    if(nb&&slot!==-1)inn.currentBatters[slot]=nb.id;return inn;
  });
  closeModal();
}
window.selectNewBatter=selectNewBatter;

function render(){
  const s=state.screen;
  let html='';
  if(s==='home')html=renderHome();
  else if(s==='teams')html=renderTeams();
  else if(s==='edit_team')html=renderEditTeam();
  else if(s==='setup')html=renderSetup();
  else if(s==='innings_setup')html=renderInningsSetup();
  else if(s==='scoring')html=renderScoring();
  else if(s==='result')html=renderResult();
  if(state.modal)html+=renderModal(state.modal);
  document.getElementById('app').innerHTML=html;
}

      <div class="tinfo"><div class="tlabel">${label}</div><div class="tdesc">${desc}</div></div>

  }
  function step(field,label,desc,mn,mx){
    return `<div class="stepper-row">
      <div class="stepper-info"><div class="stepper-label">${label}</div>${desc?`<div class="stepper-desc">${desc}</div>`:''}</div>
      <div class="stepper-ctrl">
        <button class="stepper-btn" onclick="stepRule('${field}',-1,${mn},${mx})">−</button>
        <span class="stepper-val">${r[field]}</span>
        <button class="stepper-btn" onclick="stepRule('${field}',1,${mn},${mx})">+</button>
      </div></div>`;
  }
  return `
    <div class="rules-sec" style="background:rgba(232,168,32,.03);border:1px solid rgba(232,168,32,.14);">
      <div class="rules-sec-title" style="color:var(--gold);">⚙️ Over Length</div>

      <div class="rules-sec-title" style="color:#fb923c;">〰️ Wide Rules</div>
      ${step('wideRuns','Runs per Wide','Extras on each wide',0,5)}
      ${tog('wideBowlAgain','Must re-bowl','ON=illegal · OFF=legal ball','#7b3f00')}
    </div>
    <div class="rules-sec" style="background:rgba(220,50,50,.03);border:1px solid rgba(220,50,50,.14);">
      <div class="rules-sec-title" style="color:#f87171;">⛔ No Ball Rules</div>
      ${step('noBallRuns','Runs per No Ball','Extras on each no ball',0,5)}
      ${tog('noBallBowlAgain','Must re-bowl','ON=illegal · OFF=legal ball','#7b0000')}
    </div>
    <div class="rules-sec" style="background:rgba(129,140,248,.03);border:1px solid rgba(129,140,248,.14);">
      <div class="rules-sec-title" style="color:#a78bfa;">🏃 Batter Retirement</div>

      <div style="display:flex;align-items:center;gap:10px;">
        <button class="stepper-btn" onclick="stepRule('retirementScore',-5,0,100)">−</button>
        <span class="retire-val" style="color:${r.retirementScore>0?'#a78bfa':'var(--muted)'};">${r.retirementScore>0?r.retirementScore:'OFF'}</span>
        <button class="stepper-btn" onclick="retirementInc()">+</button>
        ${r.retirementScore>0?`<button style="background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);padding:4px 9px;cursor:pointer;font-size:11px;" onclick="stepRule('retirementScore',-100,0,100)">Off</button>`:''}
      </div>
    </div>`;
}

          Next: ${escHtml(d.teamA||'Team A')} Squad →
        </button>
      </div>
    </div>`;
  }

  // Squad entry steps
  const isA=d.step===1;
  const players=isA?d.playersA:d.playersB;
  const size=isA?d.sizeA:d.sizeB;
  const teamName=escHtml(isA?d.teamA:d.teamB);

  for(let i=0;i<size;i++){
    sq+=`<div class="squad-row" style="display:flex;align-items:center;gap:9px;margin-bottom:7px;">

        value="${escHtml(players[i]||'')}" placeholder="Player ${i+1}" oninput="updateSetupPlayer('${isA?'A':'B'}',${i},this.value)" onchange="updateSetupPlayer('${isA?'A':'B'}',${i},this.value)"/>
    </div>`;
  }
  return `<div class="screen dark active">
    <div class="topbar dark">
      <button class="topbar-back" onclick="setupData.step=${d.step===2?1:0};render()">←</button>
      <span class="topbar-title">${teamName} — Squad</span>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(232,168,32,.07);border:1px solid rgba(232,168,32,.18);border-radius:9px;padding:4px 10px;">
        <button class="stepper-btn" style="width:24px;height:24px;font-size:14px;" onclick="setSquadSize('${isA?'A':'B'}',-1)">−</button>
        <span style="color:var(--gold);font-weight:800;font-size:14px;min-width:16px;text-align:center;font-family:'Oswald',sans-serif;">${size}</span>
        <button class="stepper-btn" style="width:24px;height:24px;font-size:14px;" onclick="setSquadSize('${isA?'A':'B'}',1)">+</button>
      </div>
    </div>
    <div class="screen-inner">
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;">${size} players · 11 field · up to ${size} can bat</div>
      ${sq}
      <div class="nav-row" style="margin-top:14px;">
        <button class="btn-secondary" onclick="setupData.step=${d.step===2?1:0};render()">← Back</button>
        <button class="btn-primary" onclick="handleSquadNext()">
          ${d.step===1?`Next: ${escHtml(d.teamB||'Team B')} Squad →`:'🏏 Start Match'}
        </button>
      </div>
    </div>
  </div>`;
}

function applyTeamFromRegistry(side,id){
  if(!id){setupData[side==='A'?'teamAId':'teamBId']=null;return;}
  const t=state.teams.find(x=>x.id===id);if(!t)return;
  if(side==='A'){
    setupData.teamA=t.name;setupData.teamAId=id;
    setupData.playersA=t.players.map(p=>p.name);
    setupData.sizeA=Math.max(11,Math.min(15,t.players.length));
  }else{
    setupData.teamB=t.name;setupData.teamBId=id;
    setupData.playersB=t.players.map(p=>p.name);
    setupData.sizeB=Math.max(11,Math.min(15,t.players.length));
  }
  render();
}
window.applyTeamFromRegistry=applyTeamFromRegistry;

// ─── SCORING ──────────────────────────────────────────────────────────────────
function renderScorecard(inn,teamName,bpo){
  if(!inn)return'';
  const crr=inn.legalBalls>0?((inn.total/inn.legalBalls)*bpo).toFixed(2):'0.00';
  let br='';
  inn.batters.filter(b=>b.balls>0||inn.currentBatters.includes(b.id)).forEach(b=>{
    const isA=inn.currentBatters.includes(b.id);
    const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(0):'-';
    const nc=isA?'td-active':b.retired?'td-retired':'td-normal';
    const pre=isA?'⚡ ':b.retired?'🏃 ':'';
    const sub=(b.out||b.retired)?`<div class="td-sub">${b.retired?'retired not out':escHtml(b.dismissal)}</div>`:'';
    br+=`<tr><td><span class="${nc}">${pre}${escHtml(b.name)}</span>${sub}</td>
      <td class="td-runs">${b.runs}</td><td class="td-stat">${b.balls}</td>
      <td class="td-stat">${b.fours}</td><td class="td-stat">${b.sixes}</td><td class="td-stat">${sr}</td></tr>`;
  });
  let bwr='';
  inn.bowlers.filter(b=>b.balls>0||b.wides>0||b.noBalls>0).forEach(b=>{
    const econ=b.balls>0?(b.runs/(b.balls/bpo)).toFixed(1):'-';
    const isA=inn.charlieBowlers[0]===b.id;
    const nc=isA?'td-bact':b.retiredInjured?'td-bret':'';
    const pre=isA?'⚡ ':b.retiredInjured?'🚑 ':'';
    const sub=b.retiredInjured?`<div style="font-size:9px;color:#fb923c;">${b.retireReason}</div>`:'';
    bwr+=`<tr><td><span class="${nc}">${pre}${escHtml(b.name)}</span>${sub}</td>
      <td>${overStr(b.balls,bpo)}</td><td>${b.runs}</td><td>${b.wickets}</td>
      <td>${b.wides}</td><td>${b.noBalls}</td><td>${econ}</td></tr>`;
  });
  return `<div class="card anim-in">
    <div class="card-head"><span class="card-head-title">${escHtml(teamName)}</span><span class="card-head-crr">CRR ${crr}</span></div>
    <table class="ct"><thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody>${br}</tbody></table>
    <div class="card-extras"><span style="color:var(--muted)">Extras <strong style="color:var(--white)">${inn.extras.total}</strong> (W:${inn.extras.wides} NB:${inn.extras.noBalls} B:${inn.extras.byes} LB:${inn.extras.legByes})</span><span class="card-total">${inn.total}/${inn.wickets} (${overStr(inn.legalBalls,bpo)})</span></div>
    <div class="card-bowling"><table class="cbt"><thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Econ</th></tr></thead><tbody>${bwr}</tbody></table></div>
  </div>`;
}

function renderScoring(){
  const m=state.match,inn=getInn(),bpo=getBpo(),rules=getRules();
  const charlie=(m.bowlingMode||'charlie')==='charlie';
  const batTeam=state.currentInnings===0?m.teamA:m.teamB;
  const bowlTeam=state.currentInnings===0?m.teamB:m.teamA;
  const inningsOver=isInningsOver();
  const target=state.currentInnings===1&&m.innings[0]?m.innings[0].total+1:null;
  const runsNeeded=target?target-(inn.total||0):null;
  const ballsLeft=(m.totalOvers*bpo)-inn.legalBalls;

  let batsHtml='';
  inn.currentBatters.forEach((bId,i)=>{
    const b=inn.batters.find(x=>x.id===bId);if(!b)return;
    const nr=rules.retirementScore>0&&b.runs>=rules.retirementScore-5;
    batsHtml+=`<div class="sb-batter ${i===0?'striker':''}" onclick="${i===0?'openModal(\'striker\',{})':''}">
      <span class="sb-role">${i===0?'⚡ STRIKER':'NON-STRIKER'}</span>
      <span class="sb-name">${escHtml(b.name)}</span>
      <span class="sb-sc ${nr?'sb-warn':''}">${b.runs}(${b.balls})${nr?'⚠':''}
      </span>${i===0?'<span class="sb-edit">✎</span>':''}
    </div>`;
  });

  const active=inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const waiting=inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;

  const bvs=[{v:0,c:'b0'},{v:1,c:'b1'},{v:2,c:'b2'},{v:3,c:'b3'},{v:4,c:'b4',s:'FOUR'},{v:6,c:'b6',s:'SIX'}];
  const extraInfo={'Wide':`+${rules.wideRuns}r${rules.wideBowlAgain?' rebowl':''}`,'No Ball':`+${rules.noBallRuns}r${rules.noBallBowlAgain?' rebowl':''}`,'Bye':'+1 legal','Leg Bye':'+1 legal'};

  let wicketSect='';
  if(wicketFormVisible){
    const abIds=inn.currentBatters.filter(Boolean);
    const bsel=abIds.map(id=>{const b=inn.batters.find(x=>x.id===id);return b?`<option value="${id}" ${wfs.outId===id?'selected':''}>${escHtml(b.name)}</option>`:''}).join('');
    const tsel=WICKET_TYPES.map(t=>`<option ${wfs.type===t?'selected':''}>${t}</option>`).join('');
    wicketSect=`<div class="wicket-form">
      <div class="wf-title">🏏 Record Wicket</div>
      <div class="wf-row">
        <select onchange="updateWFS('outId',this.value)">${bsel}</select>
        <select onchange="updateWFS('type',this.value)">${tsel}</select>
        <input type="number" min="0" max="6" value="${wfs.runs}" oninput="updateWFS('runs',this.value)" placeholder="Runs"/>
      </div>
      <div class="form-btns">
        <button class="btn-confirm" onclick="confirmWicket()">Confirm Wicket</button>
        <button class="btn-cancel" onclick="wicketFormVisible=false;render()">Cancel</button>
      </div></div>`;
  }else{
    wicketSect=`<button class="wicket-btn" ${inningsOver?'disabled':''} onclick="openWicketForm()">🏏 WICKET</button>`;
  }

  const overBalls=inn.deliveries.slice(-14).map(d=>{
    let cls='ob-run',lbl=d.runs;
    if(d.isWicket){cls='ob-wkt';lbl='W';}
    else if(d.runs===6)cls='ob-six';
    else if(d.runs===4)cls='ob-four';
    else if(d.isExtra){cls='ob-ext';lbl=d.extraType?.[0]||'E';}
    return `<div class="ob ${cls}">${lbl}</div>`;
  }).join('');

  let mainContent='';
  if(showScorecard){
    mainContent=renderScorecard(inn,batTeam,bpo);
    if(m.innings[0]&&state.currentInnings===1)mainContent+=renderScorecard(m.innings[0],m.teamA,bpo);
  }else{
    mainContent=`
      ${charlie ? `
      <div class="charlie-panel">
        <div class="charlie-hdr">
          <span class="charlie-lbl">⚡ Charlie Tandem Bowling</span>
          <button class="c-retire-btn" onclick="retireBowlerState={slot:null,reason:'Injury'};openModal('retireBowler',{})">🚑 Retire Bowler</button>
        </div>
        <div class="c-bowlers">
          <div class="bcard active">
            <div class="b-role a">🟢 Bowling Now</div>
            <div class="b-name">${escHtml(active?.name||'—')}</div>
            ${active?`<div class="b-stats">${overStr(active.balls,bpo)} · ${active.runs}r · ${active.wickets}w</div>`:''}
            <div class="b-can yes">✅ Can field</div>
          </div>
          <button class="swap-btn" onclick="swapBowlers()" title="Manual swap">⇄</button>
          <div class="bcard waiting">
            <div class="b-role w">🟡 Bowling Next</div>
            <div class="b-name">${escHtml(waiting?.name||'—')}</div>
            ${waiting?`<div class="b-stats">${overStr(waiting.balls,bpo)} · ${waiting.runs}r · ${waiting.wickets}w</div>`:''}
            <div class="b-can no">❌ Cannot field</div>
          </div>
        </div>
      </div>` : `
      <div class="charlie-panel" style="border-color:rgba(58,181,106,.2);">
        <div class="charlie-hdr">
          <span class="charlie-lbl" style="color:var(--grass3);">🏏 Current Bowler</span>
          <div style="display:flex;gap:6px;">
            <button class="swap-btn" onclick="swapBowlers()" title="Change bowler" style="border-color:rgba(58,181,106,.3);color:var(--grass3);">⇄ Change</button>
            <button class="c-retire-btn" onclick="retireBowlerState={slot:null,reason:'Injury'};openModal('retireBowler',{})">🚑</button>
          </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="bcard active" style="flex:1;">
            <div class="b-role a" style="color:var(--grass3);">🟢 Bowling This Over</div>
            <div class="b-name">${escHtml(active?.name||'—')}</div>
            ${active?`<div class="b-stats">${overStr(active.balls,bpo)} · ${active.runs}r · ${active.wickets}w</div>`:''}
          </div>
          ${waiting?`<div class="bcard waiting" style="flex:1;opacity:.6;">
            <div class="b-role w">🔜 Next Up</div>
            <div class="b-name">${escHtml(waiting.name)}</div>
            <div class="b-stats">${overStr(waiting.balls,bpo)} · ${waiting.runs}r · ${waiting.wickets}w</div>
          </div>`:''}
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:8px;font-family:'Rajdhani',sans-serif;">Tap ⇄ Change to select a different bowler for next over</div>
      </div>`}
      <div class="rules-pills">
        <span class="rpill">${bpo}b/over</span>
        <span class="rpill">Wide +${rules.wideRuns}r${rules.wideBowlAgain?' rebowl':''}</span>
        <span class="rpill">NB +${rules.noBallRuns}r${rules.noBallBowlAgain?' rebowl':''}</span>
        ${rules.retirementScore>0?`<span class="rpill">Retire@${rules.retirementScore}</span>`:''}
        <span class="rpill gold" onclick="openModal('striker',{})">✎ Change Striker</span>
      </div>
      <div class="score-zone">
        <div class="zone-lbl">This Over</div>
        <div class="over-row">${overBalls}</div>
        <div class="ball-grid">${bvs.map(b=>`<button class="ball-btn ${b.c}" ${inningsOver?'disabled':''} onclick="scoreRuns(${b.v})">${b.v}${b.s?`<span class="badge">${b.s}</span>`:''}</button>`).join('')}</div>
        <div class="extras-grid">${['Wide','No Ball','Bye','Leg Bye'].map(e=>`<button class="extra-btn" ${inningsOver?'disabled':''} onclick="scoreExtra('${e}')"><span class="en">${e.toUpperCase()}</span><span class="es">${extraInfo[e]}</span></button>`).join('')}</div>
        ${wicketSect}
      </div>
      ${inningsOver?`<button class="end-btn" onclick="endInnings()">${state.currentInnings===0?'END INNINGS → Start 2nd':'🏆 END MATCH'}</button>`:''}
      ${renderScorecard(inn,batTeam,bpo)}`;
  }

  return `<div class="screen dark active">
    <div class="topbar dark">
      <span style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--grass3);">${escHtml(batTeam)} vs ${escHtml(bowlTeam)}</span>
      <div class="topbar-actions">
        <button class="tbtn dark" onclick="toggleScorecard()">${showScorecard?'▶ Score':'📋 Card'}</button>
        <button class="tbtn gold" onclick="exportCSV(state.match)">📥</button>
      </div>
    </div>
    <div class="screen-inner">
      <div class="scoreboard">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="sb-label">${escHtml(batTeam)} BATTING</div>
            <div class="sb-score">${inn.total}<span class="wkts">/${inn.wickets}</span></div>
            <div class="sb-overs">${overStr(inn.legalBalls,bpo)} overs</div>
          </div>
          <div style="text-align:right;">
            ${target?`<div class="sb-target-txt">TARGET <strong>${target}</strong></div>`:''}
            ${runsNeeded!==null?`<div class="sb-target-txt" style="font-size:11px;">Need ${runsNeeded} off ${ballsLeft}</div>`:''}
            <div style="color:var(--muted);font-size:10px;margin-top:6px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;">${m.totalOvers}ov · ${bpo}b/ov</div>
            ${charlie?`<div style="color:var(--gold);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;margin-top:3px;">⚡ CHARLIE MODE</div>`:`<div style="color:var(--grass3);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;margin-top:3px;">🏏 STANDARD</div>`}
            ${rules.retirementScore>0?`<div style="color:#a78bfa;font-size:10px;font-family:'Rajdhani',sans-serif;">Retire@${rules.retirementScore}</div>`:''}
          </div>
        </div>
        <div class="sb-batters">${batsHtml}</div>
      </div>
      ${mainContent}
    </div>
  </div>`;
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function renderModal(modal){
  let inner='';
  if(modal.type==='newbatter')inner=renderNewBatterModal(modal.data);
  else if(modal.type==='striker')inner=renderStrikerModal();
  else if(modal.type==='retireBowler')inner=renderRetireBowlerModal();
  else if(modal.type==='replaceBowler')inner=renderReplaceBowlerModal(modal.data);
  return `<div class="modal-overlay" onclick="if(event.target===this&&'${modal.type}'!=='newbatter')closeModal()">${inner}</div>`;
}

function renderNewBatterModal(data){
  const inn=getInn();
  const avail=inn.batters.filter(b=>!b.out&&!b.retired&&!inn.currentBatters.includes(b.id));
  const isRetired=data?.reason==='retired';
  let listHtml='';
  if(avail.length===0){
    listHtml=`<p style="color:var(--muted);font-size:13px;margin-bottom:14px;">No more batters. Innings over.</p>
    <button class="btn-primary" onclick="closeModal();endInnings()">End Innings</button>`;
  }else{
    listHtml=`<div class="modal-list">${avail.map(b=>`<div class="mitem" onclick="selectNewBatter('${b.id}')"><span class="mitem-name">${escHtml(b.name)}</span></div>`).join('')}</div>`;
  }
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:${isRetired?'#a78bfa':'#f87171'}">${isRetired?`🏃 ${escHtml(data?.name||'')} Retired Not Out`:'🏏 Wicket — New Batter'}</div>
    <div class="modal-sub">${isRetired?`Retired on ${getRules().retirementScore} — who comes in?`:'Select next batter'}</div>
    ${listHtml}
  </div>`;
}

function renderStrikerModal(){
  const inn=getInn();
  let items='';
  inn.currentBatters.filter(Boolean).forEach(id=>{
    const b=inn.batters.find(x=>x.id===id);if(!b)return;
    const isS=inn.currentBatters[0]===id;
    items+=`<div class="mitem ${isS?'sel':''}" onclick="applyStriker('${id}')">
      <div><span class="mitem-name">${escHtml(b.name)}</span></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="mitem-meta">${b.runs}(${b.balls})</span>
        ${isS?`<span class="mitem-badge">STRIKER ⚡</span>`:''}
      </div>
    </div>`;
  });
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚡ Who faces next delivery?</div>
    <div class="modal-sub">Override which batter is on strike</div>
    <div class="modal-list">${items}</div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>`;
}

function renderRetireBowlerModal(){
  const inn=getInn();
  const charlie=isCharlie();
  const actB=inn.charlieBowlers[0]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[0]):null;
  const watB=inn.charlieBowlers[1]?inn.bowlers.find(b=>b.id===inn.charlieBowlers[1]):null;
  const bpo=getBpo();
  // In standard mode only show slot 0 (active bowler); tandem waiting slot irrelevant
  const slots=charlie
    ? [{slot:0,label:'🟢 Bowling Now',b:actB},{slot:1,label:'🟡 Bowling Next',b:watB}]
    : [{slot:0,label:'🟢 Current Bowler',b:actB}];
  let items='';
  slots.forEach(({slot,label,b})=>{
    if(!b)return;
    items+=`<div class="mitem ${retireBowlerState.slot===slot?'sel':''}" onclick="setRetireSlot(${slot})">
      <div>
        <div style="font-size:9px;color:var(--muted);font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-bottom:2px;">${label}</div>
        <div class="mitem-name">${escHtml(b.name)}</div>
        <div class="mitem-meta">${overStr(b.balls,bpo)} · ${b.runs}r · ${b.wickets}w</div>
      </div>
      ${retireBowlerState.slot===slot?'<span style="color:var(--gold);font-size:16px;">✓</span>':''}
    </div>`;
  });
  const rsel=RETIRE_REASONS.map(r=>`<option ${retireBowlerState.reason===r?'selected':''}>${r}</option>`).join('');
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:#fb923c;">🚑 Retire Bowler</div>
    <div class="modal-sub">Select bowler and reason</div>
    <div class="modal-list">${items}</div>
    ${retireBowlerState.slot!==null?`<div class="form-section"><label class="form-label">Reason</label><select class="form-input" onchange="setRetireReason(this.value)">${rsel}</select></div>`:''}
    <div class="form-btns" style="margin-bottom:8px;">
      <button class="btn-confirm" ${retireBowlerState.slot===null?'disabled style="opacity:.4"':''} onclick="confirmRetireBowler()">Retire Bowler</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
}

function renderReplaceBowlerModal(data){
  const inn=getInn();
  const bpo=getBpo();
  const bowlingPlayers=state.currentInnings===0?state.match.playersB:state.match.playersA;
  const activeBIds=inn.charlieBowlers.filter(Boolean);
  const avail=bowlingPlayers.filter(name=>{
    const ex=inn.bowlers.find(b=>b.name===name);
    if(!ex)return true;
    return !ex.retiredInjured&&!activeBIds.includes(ex.id);
  });
  let items=avail.length===0?`<p style="color:var(--muted);font-size:13px;margin-bottom:14px;">No bowlers available.</p>`:
    `<div class="modal-list">${avail.map(name=>{
      const ex=inn.bowlers.find(b=>b.name===name);
      return `<div class="mitem" onclick="applyReplaceBowler('${escHtml(name)}',${data.slot})">
        <span class="mitem-name">${escHtml(name)}</span>
        <span class="mitem-meta">${ex?`${overStr(ex.balls,bpo)} · ${ex.runs}r`:'Fresh'}</span>
      </div>`;
    }).join('')}</div>`;
  return `<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🔄 Replacement Bowler</div>
    <div class="modal-sub">Who takes the ${data.slot===0?'active':'waiting'} bowling slot?</div>
    ${items}
    <button class="modal-cancel" onclick="closeModal()">Close</button>
  </div>`;
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function renderResult(){
  const m=state.match,bpo=getBpo();
  const i1=m.innings[0],i2=m.innings[1];
  const s1=i1?.total||0,s2=i2?.total||0;
  const winner=s1>s2?m.teamA:s2>s1?m.teamB:'Tie';
  const margin=winner===m.teamA?`by ${s1-s2} runs`:winner===m.teamB?`by ${(m.playersB?.length||11)-1-(i2?.wickets||0)} wickets`:'';
  return `<div class="screen dark active">
    <div class="topbar dark">
      <div style="width:40px;"></div>
      <span class="topbar-title">Match Result</span>
      <button class="tbtn gold" onclick="exportCSV(state.match)">📥 CSV</button>
    </div>
    <div class="screen-inner">
      <div class="result-hero">
        <span class="trophy">🏆</span>
        <div class="result-title">${winner==='Tie'?'TIE!':escHtml(winner)+' WIN!'}</div>
        ${margin?`<div class="result-margin">${margin}</div>`:''}
      </div>
      <div class="scores-row">
        ${[{t:m.teamA,i:i1},{t:m.teamB,i:i2}].map(({t,i})=>`
          <div class="score-box">
            <div class="score-box-team">${escHtml(t)}</div>
            <div class="score-box-runs">${i?.total||0}/${i?.wickets||0}</div>
            <div class="score-box-overs">${overStr(i?.legalBalls||0,bpo)} overs</div>
          </div>`).join('')}
      </div>
      ${renderScorecard(i1,m.teamA,bpo)}
      ${renderScorecard(i2,m.teamB,bpo)}
      <div class="nav-row">
        <button class="btn-secondary" onclick="state.screen='home';state.match=null;state.currentInnings=0;render()">🏠 Home</button>
        <button class="btn-primary" onclick="exportCSV(state.match)">📥 Export CSV</button>
      </div>
    </div>
  </div>`;
}

// ─── Offline & SW ─────────────────────────────────────────────────────────────
function updateOffline(){
  const b=document.getElementById('offline-bar');
  if(b)b.classList.toggle('show',!navigator.onLine);
}
window.addEventListener('online',updateOffline);
window.addEventListener('offline',updateOffline);

if('serviceWorker' in navigator){
  try{
    const sw=`const C='pitchup-v1';const U=['/'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(U)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});`;
    const blob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'/'}).catch(()=>{});
  }catch(e){}
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadState();
updateOffline();
render();
</script>
</body>
</html>
